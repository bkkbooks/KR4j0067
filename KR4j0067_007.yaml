front:
  text: 岸新緑生時是落紅帶愁流處記當日開掩梨花剪燈深夜語臨斷岸以下數語最為姜堯章稱賞
  hash: sha256:edb19342efe1cc24361bcbe1956f444cedf0b3c51c6adb27093334dc68296fc0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0067_SBCK_007-1a}
body:
  text: 玉樓春社前一日遊人等得春晴也處處旗亭堪繫馬雨前穠杏尚稱停風裏殘梅無顧藉忌拈針線還逢社鬪草嬴多裙欲卸明朝雙燕定㱕來叮囑重簾休放下玉樓春梨花玉容寂寞誰為主寒食新晴愁幾許前身清淡似梅粧遙夜依微留月住香迷胡蝶飛時路雪在秋千來往處黃昏著了素衣裳深閉重門聽夜雨萬年歡春思兩䄂梅風謝橋邊岸㾗猶帶隂雪過了匆匆燈市草根青發燕子春愁未醒誤幾處芳音遼絶煙溪上采緑人㱕定應愁沁花骨非干厚情易歇奈燕臺句老難道離别小徑吹衣曾記故里風物多少驚心舊事第一是侵階羅襪如今但栁髮晞春夜來和露梳月杏花天清明軟波拖碧蒲芽短畫橋外花晴栁暖今年自是清明晚便覺芳情較懶春衫瘦東風剪剪過花塢香吹醉面㱕來立馬斜陽岸隔岸歌聲一片西江月閨思西月淡窺樓角東風暗落簷牙一燈初見影窗紗又是重簾不下幽思屢隨芳草閒愁多似楊花楊花芳草遍天涯繡𬒳春寒夜夜菩薩蠻夜景梨花不礙東城月月明照見空欄雪雪砥夜香微褰簾拜月㱕錦衾幽夢短明日南堂宴宴罷小樓臺春風來不來臨江仙閨思愁與西風應有約年年同赴清秋舊游簾幕記楊州一燈人著夢雙鴈月當樓羅帶鴛鴦塵暗淡更須整頓風流天涯萬一見溫柔瘦應緣此瘦羞亦為郎羞齊天樂秋興闌干只在鷗飛處年年怕吟秋興斷浦沈雲空山挂雨只有詩愁千頃波聲未定望舟尾拖凉渡頭籠暝正好登臨有人歌罷翠簾冷悠然魂墮故里奈間情未了還𬒳吹醒拜月虛簷聽蛩壞砌誰復能憐嬌俊憂心耿耿寄桐葉芳題冷楓新詠莫遣秋聲樹頭喧夜永齊天樂湖上即席分韻淂羽字鴛鴦拂破蘋花影低低趂凉飛去畫裏移舟詩邊就夢葉葉碧雲分雨芳游自許過栁影間波水花平渚見說西風為人吹恨上瑶樹闌干斜照未滿杏墻應望斷春翠偷聚淺約挼香深盟搗月誰是窗間青羽孤筝幾柱問因甚參差暫成離阻夜色空庭待㱕聽俊語雙雙燕詠燕形容尽矣過春社了度簾幕中間去年塵冷差池欲住試入舊巢相並還相雕梁藻井又軟語商量不定飄然快拂花梢翠尾分開紅影芳徑芹泥雨潤愛貼地爭飛競誇輕俊紅樓㱕晚看足栁昏花暝應自棲香正穩便忘了天涯芳信愁捐翠黛雙蛾日日畫欄獨憑姜堯章極稱其栁昏花暝之句東風第一枝春雪巧氷蘭心偷黏草甲東風欲障新暖謾凝碧瓦難留信知暮寒較淺行天入鏡做弄出輕鬆纎軟料故園不捲重簾誤了乍來雙燕青未了栁四白眼紅欲斷杏開素面舊游憶著山隂厚盟遂妨上苑寒爐重暖便放慢春衫針線恐鳯鞋挑菜㱕來萬一灞橋相見結句尤為姜堯章拈出東風第一枝元夕酒館歌雲燈街舞繡笑聲喧似簫鼓太平京國多歡大酺綺羅幾處東風不動照花影一天春聚耀翠光金縷相交苒苒細吹香霧羞醉玉少年手度懷豔雪舊家伴侣閉門明月關心倚窗小梅索句吟情欲斷念嬌俊知人無據想䄂寒珠絡藏香夜久帶愁㱕去換巢鵉鳯春情人若梅嬌正愁橫斷塢夢繞溪橋倚風融漢粉坐月怨秦簫相思因甚到纎腰定知我今無魂可銷佳期晚謾幾度淚㾗相照人悄天渺渺花外語香時透郎懷抱暗握荑苗乍嘗櫻顆猶恨侵階芳草天念王昌忒多情換巢鵉鳯教偕老溫柔鄉醉芙蓉一帳春曉過龍門春愁醉月小紅樓錦瑟箜篌夜來風雨曉來收幾點落花饒栁絮同為春愁寄信問晴鷗誰在芳洲緑波寧處有蘭舟獨對舊時携手地情思悠悠瑞鶴仙紅梅館娃春睡起為發粧酒暖臉霞輕􅕹氷霜一生裏厭從來冷淡粉腮重洗胭脂暗試便無限芳穠氣味向黃昏竹外寒深醉裏為誰偷倚嬌媚春風模樣霜月心腸瘦來肌躰孤香細細吹夢到杏花砥𬒳髙樓橫管一聲驚斷却對南枝灑淚謾相思桃葉桃根舊家姊妹滿江紅九月草一日出京懷古緩轡西風歎三宿遲遲行客桑梓外鋤耰漸入栁坊花陌雙闕逺騰龍鳯影九門空鎖鴛鵉翼更無人擫帝鄉逺相對兩蒼顔玉圍腰金繫肘繡籠鞍鄉人衮衮嚴近五馬度荆山收拾五湖氣度卷束蟠胸兵甲春意滿人間天錫公純嘏氣象自平寬水調歌頭孫靖州生日九十九峰下百二十年州西風吹起客夢月滿驛南樓影入天河左界辰在壽星向上還是去年秋要和木蘭曲載酒壽君侯天邊信雲外步去難留壽觴庭院依舊已帶别離愁離合鍾情未免富貴關人何事浪白世間頭將相時來作身健百無憂鷓鴣天范靖州十月草一日生日辛丑八月御筆劉某文名久著史學尤精可特賜同進士出身六州歌頭牡丹維摩病起兀坐等枯株清晨裏誰來問是文殊遣名姝奪盡羣芳色浴才出醒初解千萬態嬌無力困相扶絶代佳人不入金張室却訪吾廬對茶鐺禪榻笑殺此翁癯瑶砌金壺始消渠憶承平日繁華事修成譜寫成圖竒絶甚歐公記蔡公書古來無一自京華隔問姚魏竟何如多應是綵雲散劫灰餘野鹿銜將花去空回首河洛丘墟謾傷春吊古夢繞漢唐都歌罷欷歔水調歌頭和西外判宗湖樓韻君看郭西景渾不减孤山飛樓突兀百尺輪奐侈前觀絶唱新詞寡和墮淚舊碑無恙往事付驚瀾不見遼鶴返惟對水鷗間又何必珠翠盛管絃􅌚唾壺麈尾瀟灑領客上髙寒丞相功存宗廟祭酒義兼家國世事尚相關風月寓意耳莫作晉人看沁園春夢方孚若何處相逢登寶叉樓訪銅雀臺喚厨人斫就東溟鯨鱠圉人呈罷西極龍媒天下英雄使君與操餘子誰堪共酒杯車千乘載燕南代北劔客竒材飲酣鼻息如雷誰信𬒳晨雞催喚回嘆年光過盡功名未立書生老去機會方來使李將軍遇高皇帝萬戶侯何足道哉推衣起但悽凉感舊慷慨生哀沁園春送包尉我羡君㱕一路秋風芙蓉木犀想慈顔望久靈烏乍噪新眉畫就郎馬頻嘶忙脫征衫快呼斗酒細與家人說建溪情知道這中年懷抱生怕分携丈夫南北東西應笑殺離筵粉淚啼悵佳人來未碧雲冉冉王孫去後芳草萋萋明日相思山重水復古道人稀茅店雞元龍老有髙樓百尺誰共登梯沁園春寄鍾賢良我夢見君帶飛霞冠著宫錦𫀆與牧之髙會齊山風月謫仙同載采石雲濤萬卷星羅千篇電掃不學窮兒賦楚騷掀髯處有魚龍起舞狐兔悲嘷英雄埋沒蓬蒿暗摸索當年劉與曹嘆事機易失功名難偶誅茅西崦種秫東臯柵有雞豚庭無羔鴈不是先生索價髙人間窄待相期海上共摘蟠桃沁園春贈孫季蕃歲莫天寒一見飄然幅巾布裘侭侵雲烏道躋攀絶頂拍天鯨浸笑傲中流疇昔期君𬗋髯鐵面生子當如孫仲謀誰知道到中年猶未建節對侯南來萬里何求因感慨喬公成逺遊悵名姬駿馬都如昨夢隻雞斗酒難到新丘天地無情功名有數千古英雄只麼休平生客獨羊曇一箇淚灑西州沁園春寄九華葉賢良一卷隂符二石硬弓百斤寶刀更玉花驄噴鳴鞭電抹烏絲欄展醉墨龍跳牛角書生虬鬚豪客談笑皆從折簡招依俙記曾請纓係粵草檄征遼當年目視雲霄誰信道凄凉今折腰悵燕然未勒南㱕草草長安不見北望迢迢老去胸中有些磊塊歌罷猶須著酒澆休休也但帽邊鬢减鏡裏顔凋摸魚兒賞海棠甚春來冷煙凄雨朝朝遲了芳信驀然作暖晴三日又覺萬殊嬌困天怎忍潘令老不成也沒看花分才情减尽悵玉局飛仙石湖絶筆孤負這風韻傾城色懊惱佳人薄命墻頭岑寂誰問東風日暮無聊賴吹淂胭脂成粉君細認花共酒古來二事天猶吝年光去迅謾緑葉成隂蒼苔滿地做取異時恨摸魚兒感歎怪新來倚樓看鏡清狂渾不如舊莫雲千里傷心色那更亂蟬踈栁凝望久愴故國百年漢闕誰回首功名大謬歎采藥名山讀書精舍此計何時就封侯事久矣輸人妙手扁舟聊作漁叟髙冠長劔都間物世上切身惟酒千載後君試看拔山扛鼎俱烏有英雄骨朽問顧曲周郎而今還解來聽小詞否念奴嬌菊花老夫白首尚鬼嬉廢圃一畨料理餐飲落英并墜露重把離騷枮起冷艷幽香輕黃淡白占斷西風裏飛來雙蝶繞叢欲去還止嘗試銓次羣芳梅花差可伯仲之間耳佛說諸天金色界未必莊嚴如此尚友靈均定交元亮結好天隨子籬邊坡下一杯聊泛霜蘂賀新郎欎孤臺絶頂規危榭跨髙寒鳥飛不過雲生其下斤斫無聲人按堵翕忽青紅變化覽城郭山川如畫閣老鳯樓修造手笑談間突出凌雲厦臺上景買無價唾壺麈尾登臨暇似當年文章太守歐陽公也傾倒贑江供硯滴判斷雪天月夜更喚取鄒枚司馬銅雀凌歊歌舞罷訪殘磚斷甓無存者餘翰墨𬒳風雅賀新郎春景動地東風起畫橋西繞溪桑柘漫山桃李寂寂墻隂蒼苔路猶印前回屐齒驚歲月飈馳雲駛太息攀翻長亭樹是先生手種今如此君不樂𣣔何俟傍人錯會淵明意笑斯翁皇皇汲汲登山臨水佳處徑呼藍輿去倣佛柴桑栗里從我者門生兒子嘗試平章先賢傳屈原醒不似劉伶醉判茗艼卧花砥賀新郎芍藥一夢楊州事畫堂深金瓶萬朵元戎髙會座上祥雲層層起不减洛中姚魏歎别後關山迢遞國色天香何處在想東風猶憶狂書記驚歲月一彈指數枝清曉煩馳騎向小窗依俙重見蕪城佳麗料得花憐儂消瘦儂亦憐花憔悴謾悵望竹西歌吹老矣應無騎鶴日但春衫點點當時淚那更有舊情味賀新郎送陳子華赴真洲北望神州路試平章這埸公案向誰分付記得太行兵百萬曾入宗爺駕御今把作握蛇騎虎君去東京豪傑喜看投戈下拜真吾父談笑裏定齊魯兩淮蕭索惟狐兔問當年祖生去後有人來否多少新亭揮淚客不夢中原塊土這事業須由人做堪笑書生心膽怯向車中閉置如新㜏空目送塞鴻去賀新郎端午深院榴花吐畫簾開綵衣紈扇午風清暑兒女紛紛新結束時樣叉符艾虎早已有游人觀渡老大逢埸慵作戲任白頭年少爭旗鼓溪雨急浪花舞靈均標致高如許憶生平既紉蘭佩又懷椒糈誰信騷魂千載後波砥垂涎角黍又說是蛟饞龍怒把似而今醒到了料當年醉死差無苦聊一笑吊千古賀新郎九日湛湛長空黑更那堪斜風細雨亂山如織老眼平生空四海賴有高樓百尺看浩蕩千崖秋色白髮書生神州淚侭凄凉不向牛山滴追往事去無迹少時自負凌雲筆到如今春華落尽滿懷蕭瑟常恨世人新意少愛說南朝狂客把破帽年年拈出若對黃花孤負酒怕黃花也笑人岑寂鴻北去日西匿賀新郎遊水東周家花園溪上收殘雨倚危欄薄綿乍脫日隂亭午閙市不知春色處散在荒園廢墅漸小白長紅無數客子雖非河陽令也隨緣暫作鶯花主那可負甕中醑碧雲四合千岩暮恨匆匆余方有事子姑㱕去趂取羣芳未搖落暇日提魚就煮歎激電光隂如許回首明年何處在問桃花尚記劉郎否公莫笑醉中語賀新郎郡㑹聞妓歌有感妾出于微賤少年時朱絃彈絶玉笙吹遍粗識詩家關雎亂羞學流鶯百囀揔不涉閨情春怨誰向西鄰公子說要珠鞍迎入梨花院身未動意先懶主家十二樓連苑那人人靚粧按曲繡簾初捲道是畫堂簫管唱笑殺街坊拍衮回首望侯門天遠我有平生離鵉操頗哀而不愠微而婉聊一奏更三歎生查子上元戲陳敬叟繁燈奪霽華戲鼓催明發風物昔時同况味中年别淺畫鏡中眉深拜樓西月人散市聲收漸人愁時節臨江仙種海棠作落魄長官江海客少豪萬里尋春而今憔悴向溪濵斷無觴詠興惟有簿書塵手接海棠三百本等間粧點芳辰它年絳雪映紅雲丁寧風與月記取種花人滿江紅送王實之天壤王郎數人物方今第一談笑裏風霆驚座雲煙生筆落落元龍湖海氣琅琅董相天人䇿問如何十載尚青衫諸侯客易愛砥些官職難保砥些名節擬閉門投轄劇談三日疇昔評君天下寶當為天下蒼生惜向臨分慷慨出商聲摧金石滿江紅飲海棠花下老子年來頗自許心腸鐵石尚一點消磨未尽愛花成癖懊惱每嫌寒勒住丁寧莫𬒳晴烘拆奈暄風烈日太無情如何得張畫燭頻頻惜慿素手輕輕摘更一畨雨過彩雲無跡今日不來花下飲明朝空向枝頭覔對殘紅滿院杜䳌啼添愁寂滿江紅范尉梅谷赤日黃埃夢不到清溪翠麓空健羡君家别墅幾株幽獨骨冷肌清偏要月天寒日暮尤宜竹想主人杖屨日千回山南北寧委澗嫌金屋寧映水羞銀燭歎出塵風韻背時粧束競愛東鄰姬傳粉誰憐空谷人如玉笑林逋何遜謾為詩無人讀滿江紅夜雨凉甚忽動從戎之興金甲雕戈記當日轅門初立磨盾鼻一揮千紙龍蛇猶濕鐡馬曉嘶營壁冷樓船夜渡風濤急有誰憐猿臂故將軍無功級平戎䇿從軍什零落盡慵收拾把茶經香傳時時溫習生怕客談榆塞事且教兒誦花間集歎臣之壯也不如人今何及卜算子手植海棠盛開風雨作祟輒作小詞二首盡是手成持合得天饒借風雨于花有甚讐作意相陵藉做暖逼教開做冷催教謝不負明年花下人只負栽花者卜算子片片蝶衣輕點點猩紅小人道東君不惜花百種千般巧朝見樹頭繁莫見枝頭少人道東君果惜花雨打風吹了昭君怨牡丹曾看洛陽舊譜只許姚黃獨步若比廣陵花太戲它舊日王侯園圃今日荆榛孤兔君莫說中州怕花愁昭君怨瓊花后土祠中標韻天上人間一本道號玉真妃字瓊姬我與花曾半面流落天涯相見莫把玉簫吹怕驚飛清平樂别意休彈别鶴淚與絃俱落歡事中年如水薄懷抱那堪作惡昨宵月露高樓今朝烟雨孤舟除是無身方了有身長有間愁清平樂五月十五夜玩月纎雲掃跡萬頃玻瓈色醉跨玉虹游八極歷歷天青海碧水晶宫殿飄香羣仙方按霓裳消得幾多風露變教人世清凉清平樂風高浪快萬里騎鯨背曾識常娥真體態素面元無粉黛身游銀闕珠宫俯看積氣濛濛醉裏偶搖桂樹人間喚作凉風清平樂頃在維楊陳師文參議家舞姬絶妙賦此宫腰束素只怕能輕舉好築避風臺護取莫遣驚鴻飛去一團雪玉溫柔笑顰俱有風流貪與蕭郎眉語不知舞錯伊州玉樓春戲呈林節推鄉兄并下一首年年躍馬長安市客裏似家家似寄青錢換酒日無何紅燭呼盧霄不寐易挑錦婦機中字難得玉人心下事男兒西北有神州莫滴水西橋畔淚菩薩蠻小鬟解事高燒燭羣花圍繞樗蒱局道是五陵兒風騷滿肚皮玉鞭鞭玉馬戲走章臺下笑殺灞陵翁騎驢風雪中憶秦娥感舊春酲薄夢中毬馬豪如昨豪如昨月明橫笛曉寒吹角古來成敗難描摸而今却悔當𥘉錯當𥘉錯鐡衣猶在不堪重著憶秦娥梅謝了塞垣凍解鴻㱕早鴻㱕早慿伊問訊大梁遺老浙河西靣邉聲悄汴河南北炊烟少炊烟少宣和宫殿冷烟衰草憶秦娥遊人絶緑隂滿野芳菲歇芳菲歇飬蠶天氣采茶時節枝頭杜宇啼成血陌頭楊栁吹成雪吹成雪淡烟微雨江南三月長相思令惜梅寒相催暖相催催了開時催謝時丁寧花放遲角聲吹笛聲吹吹了南枝吹北枝明朝成雪飛長相思令餞别風蕭蕭雨蕭蕭相送津亭折栁條春愁不自聊烟迢迢水迢迢凖擬江邉駐畫撓舟人頻報潮浪淘沙旅况𥿄帳素屏遮全似僧家無端霜月闖窗紗喚起玉關征戍夢幾疊寒笳歲晚客天涯鬢髮蒼華今年衰似去年些詩酒近來都减價孤負梅花一剪梅中秋解宜春郡印陌上行行怪府公還是文窮還是詩窮下車上馬太匆匆來是春風去是秋風階䘖免得管兵農嬉到昏鐘睡到齊鍾不須提嶽與知宫喚作溪翁喚作山翁踏莎行甲午重九牛山作鼓喧空鵾絃沸曉櫻梢微破想明年更好傳柑宴罷醉扶狨座雨中花慢春日旅况縹蒂緗枝玉葉翡英百梢爭趂春忙正雨後蜂粘落絮燕撲晴香遺䇿誰家蕩子唾花何處新粧想流紅有恨拾翠無心往事凄凉春愁如海客思翻空帶圍只看東陽更那堪玉笙度曲翠羽傳觴紅淚不勝閨怨白雲應老他鄉夢回羇枕風驚庭樹月在西廂滿庭芳留别栁裊金絲梨鋪香雪一年春事方中燭前一見花艷覺羞紅枕臂香痕未落舟橫岸作計匆匆明朝去暮天平水雙槳碧雲東隔離歌一闋琵琶聲斷燕子樓空歎陽臺夢杳行雨無屣後㑹芙蕖未老從今去日望㱕鴻愁如織斷腸啼鴂饒舌訴東風六州歌頭上廣西張帥慿深負阻蜂午肆奔騰龍江上妖氛漲鯨海外白波驚羽檄交飛急玉帳靜金韜閟恢逺馭振長纓密分兵細草黃沙渺渺西關路風裊高旌聽飛霜令肅堅壁夜無聲鼓角何神地中鳴看追風騎攢雲槊雷野轂激天鉦飛箭集旄頭墜長圍掩郭東傾振旅觀旋凱笳鼓競繡旗明刀換犢戈藏革士休營黃色赤雲交映論功何止蔡州平想環城蒼玉深刻入青冥永詔來今水調歌頭中秋天淡四垂幕雲細不成衣西風掃盡纎翳凉我鬢邉絲破匣菱花飛動跨海清光無際草露滴明璣杯到莫停手何用問來期坐虛堂揩病眼泝流輝雲山應有幽恨瑶瑟掩金徽河漢無聲自轉玉兔有情亦者世事巧相違一寫謫仙怨雙淚滿君頤中興以來絶妙詞選卷之七
