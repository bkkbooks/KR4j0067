front:
  text: 岸新緑生時是落紅帶愁流處記當日開掩棃花剪灯深夜語臨断岸以下数語最爲姜尭章稱賞
  hash: sha256:75fb69a1540459cb5d31947416a658d45bdd6af0a859b83482203ec56186116b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0067_SBCK_007-1a}
body:
  text: 玉樓春社前一日遊人等得春晴也處處旗亭堪繫馬雨前穠杏尚秤停風裏殘梅無頋藉忌拈針線還逢社闘草嬴多裙欲卸明朝雙燕定㱕來叮嘱重簾休放下玉樓春棃花玉容寂寞誰爲主寒食新晴愁㡬許前身清淡佀梅粧遥夜依微留月住香迷胡蝶飛時路雪在秋千來往處黄昏着了素衣裳深閉重門聽夜雨萬年歡春思兩䄂梅風謝橋邊岸㾗猶帶隂雪過了匆匆灯市草根青發燕子春愁未醒悞㡬處芳音遼絶煙谿上采緑人㱕定應愁沁花骨非干厚情易歇柰燕臺句老難道離别小徑吹衣曾記故里風物多少驚心舊事第一是侵階羅襪如今但栁髮晞春夜來和露梳月杏花天清明軟波拖碧蒲芽短画橋外花晴栁暖今年自是清明晚便斍芳情較懶春衫瘦東風剪剪過花塢香吹醉面㱕來立馬斜陽岸隔岸歌聲一片西江月閨思西月澹窺樓角東風暗落簷牙一灯初見影窓紗又是重簾不下幽思屢隨芳草閒愁多佀楊花楊花芳草徧天涯綉𬒳春寒夜夜菩薩蛮夜景梨花不礙東城月月明照見空欄雪雪厎夜香微褰簾拜月㱕錦衾幽夢短明日南堂宴宴罷小樓臺春風來不來臨江仙閨思愁與西風應有約年年同赴清秋舊游簾幕記楊州一灯人着夢雙鴈月當樓羅帶鴛鴦塵暗澹更須整頓風流天涯萬一見温柔瘦應縁此瘦羞亦爲郎羞齊天樂秋㒷闌干只在鷗飛處年年怕吟秋興断浦沈雲空山挂雨只有詩愁千頃波聲未定望舟尾拖凉渡頭籠暝正好登臨有人歌罷翠簾冷悠然䰟墮故里柰閑情未了還𬒳吹醒拜月虚簷聽蛩壊砌誰復能憐嬌俊憂心耿耿寄桐葉芳題冷楓新詠莫遣秋聲樹頭喧夜永齊天樂湖上即席分韻淂羽字鴛鴦拂破蘋花影低低趂凉飛去画裏移舟詩邊就夢葉葉碧雲分雨芳游自許過栁影間波水花平渚見說西風爲人吹恨上瑶樹闌干斜照未滿杏墻應望断春翠偷聚淺約挼香深盟搗月誰是窓間青羽孤筝㡬柱問因甚參差蹔成離阻夜色空庭待㱕聽俊語雙雙燕詠燕形容尽矣過春社了度簾幕中間去年塵冷差池欲住試入舊巢相並還相彫梁藻井又軟語商量不定飄然快拂花梢翠尾分開紅影芳徑芹泥雨潤愛貼地爭飛競誇輕俊紅樓㱕晚看足栁昏花暝應自棲香正穏便忘了天涯芳信愁捐翠黛雙蛾日日画欄獨凭姜堯章極称其栁昏花暝之句東風第一枝春雪巧氷蘭心偷黏草甲東風欲障新暖謾凝碧瓦難留信知暮寒較淺行天入鏡做弄出輕鬆纎軟料故園不捲重簾悞了乍來雙燕青未了栁四白眼紅欲㫁杏開素面舊游憶着山隂厚盟遂妨上苑寒炉重暖便放慢春衫針線恐鳯鞋挑菜㱕來萬一㶚橋相見結句尤為姜堯章拈出東風第一枝元夕酒館歌雲灯街舞綉笑聲喧似簫鼓太平京國多歡大酺綺羅㡬處東風不動照花影一天春聚耀翠光金縷相交苒苒細吹香霧羞醉玉少年手度懐豔雪舊家伴侣閉門明月関心倚窓小梅索句吟情欲断念嬌俊知人無據想䄂寒珠絡藏香夜乆帶愁㱕去換巢鵉鳯春情人若梅嬌正愁横断塢夢繞溪橋倚風融漢粉坐月怨秦簫相思因甚到纎腰定知我今無䰟可銷佳期晚謾㡬度涙㾗相照人悄天渺渺花外語香時透郎懷抱暗握荑苗乍甞櫻顆猶恨侵堦芳草天念王昌忒多情換巢鵉鳯敎偕老温柔郷醉芙蓉一帳春曉過龍門春愁醉月小紅樓錦瑟箜篌夜來風雨曉來収㡬點落花饒栁絮同爲春愁寄信問晴鷗誰在芳洲緑波寕處有蘭舟獨對舊時携手地情思悠悠瑞鶴仙紅梅館娃春睡起爲發粧酒煖臉霞輕􅕹氷霜一生裏厭從來冷澹粉腮重洗胭脂暗試便無限芳穠氣味向黄昏竹外寒深醉裏爲誰偷倚嬌媚春風模様霜月心腸痩來肌躰孤香細細吹夢到杏花厎𬒳髙樓横筦一聲驚断却對南枝洒淚謾相思桃葉桃根舊家姊妺滿江紅九月廿一日出京懐古緩轡西風歎三宿遟遟行客桑梓外鋤耰漸入栁坊花陌雙闕逺騰龍鳯影九門空鎻鴛鵉翼更無人擫帝郷逺相對兩蒼顔玉圍腰金繫肘繡籠鞍郷人衮衮嚴近五馬度荆山収拾五湖氣度卷束蟠胷兵甲春意滿人間天錫公純嘏氣象自平寛水調歌頭孫靖州生日九十九峰下百二十年州西風吹起客夢月滿驛南楼影入天河左界辰在壽星向上還是去年秋要和木蘭曲載酒壽君侯天邊信雲外歩去難留壽觴庭院依舊已帶别離愁離合鍾情未免富貴関人何事浪白世間頭將相時來作身健百無憂鷓鴣天范靖州十月卄一日生日辛丑八月御筆劉某文名乆著史學尤精可特賜同進士出身六州歌頭牡丹維摩病起兀坐等枯株清晨裏誰來問是文殊遣名姝奪盡羣芳色浴才出醒初解千萬態嬌無力困相扶絶代佳人不入金張室却訪吾廬對茶鐺禅榻笑殺此翁癯瑶砌金壺始消渠憶承平日䌓華事修成譜寫成圖竒絶甚歐公記蔡公書古來無一自京華隔問姚魏竟何如多應是綵雲散劫灰餘野鹿銜將花去空囬首河洛丘墟謾傷春吊古夢遶漢唐都歌罷欷歔水調歌頭和西外判宗湖楼韻君看郭西景渾不减孤山飛樓突兀百尺輪奐侈前觀絶唱新詞寡和墮淚舊碑無恙往事付驚瀾不見遼鶴返惟對水鷗閑又何必珠翠盛管絃􅌚唾壺麈尾瀟洒領客上髙寒丞相功存宗廟祭酒義兼家國世事尚相関風月寓意耳莫作晉人看沁園春夢方孚若何處相逢登宝釵樓訪銅雀臺喚厨人斫就東溟鯨鱠圉人呈罷西極龍媒天下英雄使君與操餘子誰堪共酒盃車千乘載燕南代北劔客竒材飲酣鼻息如雷誰信𬒳晨雞催喚囬嘆年光過盡功名未立書生老去機會方來使李將軍遇高皇帝萬戸侯何足道㢤推衣起但悽凉感舊慷慨生哀沁園春送包尉我羡君㱕一路秋風芙蓉木犀想慈顔望乆靈烏乍噪新眉画就郎馬頻嘶忙脫征衫快呼斗酒細與家人說建谿情知道這中年懷抱生怕分携丈夫南北東西應笑殺離筵粉淚啼悵佳人來未碧雲冉冉王孫去後芳草萋萋明日相思山重水複古道人稀茅店雞元龍老有髙樓百尺誰共登梯沁園春寄鍾賢良我夢見君帶飛霞冠着宫錦𫀆與牧之髙會齊山風月謫仙同載采石雲濤萬卷星羅千篇電掃不學窮兒賦楚騷掀髯處有魚龍起舞狐兎悲嘷英雄埋没蓬蒿暗摸索當年劉與曹嘆事機易失功名難偶誅茅西崦種秫東臯柵有雞豚庭無羔鴈不是先生索價髙人間窄待相期海上共摘蟠桃沁園春贈孫季蕃歳莫天寒一見飄然幅巾布裘侭侵雲烏道躋攀絶頂拍天鯨浸笑傲中流疇昔期君𬗋髯鐵面生子當如孫仲謀誰知道到中年猶未建節對侯南來萬里何求因感慨喬公成逺遊悵名姬駿馬都如昨夢隻雞斗酒難到新丘天地無情功名有數千古英雄只麽休平生客獨羊曇一箇淚洒西州沁園春寄九華葉賢良一卷隂符二石硬弓百斤宝刀更玉花驄噴鳴鞭電抹烏絲欄展醉墨龍跳牛角書生虬鬚豪客談笑皆從折簡招依俙記曾請纓係粤草檄征遼當年目視雲霄誰信道凄凉今折腰悵燕然未勒南㱕草草長安不見北望迢迢老去胸中有些磊塊歌罷猶湏着酒澆休休也但帽邊鬢减鏡裏顔凋摸魚兒賞海棠甚春來冷煙凄雨朝朝遟了芳信驀然作暖晴三日又斍萬殊嬌困天怎忍潘令老不成也没看花分才情减尽悵玉局飛仙石湖絶筆孤負這風韻傾城色懊惱佳人薄命墻頭岑寂誰問東風日暮無聊頼吹淂胭脂成粉君細認花共酒古來二事天猶吝年光去迅謾緑葉成隂蒼苔滿地做取異時恨摸魚兒感歎恠新來倚樓看鏡清狂渾不如舊莫雲千里傷心色那更乱蝉踈栁凝望乆愴故國百年漢闕誰囬首功名大謬歎采藥名山讀書精舍此計何時就封侯事乆矣輸人妙手扁舟聊作漁叟髙冠長劔都閑物世上切身惟酒千載後君試看拔山扛鼎俱烏有英雄骨朽問頋曲周郎而今還解來聽小詞否念奴嬌菊花老夫白首尚鬼嬉廢圃一畨料理飡飲落英并墜露重把離騷枮起冷艶幽香輕黄淡白占断西風裏飛來雙蝶遶叢欲去還止嘗試銓次羣芳梅花差可伯仲之間耳佛說諸天金色界未必莊嚴如此尚友靈均定交元亮結好天隨子籬邊坡下一杯聊泛霜蘂賀新郎欎孤臺絶頂規危榭跨髙寒鳥飛不過雲生其下斤斵無聲人按堵翕忽青紅变化覽城郭山川如画閣老鳯樓修造手笑談間突出凌雲厦臺上景買無價唾壺麈尾登臨暇似當年文章太守歐陽公也傾倒贑江供硯滴判断雪天月夜更喚取鄒枚司馬銅雀凌歊歌舞罷訪殘磚断甓無存者餘翰墨𬒳風雅賀新郎春景動地東風起画橋西繞溪桑柘漫山桃李寂寂墻隂蒼苔路猶印前囘屐齒驚歳月飈馳雲駛太息攀翻長亭樹是先生手種今如此君不樂𣣔何俟傍人錯會淵明意笑斯翁皇皇汲汲登山臨水佳處徑呼藍輿去彷彿柴桑栗里從我者門生兒子嘗試平章先賢傳屈原醒不似劉伶醉判茗艼卧花厎賀新郎芍藥一夢楊州事画堂深金瓶萬朶元戎髙會座上祥雲層層起不减洛中姚魏歎别後関山迢遞國色天香何處在想東風猶憶狂書記驚歳月一弹指數枝清暁煩馳騎向小窓依俙重見蕪城佳麗料得花憐儂消瘦儂亦憐花顦顇謾悵望竹西歌吹老矣應無騎鶴日但春衫點點當時淚那更有舊情味賀新郎送陳子華赴真洲北望神州路試平章這埸公案向誰分付記得太行兵百萬曾入宗爺駕御今把作握蛇騎虎君去東京豪傑喜看投戈下拜真吾父談笑裏定齊魯兩淮蕭索惟狐兎問當年祖生去後有人來否多少新亭揮淚客不夢中原塊土這事業湏由人做堪笑書生心膽怯向車中閉置如新㜏空目送塞鴻去賀新郎端午深院榴花吐画簾開綵衣紈扇午風清暑兒女紛紛新結束時様釵符艾虎早已有游人觀渡老大逢埸慵作戯任白頭年少爭旗鼓溪雨急浪花舞靈均標致高如許憶生平既紉蘭佩又懐椒糈誰信騷䰟千載後波厎垂涎角黍又說是蛟饞龍怒把似而今醒到了料當年醉死差無苦聊一笑吊千古賀新郎九日湛湛長空黑更那堪斜風細雨乱山如織老眼平生空四海頼有高樓百尺看浩蕩千崖秋色白髮書生神州淚侭凄凉不向牛山滴追往事去無迹少時自負凌雲筆到如今春華落尽滿懐蕭瑟常恨世人新意少愛說南朝狂客把破帽年年拈出若對黄花孤負酒怕黄花也笑人岑寂鴻北去日西匿賀新郎遊水東周家花園溪上収殘雨倚危欄薄綿乍脫日隂亭午閙市不知春色處散在荒園廢墅漸小白長紅無數客子雖非河陽令也隨縁暫作鶯花主那可負甕中醑碧雲四合千岩暮恨匆匆余方有事子姑㱕去趂取羣芳未揺落暇日提魚就煑歎激電光隂如許囘首明年何處在問桃花尚記劉郎否公莫笑醉中語賀新郎郡㑹聞妓歌有感妾出扵㣲賤少年時朱絃弹絶玉笙吹遍粗識詩家関雎乱羞學流鶯百囀揔不涉閨情春怨誰向西鄰公子說要珠鞍迎入梨花院身未動意先懶主家十二樓連苑那人人靚粧按曲綉簾初捲道是画堂簫管唱笑殺街坊拍衮廻首望侯門天遠我有平生離鵉操頗哀而不愠㣲而婉聊一奏更三歎生查子上元戲陳敬叟䌓灯奪霽華戯鼓催明發風物昔時同况味中年别淺画鏡中眉深拜樓西月人散市聲収漸人愁時節臨江仙種海棠作落魄長官江海客少豪萬里㝷春而今憔悴向溪濵断無觴詠㒷惟有簿書塵手接海棠三百本等閑粧點芳辰它年絳雪映紅雲丁寕風與月記取種花人滿江紅送王實之天壌王郎數人物方今第一談笑裏風霆驚座雲煙生筆落落元龍湖海氣琅琅董相天人䇿問如何十載尚青衫諸侯客易愛厎些官職難保厎些名節擬閉門投轄劇談三日疇昔評君天下宝當為天下蒼生惜向臨分慷慨出商聲摧金石滿江紅飲海棠花下老子年來頗自許心腸鐵石尚一點消磨未尽愛花成癖懊惱每嫌寒勒住丁寕莫𬒳晴烘拆柰暄風烈日太無情如何得張画燭頻頻惜慿素手輕輕摘更一畨雨過彩雲無跡今日不來花下飲明朝空向枝頭覔對殘紅滿院杜䳌啼添愁寂滿江紅范尉梅谷赤日黄埃夢不到清溪翠麓空健羡君家别墅幾株幽獨骨冷肌清偏要月天寒日暮尤宜竹想主人杖屦日千囘山南北寕委澗嫌金屋寕映水羞銀燭歎出塵風韻背時粧束競愛東鄰姬傳粉誰怜空谷人如玉笑林逋何遜謾為詩無人讀滿江紅夜雨凉甚忽動從戎之㒷金甲琱戈記當日轅門初立磨盾鼻一揮千帋龍蛇猶濕鐡馬暁嘶營壁冷樓船夜渡風濤急有誰憐猨臂故将軍無功級平戎䇿從軍什零落盡慵収拾把茶經香傳時時温習生怕客談榆塞事且教兒誦花間集歎臣之壮也不如人今何及卜筭子手植海棠盛開風雨作祟輒作小詞二首盡是手成持合得天饒借風雨扵花有甚讐作意相陵藉做暖逼教開做冷催教謝不負明年花下人只負栽花者卜筭子片片蝶衣輕點點猩紅小人道東君不惜花百種千般巧朝見樹頭䌓莫見枝頭少人道東君果惜花雨打風吹了昭君怨牡丹曾看洛陽舊譜只許姚黄獨歩若比廣陵花太戯它舊日王侯園圃今日荆榛孤兎君莫說中州怕花愁昭君怨瓊花后土祠中標韻天上人間一本道號玉真妃字瓊姬我與花曾半面流落天涯相見莫把玉簫吹怕驚飛清平樂别意休弹别鶴淚與絃俱落歡事中年如水薄懐抱那堪作惡昨宵月露高樓今朝烟雨孤舟除是無身方了有身長有閑愁清平樂五月十五夜翫月纎雲掃跡萬頃玻瓈色醉跨玉虹游八極歴歴天青海碧水晶宫殿飄香羣仙方按霓裳消得幾多風露变教人世清凉清平樂風高浪快萬里騎鯨背曾識常娥真體態素面元無粉黛身游銀闕珠宫俯看積氣濛濛醉裏偶摇桂樹人間喚作凉風清平樂頃在維楊陳師文参議家舞姬絶妙賦此宫腰束素只怕能輕舉好築避風臺護取莫遣驚鴻飛去一團雪玉温柔笑顰俱有風流貪與蕭郎眉語不知舞錯伊州玉樓春戯呈林節推郷兄并下一首年年躍馬長安市客裏似家家似寄青錢換酒日無何紅燭呼盧霄不寐易挑錦婦機中字難得玉人心下事男兒西北有神州莫滴水西橋畔淚菩薩蛮小鬟解事高燒燭羣花圍繞樗蒱局道是五陵兒風騷滿肚皮玉鞭鞭玉馬戯走章臺下笑殺㶚陵翁騎驢風雪中憶秦娥感舊春酲薄夢中毬馬豪如昨豪如昨月明横笛暁寒吹角古來成敗難描摸而今却悔當𥘉錯當𥘉錯鐡衣猶在不堪重着憶秦娥梅謝了塞垣凍解鴻㱕早鴻㱕早慿伊問訊大梁遺老浙河西靣邉聲悄汴河南北炊烟少炊烟少宣和宫殿冷烟衰草憶秦娥遊人絶緑隂滿野芳菲歇芳菲歇飬蚕天氣采茶時節枝頭杜宇啼成血陌頭楊栁吹成雪吹成雪淡烟㣲雨江南三月長相思令惜梅寒相催暖相催催了開時催謝時丁寕花放遟角聲吹笛聲吹吹了南枝吹北枝明朝成雪飛長相思令餞别風蕭蕭雨蕭蕭相送津亭折栁條春愁不自聊烟迢迢水迢迢凖擬江邉駐画撓舟人頻報潮浪淘沙旅况𥿄帳素屏遮全似僧家無端霜月闖窓紗喚起玉関征戍夢幾疊寒笳歳晚客天涯鬢髮蒼華今年衰似去年些詩酒近來都减價孤負梅花一剪梅中秋解宜春郡印陌上行行恠府公還是文窮還是詩窮下車上馬太匆匆來是春風去是秋風階䘖免得管兵農嬉到昏鐘睡到齋鍾不湏提岳與知宫喚作溪翁喚作山翁踏莎行甲午重九牛山作鼓喧空鵾絃沸暁櫻梢㣲破想明年更好傳柑宴罷醉扶狨座雨中花慢春日旅况縹蔕緗枝玉葉翡英百梢争趂春忙正雨後蜂粘落絮燕撲晴香遺䇿誰家蕩子唾花何處新粧想流紅有恨拾翠無心徃事凄凉春愁如海客思翻空帶圍只看東陽更那堪玉笙度曲翠羽傳觴紅淚不勝閨怨白雲應老他郷夢囬羇枕風驚庭樹月在西廂滿庭芳留别栁裊金絲棃鋪香雪一年春事方中燭前一見花艶斍羞紅枕臂香痕未落舟横岸作計匆匆明朝去暮天平水雙槳碧雲東隔離歌一闋琵琶聲断燕子樓空歎陽臺夢杳行雨無蹝後㑹芙蕖未老從今去日望㱕鴻愁如織断腸啼鴂饒舌訴東風六州歌頭上廣西張帥慿深負阻蠭午肆奔騰龍江上妖氛漲鯨海外白波驚羽檄交飛急玉帳静金韜閟恢逺馭振長纓宻分兵細草黄沙渺渺西関路風裊高旌聽飛霜令肅堅壁夜無聲鼓角何神地中鳴看追風騎攅雲槊雷野轂激天鉦飛箭集旄頭墜長圍掩郭東傾振旅觀旋凱笳鼓競綉旗明刀換犢戈藏革士休營黄色赤雲交映論功何止蔡州平想環城蒼玉深刻入青冥永詔來今水調歌頭中秋天淡四垂幕雲細不成衣西風掃盡纎翳凉我鬢邉絲破匣菱花飛動跨海清光無際草露滴明璣杯到莫停手何用問來期坐虚堂揩病眼泝流輝雲山應有幽恨瑶瑟掩金徽河漢無聲自轉玉兎有情亦者世事巧相違一寫謫仙怨雙淚滿君頤中興以来絶妙詞選卷之七
