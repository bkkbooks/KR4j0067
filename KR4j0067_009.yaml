front:
  text: 簫吟斷素箋恨切夜寒鴻起又何苦凄凉客裏負草堂春緑竹溪空翠落葉西風吹老幾畨塵世從前諳盡江湖味聽商歌㱕興千里露侵宿酒踈簾淡月照人無寐
  hash: sha256:97f5241808199906cdd5d0d3dd4287f75fefa45d2edb988dbd3b025ca3001c74
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0067_SBCK_009-1a}
body:
  text: 貂裘換酒寓賀新郎乙未冬别馮可久笛喚春風起向湖邊臘前折栁問君何意孤負梅花立晴晝一舸凄凉雪底但小閣琴棋而已佳客清朝留不住為康廬只在家窗裏湓浦去兩程耳草堂舊日談經地更從容南山北水庾樓重倚萬卷心胸幾今古牛斗多年𬗋氣正江上風寒如此且趂霜天鱸魚好把貂裘換酒長安市明夜去月千里惟甸春寓念奴嬌丙申歲游髙沙訪淮海事迹短髯懷古更文遊臺上秋生吟興聞說坡仙來把酒月底頻留清影極目平蕪孤城四水畫角西風徑曲欄猶在十分心事誰領詞卷空落人間黃樓何處回首愁深省斜照寒鴉知幾度夢想當年名勝只有山川曾窺翰墨倣佛餘風韻舊遊休問栁花淮甸春冷如此江山寓齊西風揚子江頭路扁舟雨晴呼渡岸隔瓜洲津橫蒜石搖盡波聲子古詩仙一去但對峙金焦斷磯青樹欲下斜陽長淮渺渺正愁豫中流笑與客語把貂裘為浣半生塵土品水烹茶看碑憶鶴恍似舊曾遊處聊慿陸諝問八極神遊肯重來否如此江山更蒼煙白鷺釣船笛寓好事近載酒嶽陽樓秋入洞庭深碧極目水天無際正白蘋風急月明不見宿鷗驚醉把玉欄拍誰解百年心事恰釣船橫笛廣寒秋寓鵲橋仙杯行將半月來猶未瀟灑水亭無暑清宵數客一欄秋對氷雪荷花似語雄邊臺上文遊臺上咫尺紅雲容與天風吹送廣寒秋正畫舸湖光佳處月當窗寓霜天曉角看朱成碧曾醉梅花側相遇匆匆相别又爭似不相識南北千里隔幾時重見得最苦子規啼處一片月當窗白山漸青寓長相思山無情水無情楊栁飛花春雨晴征衫長短亭擬行行重行行吟到江南第幾程江南山漸青碧雲深寓憶秦娥風凄凄井欄絡緯驚秋啼驚秋啼凉侵好夢月正樓西卷簾望月知心誰關河空隔長相思碧雲暮合有美人兮東仙寓沁園春馮可遷號豫為東仙故賦東澤先生誰說能詩興到偶然但平生心事落花啼鳥多年盟好白石清泉家近宫亭眼中廬阜九疊屏開雲錦邊出門去且掀髯大笑有釣魚船一絲風裏嬋姢愛月在滄浪上下天更叢書觀遍筆牀靜晝蓬窗睡起茶竈踈煙黃鶴來遲丹砂成未何日風流葛稚川人間世聽江湖詩友號我東仙南浦月寓點絳唇賦滿湘漁父來剪蓴絲江頭一陳鳴蓑雨孤蓬㱕路吹淂蘋風暮短髮蕭蕭笑與沙鷗語休㱕去玉龍嘶處邀月過南浦沙頭雨寓點絳唇帶醉㱕時月華猶在吹簫處曉愁情緒忘却匆匆語客裏風霜詩鬢空如許江南去岸花迎櫓遙隔沙頭雨花自落寓謁金門春寂寞簾砥蕙爐煙薄聽盡㱕鴻書怎託相思天一角象筆鵉箋閒却秀句與誰商略睡起愁懷何處著無風花自落埀楊碧寓謁金門花半濕睡起一窗晴色千里江南真咫尺醉中㱕夢直前度蘭舟送客雙鯉沉沉消息樓外埀楊如此碧問春來幾日欄干萬里心寓憶王孫小樓栁色未春深湘月牽情入苦吟翠袖風前冷不禁怕登臨幾曲欄于萬里心杏梁燕寓解連環小樓春淺記鈎簾看雪袖粘芳片似不似栁絮因風更細與品題屢呵氷硯宛轉吟情縱真草鳯箋都遍到燈前笑謔酒祓峭寒移盡更箭而今栁隂滿院却花空雪似人隔春逺歎萬事流水斜陽謾嬴淂前詩醉汙團扇脉脉重來算唯有畫欄曾見把千種舊愁付與杏梁語燕比梅寓如夢令深夜沉沉尊酒酒醒客衾寒透城角挾霜飛吹淂月如清晝僝僽僝僽比著梅花誰瘦月上瓜洲寓相見歡南徐多景樓作江頭又見新秋幾多愁塞草連天何處是神州英雄恨古今淚水東流唯有漁竿明月上瓜洲月砥修簫譜寓祝英臺近乙未之秋髙郵朱史君錢塘北關舟中客西湖聽夜雨更向别離處小小船窗香雪照尊爼斷腸一曲秋風行雲不語揔寫入征鴻無數認眉嫵喚醒岩壑風流丹砂有竒趣羞殺秦郎淮海謾千古要看自作新詞雙鵉飛舞趂月砥重修簫譜一絲風寓訴衷情泊松江作壺山居士未老心先懶愛學道人家辦竹凡蒲團茗捥青山可買小結屋三間開一徑俯清溪修竹栽教滿客來便請隨分家常飯若肯小留連更薄酒三杯兩盞吟詩度曲風月任招呼身外事不關心自有天公管沁園春送戴石屏㱕去來兮田園將蕪云胡不㱕既有詩千首如斯者少行年七十從古來稀地闕東南天傾西北人事何緣有足時江湖上轉不如前日步步危機石屏自有柴扉占海岸潮頭岸一磯喚綵衣孫子携壺挈榼白頭翁媪舉按齊眉身外聲名世間夢幻萬事一醒無是非書來往都不須長語直寫心期賀新郎題雪堂喚起東坡老問雪堂幾畨興廢斜陽衰草一月有錢三十塊何苦抽身不早又砥用北門摛藻儋耳蠻煙添老色和陶詩翻𬒳淵明惱到砥是忘言好周郎英發人間少謾依然烏鵲南飛山髙月小歲月堂堂留不住此世何時是了算不滿英雄一笑我有豐淮千斗酒把新愁舊恨都傾倒三弄笛楚天曉賀新郎七夕靈鵲橋初就記迢迢重湖風浪去年時候歲月不留人易老萬事茫茫宇宙但獨對西風搔首巧拙豈關今夕事奈癡兒騃女流傳謬添話柄栁州栁道人識破灰心久只好風凉月佳時踈狂如舊休笑雙星經歲别人到中年已後雲雨夢可曾常有雪藕調氷花熏茗正梧桐雨過新凉透且隨分一杯酒滿江紅秋感舉扇西風又十載重遊秋浦對舊日江山錯愕鬢絲如許世事興亡空感慨男兒事業誰堪數𬒳老天開眼看人忙成今古江上路喧鼙鼓山中地紛豺虎紅玉階前問何事翩然引去湖海上一汀鷗鷺半帆煙雨報國無門空自怨濟時有䇿從誰吐過埀虹亭下繫扁舟鱸堪煮拚一醉留君住歌一曲送君路遍江南江北欲㱕何處世事悠悠渾未了年光冉冉今如許試舉頭一笑問青天天無語滿江紅齊山繡春臺十二年前曾上到繡春臺頂雙腳健不煩笻杖透岩穿嶺老去漸消狂氣習重來依舊佳風景想牧之千載尚神遊空山冷山之下江流水江之外淮山暝望中原何處虎狼猶梗勾蠡規模非淺近石符事業真俄頃問古今宇宙竟如何無人省滿江紅金陵烏衣園栁帶榆錢又還過清明寒食天一笑滿園羅綺滿城簫笛花樹淂晴紅欲染逺山過雨青如滴問江南池館有誰來江南客烏衣巷今猶昔烏衣事今難覔但年年燕子晚煙斜日抖擻一春塵土債悲凉萬古英雄迹且芳樽隨分趂芳時休虛擲水調歌頭送吳叔永文昌才惜季方去又更别元方驚心天上雙鳯接翅下髙岡萬里瞿塘煙浪一片昭亭雲月渺渺正相望夜雨連風壑此意獨凄凉杜䳌聲猶不住攪離腸黃雞白酒吾亦㱕興動家鄉人事紛紛難料世事悠悠難說何處問穹蒼肯落兒曹淚一笑付滄浪賀新郎送吳叔季侍郎說著成凄楚正塵飛岷峨灔澦兔嘷狐舞頗牧禁中留不住彈壓征西幕府便一舸月汀煙渚四塞三關天樣險問何人自闢鼪鼯路成敗事幾今古荼􅐘芍藥春將暮最無情飄零栁絮攪人離緒屈指秋風吹鴈訊應憶西湖夜雨謾歲月消磨如許上下四方男子志肯臨𡵨昵昵兒曹語呼大白為君舉賀新郎吳中韓氏滄浪亭和吳夢窗韻撲盡征衫氣小夷猶樽罍杖屨踏開花事解后山翁行樂處何似烏衣舊里歎荒草舞臺歌地百歲光隂如夢斷算古今興廢都如此何用灑兒曹淚江南自有漁樵隊想家山猿愁鶴怨問人㱕未寄語寒梅休放盡留取三花兩蘂待老子領些春意皎皎風流心自許侭何妨瘦影橫斜水煩翠羽伴醒醉賀新郎用趙用父左司韻送鄭宗丞又是春殘去倚東風寒雲淡日墮紅飄絮燕社鴻秋人不問侭管吳笙越鼓但短髮星星無數萬事惟消彭澤醉也何妨袖卷長沙舞身與世只如許闌干拍手間情緒便明朝蒼煙白鷺北山南浦笑指午橋橋畔路簾幕深深院宇尚趂淂栁煙花霧我亦故山猿鶴怨問何時㱕棹雙溪渚歌一曲恨千縷賀新郎寄趙南仲煙樹瓜洲岸望旌旗獵獵遙空故人天逺不似沙鷗飛淂渡直到雕鞍側畔但徙倚危闌目斷自古鍾情須我輩况人間萬事思量遍濤似雪風如箭楊州十里珠簾捲想桃根桃葉依俙舊家庭院誰把青紅吹到眼知有醉翁局假便回首舟移帆轉渺渺江波愁未了正淮山日暮雲撩亂閣酒盞倚歌扇賀新郎春感笑口開䏻幾把年年芳情冶思總拋閙裏桃杏枝頭春才半寒食清明又是但歲月飈飛川逝回首秦樓雙燕語到如今目斷斜陽外將往事試重記香羅尚有相思淚笑人生新愁易積舊歡難繼水上流紅無覔處還隔關山萬里但贏淂新來憔悴昨夜東風顛狂後想餘芳盡是飄零砥詞寫就倩誰寄滿庭芳春感漠漠春隂踈踈春雨鵓鳩喚起春眠小園人靜獨自倚秋千又見飄紅墮雪芳徑裏都是花鈿年年事間愁間悶桂在緑楊邊尋思都遍了功名竹帛富貴貂蟬但身為利鎖心𬒳名牽爭似依山傍水數椽外二頃良田無縈絆炊粳釀秫長是好花天酹江月梅花曉來窗外正南枝初放兩花三蘂千古春風頭上立羞退穠桃繁李姑射神遊壽陽粧褪色界塵都洗竹扉松戶平生所寄聊耳堪笑強說和羹此君心事指髙山流水隴驛凄凉却怕被哀角城頭吹起此處關情為它凝佇淡月清霜裏巡簷河事歲寒相誓而已酹江月暇日登新樓望楊州於雲烟縹眇之間寄趙南仲端明半空樓閣把江山圖畫一時收拾白鳥孤飛飛盡處最好暮天秋碧萬里西風百年人事謾倚闌干拍凝眸何許楊州煙樹歷歷應念老子年來浮名浮利已作虛空擲三徑才尋㱕活計又是飄零為客回首平生驚心雙鬢容易成悽惻尊前一笑且由醉帽欹聲聲慢和吳夢窗賦梅持翠節料無時不作家山夢馳玉勒㱕金鳯金鳯池乃所居也一門朱𬗋環昆仲看階庭森森蘭玉慈顔歡動宰相時來須著做且舞萊衣侍奉却不信大才難用時事多難人物少便中興誰辨浯溪頌更大厦要梁棟賀新郎為後村母夫人壽瓔珞珠埀縷看花冠端容麗服𥙷陀岩主只坐塵緣蹉一念朱𬗋叢中淂度人世福夫人兼五銀鹿諸孫來定省對金屏繡幕輝雲母人頂禮栁行路所居地名栁行朝朝口誦琅函句覺從來壽仁福善老天無誤消淂天恩封福國錦誥鵉翔鳯舞聽來歲日邊佳語上殿肩輿簾蹙繡遣佳兒扶掖天應許笑陳媪三題柱有陳夫人者題閩帥片柱云嘗侍父從夫及就養三至此廨賀新郎送趙伯泳侍郎守溫陵憶昔同時召正青山親提玉尺量材廊庿當日班行比元祐北玉西珠照耀一轉首宫商移調君自烏臺登騎省覺精神風采增清峭數賢者一不肖酒酣耳熱惟長嘯便翩翩輟班荷槖一麾閩嶠堪笑狂生無用處埀老雲耕月釣這富貴非由人要疇昔評君如玉雪好翛然琴鶴風塵表清獻後又有趙賀新郎丁未守邵武宴同官此是河清宴覺朝來薰風滿入生綃團扇太守愁眉才一展且喜街頭米賤也莫管官租難辦繞砌苔錢無限數更蓮池雨過珠零亂侭買淂凌波面家山樂事真堪羡記年時荔支新熟荷筒齊勸砥事來尋蕉鹿夢嬴淂乾忙似箭笑富貴都如郵傳做了豐年還百姓便蓴鱸㱕興催張翰看卿等上霄漢摸魚兒閩漕王幼學作碧灣丹嶂堂歌此詞以墨本見寄依永和之昔元城一生清峭南都髙卧堅壁留耕便是元城樣何肯枉吾尋尺曾直筆說社稷安危屢叩龍墀額明時逐客却惠顧丹山來持翠節對此一灣碧澄清暇無奈登臨有癖梅山時訪仙迹神仙偏喜公心事一見莞然前席間不得有先見蓍龜消得君王憶天閽不隔要濟險孤舟支傾一柱公外向誰覔沁園春迎方右史德潤首尾四年臺省好官都做一回便前頭更有合當做砥何妨且恁猛省㱕來甲第新成開尊行樂脆管繁絃十二叉回頭笑這狂生無用削盡官階狂生真箇狂㦲潑性氣年來全未灰有龍鱗鳯翼不能攀附牛衣漁具早已安排爛煮園𬞞熟煨山芋白髮蒼顔窮秀才官休做莫狂無處著送去瓊崖念奴嬌熙春臺宴同官層臺雲外閲古今多少興衰成敗老木千章若箇是南國甘棠遺愛羣籟號風繁隂蔽日有此清涼界賔朋在坐朗然心目明快更向會景亭前登髙吊古此景何人會歲歲春來春又去獨有靈臺春在早稻炊香晚禾搖穗管取三登泰釀成春酒把杯行樂須再河梁携手别臨岐語共約踏青㱕自雙燕再來斷無音信海棠開了還又參差料此際笑隨花便面醉騁錦鄣泥不憶故園粉愁香怨忍教華屋緑慘紅悲萬家歌舞地生踈久塵暗鳯縷羅衣何限可憐心事難訴歡期但兩點愁蛾才開重斂幾行清淚欲制還埀爭表為郎憔悴相見方知訴衷情旅思一鈎新月淡於霜楊栁漸分行征塵厭堆襟𬒮雞唱促晨裝淮水闊楚山長暗悲傷重陽天氣杯酒黃花還寄他鄉淺碧芙蓉素艷亭亭前身阿嬌記湘濵露冷酥容倍潔華清水滑酒暈全消瑶剪豐肥雲翻碎蕚白羽鮮明時自搖風流處是古香幽韻時度鮮颷瓊枝璧月清標對千朵嬋姢傾翠瓢况水晶臺榭低迷淨緑氷霜詞調隱約輕橈細認金房鍾竒孕秀已覺青襟橫素腰西風晚看花開十丈玉井非遙金菊對芙蓉沙邑宰綰琴妓用舊韻戲之淺拂春山慢橫秋水玉纎間理絲桐按清泠繁露淡竚悲風素絃瑶軫調新韻顫翠翹金簇芙蓉疊蠲重鎖輕挑慢摘特地情濃泛商刻羽無窮似和鳴鵉鳯律應雌雄問髙山流水此意誰同箇中只許知音聽有茂陵車馬雍容晝簾人靜琴心三疊時倒金鍾水調歌頭殘臘捲愁去春至莫間愁榮枯會有成說無處著機謀身世石中𫾣火富貴草頭埀露何用苦貪求三尺布衣劔千載赤松遊憶親朋方丱角揔白頭羊腸世路巇嶮莫莫且休休選甚范矦髙爵遮莫陶公巨産爭似五湖舟萬事付蝸角止坎謾乘流玉樓春栁梢緑小眉如印乍暖還寒猶未定惜花長是為花愁殢酒却嫌添酒病蠅頭蝸角都休競萬古豪華同一盡東君曉夜促㱕期三十六畨花遞信中興以來絶妙詞選卷之九
