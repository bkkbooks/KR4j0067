front:
  text: 園林主
  hash: sha256:c5c71dc3d324cd6c889456cd9df3a92e125e2697c3e3cb9fa6e61a7e7f1d2aa3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0067_SBCK_006-1a}
body:
  text: 水龍吟海棠東君直是多情好花一夜都開盡杏梢零落藥欄遲暮不教寧靜風度秋千日移簾幕翠紅交映正太真浴罷西施濃抹都沈醉嬌相稱磨遍緑窗銅鏡挽春衫不堪比並暮雲空谷佳人何處碧苔侵徑睡裏相看酒邊凝想許多凮韻問因何却欠一些香味惹傍人恨臨江仙上元人意舒間春事到徐徐弄日微雲翠鬟飛繞閙蛾羣煙橫沽酒市風轉落梅村歲事一新人半舊相逢際晚醺醺花間亭館栁間門尅除風雨外排日醉紅裙月華清憶别瑟瑟秋聲蕭蕭天籟滿庭搖落空翠數遍丹楓不見葉間題字人何處千里嬋姢愁不斷一江流水遙睇見征鴻幾點碧天無際悵望月中仙桂問竊藥佳人誰與同歲把鏡當空照盡别離情意心裏恨莫結丁香琴上曲休彈秋思怕裏又悲來老却蘭臺公子賀聖朝春遊遊人拾翠不知逺𬒳子規呼轉紅樓倒影背斜陽墜幾聲絃管荼䕷香透海棠紅淺恰平分春半花前一笑不須慳待花飛休怨魚遊春水怨别池塘生春草數盡歸鴻人未到天涯目斷青鳥尚賖音耗曉月頻窺白玉堂暮雨還濕青門道巢燕引雛乳鶯空老庭際香紅倦掃乾鵲休來枝上噪前回準擬同它翻成病了欲題紅葉慿誰寄獨抱孤桐無心挑眉間翠攢鬢邊霜早海棠春春景栁腰暗怯花風弱紅映秋千院落歸逐燕兒飛斜撼真珠箔滿林翠葉胭脂蕚不忍頻頻覷著護取一庭春莫彈花間鵲鷓鴣天閨思睡鴨裴回煙縷長日髙春困不成粧步欹草色金蓮潤撚斷花鬢玉笋香輕洛浦笑巫陽錦紋親織寄檀郎兒家閉戶藏春色戲蝶遊蜂不敢狂末二句有深意歸朝􅌚春遊聽得提壺沽美酒人道杏花深處有杏花狼藉鳥啼風十分春色今無九麝煤銷永晝青煙飛上庭前栁畫堂深不寒不暖正是好時候團團寶月慿纎手暫借歌喉招舞袖真珠滴破小槽紅香肌縮盡纎羅瘦投分須白首黃金散與親和舊且銜杯壯心未落風月長相守孤鵉早春沙堤香軟正宿雨初收落梅飄滿可奈東風暗逐馬蹄輕捲湖波又還漲緑粉墻隂日融煙暖驀地刺桐枝上有一聲春喚任酒簾飛動畫樓晚便指數燒燈時節非逺陌上呌聲好是賣花行院玉梅對粧雪衰草愁煙亂鴉送日風沙回旋平野拂雪金鞭欺寒茸帽還記章臺走馬誰念漂零久謾嬴得幽懷難寫故人清沔相逢小窗間共情話長恨離多會少重訪問竹西珠淚盈把鴈磧沙平漁汀人散老去不堪遊冶無奈苕溪月又喚我扁舟東下甚日歸來梅花亂零春夜一蕚紅人日長沙登定王臺古城隂有官梅幾許紅蕚未宜簮池面氷膠墻腰雪老雲意還又沉沉翠藤共間穿徑竹漸笑語驚起卧沙禽野老林泉故王臺榭呼喚登臨南去北來何事蕩湘雲楚水目極傷心朱戶黏雞金盤簇燕空嘆時序侵尋記曾共西樓雅集想埀栁還裊萬絲金待得歸鞍到時只怕春深楊州慢中吕宫淳熙丙申至日余過維楊夜雪初霽薺夌彌望入其城則四顧蕭條寒水自碧暮色漸起戍角悲吟豫懷愴然感慨今昔因自度此曲千岩老人以為有黍離之悲也此後凡載宫調者並是自製曲惟左名都竹西佳處解鞍少駐初程過春風十里盡薺麥青青自胡馬窺江去後廢池喬木猶厭言兵漸黃昏清角吹寒都在空城杜郎俊賞算如今重到須驚縱豆䓻詞工青樓夢好難賦深情二十四橋仍在波心蕩冷月無聲念橋邊紅藥年年知為誰生驀山溪題錢氏溪月與鷗為客緑野留吟屐兩行栁埀隂是當年仙翁手植一亭寂寞煙外帶愁橫荷苒苒展涼雲橫卧虹千尺才因老盡秀句君休覔萬緑正迷人更愁入山陽夜笛百年心事惟有玉欄知吟未了放船回月下空相憶點絳唇丁未冬遇吳松燕鴈無心太湖西畔隨雲去數峯清苦商略黃昏雨第四橋邊擬共天隨住今何許憑闌懷古殘栁參差舞暗香仙吕宫辛亥之冬豫載雪詣石湖止既月授簡索句且徴新聲作此兩曲石湖把玩不已使工妓隸習之音節諧婉乃命之曰暗香踈影舊時月色算幾畨照我梅邊吹笛喚起玉人不管清寒與攀摘何遜而今漸老都忘却春風詞筆但怪得竹外踈花香冷入瑶席江國正寂寂嘆寄與路遙夜雪初積翠尊易泣紅蕚無言耿相憶長記曾携手處千樹壓西湖寒碧又片片吹盡也幾時見得踈影仙吕宫苔枝綴玉有翠禽小小枝上同宿客裏相逢籬角黃昏無言自倚修竹昭君不慣胡沙逺但暗憶江南江北想珮環月夜歸來化作此花幽獨猶記深宫舊事那人正睡裏飛近蛾緑莫似春風不管盈盈早與安排金屋還教一片隨波去又却怨玉龍哀曲等恁時重覔幽香已入小窗橫幅長亭怨慢中吕宫桓大司馬云昔年種栁依依漢南今看搖落悽愴江潭樹猶如此人何以堪此語豫深愛之漸吹盡枝頭香絮是處人家緑深門戶逺浦縈回暮帆零亂向何許閲人多矣誰得似長亭樹樹若有情時不會得青青如此日暮望髙城不見只見亂山無數韋郎去也怎忘得玉環分付第一是早早歸來怕紅蕚無人為主算只有并刀難剪離愁千縷齊天樂蟋蟀中都呼為促織庾郎先自吟愁賦凄凄更聞私語露濕銅鋪苔侵石井都是曾聽伊處哀音似訴正思婦無眠起尋機杼曲曲屏山夜涼獨自甚情緒西窗又吹暗雨為誰頻斷續相和砧杵候館吟秋離宫吊月别有傷心無數豳詩謾與笑籬落呼燈世間兒女寫入琴絲一聲聲更苦宣政間有士大夫製蟋蟀吟小重山令潭州紅梅人繞湘臯月墜時斜橫花樹小浸愁漪一春幽事有誰知東風冷香逺茜裙歸鷗去昔遊非遙憐花可可夢依依九疑雲杳斷魂啼相思血都沁緑筠枝鷓鴣天元夕不出憶昨天街預賞時栁慳梅小未教知而今正是歡遊夕却怕春寒自掩扉簾寂寂月低低舊情唯有絳都詞芙蓉影暗三更後卧聽鄰娃笑語歸鷓鴣天苕溪記所見京洛風流絶代人因何風絮落溪津籠鞋淺出鴉頭襪知是凌波縹眇身紅乍笑緑長嚬與誰同度可憐春鴛鴦獨宿何曾慣化作西樓一縷雲鷓鴣天十六夜出輦路珠簾兩行埀千枝銀燭舞僛僛東風歷歷紅樓下誰識三生杜牧之歡正好夜何其明朝春過小桃枝鼓聲漸逺遊人散惆悵歸來有月知憶王孫番陽彭氏小樓冷紅葉葉下塘秋長與行雲共一舟零落江南不自由兩綢繆料得吟鵉夜夜愁湘月雙調即念奴嬌之鬲指聲也五湖舊約問經年底事長負清景暝入西山漸喚我一葉夷猶乘興倦網都收歸禽時度月上汀洲冷中流容與畫橈不點淸鏡誰解喚起湘靈煙鬟霧鬢理哀絃鴻陳玉麈談玄歎坐客多少風流名勝暗栁蕭蕭飛星苒苒夜久知秋信魲魚應好舊家樂事誰省念奴嬌吳興荷花閙紅一舸記來時長與鴛鴦為侣三十六陂人未到水佩風裳無數翠葉吹涼玉容銷酒更灑菰蒲雨嫣然搖動冷香飛上詩句日暮青蓋亭亭情人不見爭忍凌波去只恐舞衣寒易落愁入西風南浦髙栁埀隂老魚吹浪留我花間住田田多少幾回沙際歸路惜紅衣吳興荷花無射宫簟枕邀涼琴書換日睡餘無力細灑氷泉并刀破甘碧墻頭喚酒誰問訊城南詩客岑寂髙樹晚蟬説西風消息虹梁水陌魚浪吹香紅衣半狼藉維舟試望故國渺天北可惜栁邊沙外不共美人遊歷問甚時同賦三十六陂秋色琵琶仙吳興感遇雙槳來時有人似舊曲桃根桃葉歌扇輕約飛花蛾眉正竒絶春漸逺汀洲自緑更添了幾聲啼鴂十里楊州三生杜牧前事休説又還是宫燭分煙奈愁裏匆匆換時節都把一襟芳思與空階榆莢千萬縷藏鴉細栁為玉尊起舞回雪想見西出陽關故人初别秋宵吟越調古簾空墜月皎坐久西窗人悄蛩吟苦漸漏永丁丁箭壺催曉引涼颸動翠葆露腳斜飛雲表因嗟念似去國情懷暮晚煙草帶眼銷磨為近日愁多頓老衛娘何在宋玉歸來兩地暗縈繞搖落江楓早嫩約無慿幽夢又杳但盈盈泪灑單衣今夕何夕恨未了少年遊戲張斗甫雙螺未合雙蛾先斂家在碧雲西别母情懷隨郎滋味桃葉渡江時扁舟載了匆匆去今夜泊前溪楊栁津頭梨花墻外心事兩人知鬲溪梅令仙吕調無錫歸寓意好花不與殢香人浪𥻘𥻘又恐春風歸去緑成隂玉鈿何處尋木蘭雙槳夢中雲小橫陳謾向孤山山下覔盈盈翠禽啼一春淒涼犯仙吕調犯商調合肥秋夕緑楊巷陌西風起邊城一片離索馬嘶漸逺人歸甚處戍樓吹角情懷正惡更衰草寒煙淡薄似當時將軍部曲迤邐度沙漠追念西湖上小舫携歌晚花行樂舊遊在否想如今翠凋紅落謾寫羊裙等新鴈來時繫著怕匆匆不肯寄與誤後約翠樓吟雙調武昌安逺樓成月冷龍沙塵清虎落今年漢酺初賜新翻胡部曲聽氊幕元戎歌吹層樓髙峙看檻曲縈紅簷牙飛翠人姝麗粉香吹下夜寒風細此地宜有詞仙擁素雲黃鶴與君遊戲玉梯凝望久歎芳草萋萋千里天涯情味仗酒祓淸愁花嬌英氣西山外晚來還捲一簾秋霽清波引梅冷雲迷浦倩誰喚玉妃起舞歲華如許野梅弄眉嫵屐齒印蒼蘚漸為尋花來去自隨秋鴈南來望江國渺何處新詩謾與好風景長是暗度故人知否抱幽恨難語何時共漁艇莫負滄浪煙雨况有清夜啼猿怨人良苦法曲獻仙音張彥功官舍虛閣籠寒小簾通月暮色偏憐髙處樹隔離宫水平馳道湖山盡入尊爼奈楚客淹留久砧聲帶愁去屢回顧過秋風未成歸計誰念我重見冷楓紅舞喚起淡粧人問逋仙今在何許象筆鵉箋甚而今不道秀句怕平生幽恨化作沙邊煙雨玲瓏四犯越中歲暮聞簫鼓感懷疊鼓夜寒埀燈春淺匆匆時事如許倦遊歡意少俯仰悲今古江淹又吟恨賦記當時送君南浦萬里乾坤百年身世惟有此情苦楊州栁埀官路有輕盈喚馬端正窺戶酒醒明月下夢逐潮聲去文章信美知何用謾嬴淂天涯羈旅教説與春來要尋花伴侣淡黃栁正平調近客合肥空城曉角吹入埀楊陌馬上單衣寒惻惻看盡鵝黃嫩緑都是江南舊相識正岑寂明朝又寒食強携酒小橋宅怕梨花落盡成秋色燕燕飛來問春何在唯有池塘自碧側犯詠芍藥恨春易去甚春却向揚州住微雨正繭栗梢頭弄詩句紅橋二十四揔是行雲處無語漸半脫宫衣笑相顧金壺細葉千朵圍歌舞誰念我鬢成絲來此共尊爼後日西園緑隂無數寂寞劉郎自修花譜眉嫵亦名百宜嬌戲張仲遠看垂楊連苑杜若吹沙愁損未歸眼信馬青樓去重簾下娉婷人妙飛燕翠尊共欵聽艷歌郎意先感便携手月地雲階裏愛良夜微暖無限風流踈散有暗藏弓履偷寄香翰明日聞津鼓湘江上催人還解春纜亂紅萬點悵斷魂煙水遙逺又爭似相携乘一舸鎮長見石湖仙越調壽石湖居士松江煙浦是千古三髙遊衍佳處須信石湖仙似鴟夷翩然引去浮雲安在我自愛緑香紅舞容與看世間幾度今古盧溝舊曾駐馬為黃花間吟秀句見説胡兒也學綸巾欹雨玉友金蕉玉人金縷緩移筝柱聞好語明年定在槐府解連環玉鞍重倚却沉吟未上又縈離思為大喬能撥春風小喬妙移筝鴈啼秋水栁怯雲鬆更何必十分梳洗道郎携羽扇那日隔簾半面曾記西窗夜涼雨霽歎幽歡未足何事輕棄問後約空指薔薇算如此溪山甚時重至水驛燈昏又見在曲屏近平聲砥念惟有夜來皓月照伊自睡玉梅令髙平調石湖畏寒不出作此戲之踈踈雪片散入溪南苑春寒鎖舊家亭館有玉梅幾樹背立怨東風髙花未吐暗香已逺公來領客梅花能勸花長好願公更健便揉春為酒剪雪作新詩拚一日繞花千轉踏莎行金陵感夢燕燕輕盈鶯鶯嬌軟分明又向華胥見夜長爭淂薄情知春初早被相思染别後書詞别時針線離魂暗逐郎行逺淮南皓月冷千山冥冥歸去無人管八歸湘中送胡德華芳蓮墜粉踈桐吹緑庭院暗雨乍歇無端抱影銷魂處還見篠墻螢暗蘚階蛩切送客重尋西去路問水面琵琶誰撥最可惜一片江山揔付與啼鴂長恨相從未欵而今何事又對西風離别渚寒煙淡棹移人逺縹眇行丹如葉想文君望久倚竹愁生步羅襪愁凝間蕙帳猿鶴悲吟信沈沈故園歸計休更侵尋喜遷鶯秋懷涼雲歸去再約著晚來西樓風雨水靜簾隂鷗間菰影秋到露汀煙浦試省喚回幽恨盡是愁邊新句倦登眺動悲涼還在殘蟬吟處凄楚空見説香鎖霧扄心似秋蓮苦寶瑟彈氷玉臺窺月淺黛可憐偷聚幾時翠溝題葉無復繡簾吹絮鬢華晚念庾郎情在風流誰與玉樓春春思多時不踏章臺路依舊東風芳草渡鶯聲喚起水邊情日影灸開花上霧謝娘不信佳期誤認淂馬嘶迎繡戶今宵翠𬒳不春寒只恐香穠春又去玉樓春憶舊春煙淡淡生春水曾記芳洲蘭棹艤岸花香到舞衣邊汀草色分歌扇底棹沈雲去情千里愁壓雙鴛飛不起十年春事十年心怕説濺裙當日事菩薩蠻蘇堤芙蓉紅雲半壓秋波急艷粧泣露嬌啼色佳夢入仙城風流石曼卿宫𫀆呼醉醒休捲西風錦明日粉香殘六橋煙水寒菩薩蠻水晶膾玉鱗熬出香凝軟并刀斷處氷絲顫紅縷間堆盤輕明相映寒纎柔分勸處膩滑難停筯一洗醉魂清真成醒酒氷菩薩蠻春思春風吹緑湖邊草春光依舊湖邊道玉勒錦障泥少年遊冶時煙明花似繡且醉旗亭酒斜日照花西歸鴉花外啼杏花天春愁霽煙消處寒猶嫩乍門巷愔愔晝永池塘夢草魂初醒秀句吟春未穩仙源阻春風瘦損又燕子來無芳信小桃也自知人恨滿面羞紅難問祝英臺近閨思一窗間孤燼冷獨自箇春睡繡𬒳熏香不似舊風味靜聽滴滴簷聲驚愁攪夢更不管庾郎心醉念芳意一併十日春寒梅花晒憔悴懶做新詞春在可憐裏幾時挑菜踏青雲沈雨斷盡分付楚天之外生查子梅香驚楚驛寒瘦倚湘筠暮一笛巳黃昏片月尤淸楚沉沉氷玉魂漠漠煙雲浦酸淚不成彈又向春心聚永遇樂次韻吊青樓淺暈修蛾脆䀶紅粉猶記窺戶香斷奩空塵生砌冷誰喚青鵉舞春風花信秋宵月約歷歷此心曾許銜芳恨千年怨結玉骨未應成土木蘭艇子莫愁何在謾繫寒江煙樹事逐雲沈情隨佩冷短夢分今古一杯遙夜孤光難曉多少碎人腸處空凄黯西風細雨盡吹淚去御街行賦轎藤筠巧織花紋細稱穩步如流水踏青陌上雨初晴嫌怕濕文鴛雙履要人送上逢花須住才過處香風起裙兒挂在簾兒砥更不把窗兒閉紅紅白白簇花枝恰稱淂尋春芳意歸來時晚紗籠引道扶下人微醉霜天曉角春情春雲粉色春水和雲濕試間西湖楊栁東風外幾絲碧望極連翠陌蘭橈雙槳急欲訪莫愁何處旗亭在畫橋側卜算子春晚屈指數春來彈指驚春去簷外蛛絲網落花也要留春住幾日喜春晴幾夜愁春雨十二雕窗六曲屏題遍傷春句踏莎行九日西山水減堤䀶秋生屐齒瘦笻喚起登髙意翠微煙冷夢凄涼黃花香晚人憔悴懷古風流悲秋情味𬗋茰勸入旗亭醉玉人相見説新愁可憐又濕西風淚風入松春晴捲簾日日恨春隂寒食新晴馬蹄只向南山去長橋愛花栁多情紅外風嬌日暖翠邊水秀山明杜郎歌酒過平生到處蓬瀛醉魂不入重城晚穠歡寄桃葉桃根繡𬒳嫩寒清曉鶯聲喚醒春醒風入松聞鄰女吹笛粉嬌曾隔翠簾看橫玉聲寒夜深不管柔荑冷櫻朱度香噴雲鬟霜月搖搖吹落梅花蔌蔌驚殘蕭郎且放鳯簫間何處驂鵉靜聽三弄霓裳罷魂飛斷愁裏關山三十六宫天近念奴却在人間思佳客秋扇入手西風意已秋不須玉斧為重修撲螢涼夜沉沉月障面清歌淡淡秋休棄置且遲留可憐又向篋中收莫教暗損乘鵉女漢殿凄涼萬古愁聲聲慢元夕壺天不夜寶炬生香光風蕩搖金碧月灔氷䀶花外峭寒無力歌傳翠簾盡捲誤驚回瑶臺仙迹禁漏促拚千金一刻未酬佳夕捲地香塵不斷最淂意輸它王陵狂客楚栁吳梅無限眼邊春色鮫綃暗中寄與待重尋行雲消息乍醉醒怕南樓吹斷曉笛解連環春水浪搖新緑浸芳洲翠渚雨䀶初足蕩霽色流入橫塘看風外漪漪皺紋如縠藻荇縈回似留戀鴛飛鷗浴愛嬌雲蘸色媚日挼藍逺迷心目仙源漾舟岸曲照芳容幾樹香浮紅玉記那回西洛橋邊濺裙翠傳情玉纎輕掬三十六陂錦鱗渺芳音難續隔埀楊故人望斷浸愁千斛中興以來絶妙詞選卷之六
