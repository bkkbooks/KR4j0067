front:
  text: 園林主
  hash: sha256:c5c71dc3d324cd6c889456cd9df3a92e125e2697c3e3cb9fa6e61a7e7f1d2aa3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0067_SBCK_006-1a}
body:
  text: 水龍吟海棠東君直是多情好花一夜都開盡杏梢零落藥欄遟暮不敎寍静風度秋千日移簾幕翠紅交映正太真浴罷西施濃抹都沈醉嬌相稱磨遍緑窓銅鏡挽春衫不堪比並暮雲空谷佳人何處碧苔侵逕睡裏相看酒邊凝想許多凮韻問因何却欠一些香味惹傍人恨臨江仙上元人意舒閑春事到徐徐弄日㣲雲翠鬟飛繞閙蛾羣烟横沽酒市風轉落梅村歳事一新人半舊相逢際晚醺醺花間亭舘栁間門尅除風雨外排日醉紅裙月華清憶别瑟瑟秋聲蕭蕭天籟滿庭揺落空翠數遍丹楓不見葉間題字人何處千里婵姢愁不断一江流水遥睇見征鴻㡬點碧天無際悵望月中仙桂問竊藥佳人誰與同歳把鏡當空照盡别離情意心裏恨莫結丁香琴上曲休彈秋思怕裏又悲來老却蘭臺公子賀聖朝春遊遊人拾翠不知逺𬒳子規呼轉紅樓倒影背斜陽墜㡬聲絃管荼䕷香透海棠紅淺恰平分春半花前一笑不湏慳待花飛休怨魚遊春水怨别池塘生春草數盡㱕鴻人未到天涯目断青鳥尚賖音耗曉月頻窺白玉堂暮雨還濕青門道巢燕引雛乳鶯空老庭際香紅倦掃乾鵲休來枝上噪前囬準擬同它翻成病了欲題紅葉慿誰寄獨抱孤桐無心挑眉間翠攅鬢邊霜早海棠春春景栁腰暗怯花風弱紅映秋千院落㱕逐燕兒飛斜撼真珠箔滿林翠葉胭脂蕚不忍頻頻覷着護取一庭春莫弹花間鵲鷓鴣天閨思睡鴨裵囬烟縷長日髙春困不成粧歩欹草色金蓮潤撚断花鬢玉笋香輕洛浦笑巫陽錦紋親織寄檀郎兒家閉戸藏春色戯蝶遊蜂不敢狂末二句有㴱意㱕朝􅌚春遊聽得提壺沽美酒人道杏花深處有杏花狼藉鳥啼風十分春色今無九麝煤銷永晝青烟飛上庭前栁画堂深不寒不煖正是好時候團團宝月慿纎手暫借歌喉招舞䄂真珠滴破小槽紅香肌縮盡纎羅瘦投分湏白首黄金散與親和舊且銜盃壯心未落風月長相守孤鵉早春沙堤香軟正宿雨初収落梅飄滿可柰東風暗逐馬蹄輕捲湖波又還漲緑粉墻隂日融烟煖驀地刺桐枝上有一聲春喚任酒帘飛動画樓晚便指數燒灯時節非逺陌上呌聲好是賣花行院玉梅對粧雪衰草愁烟亂鴉送日風沙囬旋平野拂雪金鞭欺寒茸㡌還記章臺走馬誰念漂零乆謾嬴得幽懐難寫故人清沔相逢小窓閑共情話長恨離多會少重訪問竹西珠淚盈把鴈磧沙平漁汀人散老去不堪遊冶無柰苕溪月又喚我扁舟東下甚日㱕來梅花亂零春夜一蕚紅人日長沙登定王臺古城隂有官梅㡬許紅蕚未宜簮池面氷膠墻腰雪老雲意還又沉沉翠藤共閑穿徑竹漸笑語驚起卧沙禽野老林泉故王臺榭呼喚登臨南去北來何事蕩湘雲楚水目極傷心朱戸黏雞金盤簇燕空嘆時序侵㝷記曾共西樓雅集想埀栁還裊萬絲金待得㱕鞍到時只怕春深楊州慢中吕宫淳熈丙申至日余過維楊夜雪初霽薺夌弥望入其城則四頋䔥條寒水自碧暮色漸起戍角悲吟予懐愴然感慨今昔因自度此曲千岩老人以為有黍離之悲也此後凡載宫調者並是自製曲惟左名都竹西佳處解鞍少駐初程過春風十里盡薺麥青青自胡馬窺江去後廢池喬木猶厭言兵漸黄昏清角吹寒都在空城杜郎俊賞算如今重到湏驚縦荳䓻詞工青樓夢好難賦深情二十四橋仍在波心蕩冷月無聲念橋邊紅藥年年知爲誰生驀山溪題錢氏溪月與鷗爲客緑野留吟屐兩行栁埀隂是當年仙翁手植一亭寂寞烟外帶愁横荷苒苒展凉雲横卧虹千尺才因老盡秀句君休覔萬緑正迷人更愁入山陽夜笛百年心事惟有玉欄知吟未了放舡囬月下空相憶點絳唇丁未冬遇吴松燕鴈無心太湖西畔隨雲去數峯清苦商畧黄昏雨第四橋邊擬共天隨住今何許凭闌懷古殘栁參差舞暗香仙吕宫辛亥之冬予載雪詣石湖止既月授簡索句且徴新聲作此兩曲石湖把玩不已使工妓隷習之音節諧婉乃命之曰暗香踈影舊時月色算㡬畨照我梅邊吹笛喚起玉人不管清寒與攀摘何遜而今漸老都忘却春風詞筆但怪得竹外踈花香冷入瑶席江國正寂寂嘆寄與路遥夜雪初積翠尊易泣紅蕚無言耿相憶長記曾携手處千樹壓西湖寒碧又片片吹盡也㡬時見得踈影仙吕宫苔枝綴玉有翠禽小小枝上同宿客裏相逢籬角黄昏無言自倚脩竹昭君不慣胡沙逺但暗憶江南江北想珮環月夜㱕來化作此花幽獨猶記深宫舊事那人正睡裏飛近蛾緑莫佀春風不管盈盈早與安排金屋還敎一片隨波去又却怨玉龍哀曲等恁時重覔幽香已入小窓横幅長亭怨慢中吕宫桓大司馬云昔年種栁依依漢南今看揺落悽愴江潭樹猶如此人何以堪此語予㴱爱之漸吹盡枝頭香絮是處人家緑深門戸逺浦縈囬暮帆零亂向何許閱人多矣誰得佀長亭樹樹若有情時不會得青青如此日暮望髙城不見只見亂山無數韋郎去也怎忘得玉環分付第一是早早㱕來怕紅蕚無人爲主算只有并刀難剪離愁千縷齊天樂蟋蟀中都呼為促織庾郎先自吟愁賦凄凄更聞私語露濕銅鋪苔侵石井都是曾聽伊處哀音似訴正思婦無眠起㝷機杼曲曲屏山夜凉獨自甚情緒西窓又吹暗雨爲誰頻断續相和砧杵候館吟秋離宫吊月别有傷心無數豳詩謾與笑籬落呼灯世間兒女寫入琴絲一聲聲更苦宣政間有士大夫製蟋蟀吟小重山令潭州紅梅人繞湘臯月墜時斜横花樹小浸愁漪一春幽事有誰知東風冷香逺茜裙㱕鷗去昔遊非遥憐花可可夢依依九疑雲杳断䰟啼相思血都沁緑筠枝鷓鴣天元夕不出憶昨天街預賞時栁慳梅小未敎知而今正是歡遊夕却怕春寒自掩扉簾寂寂月低低舊情唯有絳都詞芙蓉影暗三更後卧聽鄰娃笑語㱕鷓鴣天苕溪記所見京洛風流絶代人因何風絮落溪津籠鞋淺出鴉頭韈知是凌波縹緲身紅乍笑緑長嚬與誰同度可憐春鴛鴦獨宿何曾慣化作西樓一縷雲鷓鴣天十六夜出輦路珠簾兩行埀千枝銀燭舞僛僛東風歴歴紅樓下誰識三生杜牧之歡正好夜何其明朝春過小桃枝鼓聲漸逺遊人散惆悵㱕來有月知憶王孫番陽彭氏小樓冷紅葉葉下塘秋長與行雲共一舟零落江南不自由兩綢繆料得吟鵉夜夜愁湘月双調即念奴嬌之鬲指聲也五湖舊約問經年底事長負清景暝入西山漸喚我一葉夷猶乘興倦網都收㱕禽時度月上汀洲冷中流容與画橈不點淸鏡誰解喚起湘靈煙鬟霧鬢理哀絃鴻陣玉麈談玄歎坐客多少風流名勝暗栁蕭蕭飛星苒苒夜乆知秋信魲魚應好舊家樂事誰省念奴嬌吳㒷荷花閙紅一舸記來時長與鴛鴦爲侣三十六陂人未到水佩風裳無數翠葉吹凉玉容銷酒更洒菰蒲雨嫣然摇動冷香飛上詩句日暮青盖亭亭情人不見争忍凌波去只恐舞衣寒易落愁入西風南浦髙栁埀隂老魚吹浪留我花間住田田多少㡬囬沙際㱕路惜紅衣呉㒷荷花無射宫簟枕邀凉琴書換日睡餘無力細洒氷泉并刀破甘碧墻頭喚酒誰問訊城南詩客岑寂髙樹晚蝉說西風消息虹梁水陌魚浪吹香紅衣半狼藉維舟試望故國渺天北可惜栁邊沙外不共美人遊歷問甚時同賦三十六陂秋色琵琶仙呉㒷感遇雙槳來時有人佀舊曲桃根桃葉歌扇輕約飛花蛾眉正竒絶春漸逺汀洲自緑更添了㡬聲啼鴂十里楊州三生杜牧前事休說又還是宫燭分煙奈愁裏匆匆換時節都把一襟芳思與空階榆莢千萬縷藏鴉細栁爲玉尊起舞囬雪想見西出陽関故人初别秋宵吟越調古簾空墜月皎坐乆西窓人悄蛩吟苦漸漏永丁丁箭壺催曉引凉颸動翠葆露脚斜飛雲表因嗟念佀去國情懐暮晚煙草帶眼銷磨爲近日愁多頓老衛娘何在宋玉㱕來兩地暗縈繞揺落江楓早嫰約無慿幽夢又杳但盈盈泪洒單衣今夕何夕恨未了少年遊戯張斗甫雙螺未合雙蛾先歛家在碧雲西别母情懷隨郎滋味桃葉渡江時扁舟載了匆匆去今夜泊前溪楊栁津頭梨花墻外心事兩人知鬲溪梅令仙吕調無錫㱕寓意好花不與殢香人浪𥻘𥻘又恐春風㱕去緑成隂玉鈿何處㝷木蘭雙槳夢中雲小横陳謾向孤山山下覔盈盈翠禽啼一春淒凉犯仙吕調犯商調合肥秋夕緑楊巷陌西風起邊城一片離索馬嘶漸逺人㱕甚處戍樓吹角情懷正惡更衰草寒煙淡薄佀當時將軍部曲迤邐度沙漠追念西湖上小舫携歌晚花行樂舊遊在否想如今翠凋紅落謾寫羊裙等新鴈來時繫着怕匆匆不肯寄與悞後約翠樓吟双調武昌安逺楼成月冷龍沙塵清虎落今年漢酺初賜新翻胡部曲聽氊幕元戎歌吹層樓髙峙看檻曲縈紅簷牙飛翠人姝䴡粉香吹下夜寒風細此地宜有詞仙擁素雲黄鶴與君遊戯玉梯凝望乆歎芳草萋萋千里天涯情味仗酒祓淸愁花嬌英氣西山外晚來還捲一簾秋霽清波引梅冷雲迷浦倩誰喚玉妃起舞歳華如許野梅弄眉嫵屐齒印蒼蘚漸爲㝷花來去自隨秋鴈南來望江國渺何處新詩謾與好風景長是暗度故人知否抱幽恨難語何時共漁艇莫負滄浪煙雨况有清夜啼猿怨人良苦法曲獻仙音張彦功官舍虚閣籠寒小簾通月暮色偏憐髙處樹隔離宫水平馳道湖山盡入尊爼柰楚客淹留乆砧聲帶愁去屡囬頋過秋風未成㱕計誰念我重見冷楓紅舞喚起淡粧人問逋仙今在何許象筆鵉牋甚而今不道秀句怕平生幽恨化作沙邊煙雨玲瓏四犯越中歳暮聞簫鼓感懷疊鼓夜寒埀灯春淺匆匆時事如許倦遊歡意少俛仰悲今古江淹又吟恨賦記當時送君南浦萬里乾坤百年身世惟有此情苦楊州栁埀官路有輕盈喚馬端正窺戸酒醒明月下夢逐潮聲去文章信美知何用謾嬴淂天涯羈旅敎說與春來要㝷花伴侣淡黄栁正平調近客合肥空城曉角吹入埀楊陌馬上單衣寒惻惻看盡鵝黄嫰緑都是江南舊相識正岑寂明朝又寒食強携酒小橋宅怕梨花落盡成秋色燕燕飛來問春何在唯有池塘自碧側犯詠芍藥恨春易去甚春却向揚州住㣲雨正繭栗梢頭弄詩句紅橋二十四揔是行雲處無語漸半脫宫衣笑相頋金壺細葉千朶圍歌舞誰念我鬢成絲來此共尊爼後日西園緑隂無數寂寞劉郎自修花譜眉嫵亦名百宜嬌戯張仲遠看垂楊連苑杜若吹沙愁損未㱕眼信馬青樓去重簾下娉婷人妙飛燕翠尊共欵聽艶歌郎意先感便携手月地雲堦裏愛良夜㣲煖無限風流踈散有暗藏弓履偷寄香翰明日聞津鼓湘江上催人還解春䌫亂紅萬點悵断䰟煙水遥逺又争佀相携乘一舸鎮長見石湖仙越調壽石湖居士松江煙浦是千古三髙遊衍佳處須信石湖仙佀䲭夷翩然引去浮雲安在我自愛緑香紅舞容與看世間㡬度今古盧溝舊曾駐馬爲黄花閑吟秀句見說胡兒也學綸巾欹雨玉友金蕉玉人金縷緩移筝柱聞好語明年定在槐府解連環玉鞍重倚却沉吟未上又縈離思爲大喬能撥春風小喬妙移筝鴈啼秋水栁怯雲鬆更何必十分梳洗道郎携羽扇那日隔簾半面曾記西窓夜凉雨霽歎幽歡未足何事輕弃問後約空指薔薇算如此溪山甚時重至水驛灯昏又見在曲屏近平聲厎念惟有夜來皓月照伊自睡玉梅令髙平調石湖畏寒不出作此戯之踈踈雪片散入溪南苑春寒鎻舊家亭館有玉梅㡬樹背立怨東風髙花未吐暗香已逺公來領客梅花能勸花長好願公更健便揉春爲酒剪雪作新詩拚一日繞花千轉踏莎行金陵感夢燕燕輕盈鶯鶯嬌軟分明又向華胥見夜長爭淂薄情知春初早被相思染别後書詞别時針線離䰟暗逐郎行逺淮南皓月冷千山冥冥㱕去無人管八㱕湘中送胡徳華芳蓮墜粉踈桐吹緑庭院暗雨乍歇無端抱影銷䰟處還見篠墻螢暗蘚階蛩切送客重㝷西去路問水面琵琶誰撥最可惜一片江山揔付與啼鴂長恨相從未欵而今何事又對西風離别渚寒烟淡棹移人逺縹緲行丹如葉想文君望乆倚竹愁生歩羅韈愁凝閑蕙帳猿鶴悲吟信沈沈故園㱕計休更侵㝷喜遷鶯秋懷凉雲㱕去再約着晚來西樓風雨水静簾隂鷗閑菰影秋到露汀煙浦試省喚囬幽恨盡是愁邊新句倦登眺動悲凉還在殘蝉吟處凄楚空見說香鎻霧扄心似秋蓮苦宝瑟弹氷玉臺窺月淺黛可憐偷聚㡬時翠溝題葉無復綉簾吹絮鬢華晚念庾郎情在風流誰與玉樓春春思多時不踏章臺路依舊東風芳草渡鶯聲喚起水邊情日影灸開花上霧謝娘不信佳期誤認淂馬嘶迎綉戸今宵翠𬒳不春寒只恐香穠春又去玉樓春憶舊春煙澹澹生春水曾記芳洲蘭棹艤岸花香到舞衣邊汀草色分歌扇底棹沈雲去情千里愁壓雙鴛飛不起十年春事十年心怕說濺裙當日事菩薩蛮蘇堤芙蓉紅雲半壓秋波急艶粧泣露嬌啼色佳夢入仙城風流石曼卿宫𫀆呼醉醒休捲西風錦明日粉香殘六橋煙水寒菩薩蛮水晶膾玉鱗熬出香凝軟并刀断處氷絲顫紅縷間堆盤輕明相映寒纎柔分勸處膩滑難停筯一洗醉䰟清真成醒酒氷菩薩蛮春思春風吹緑湖邊草春光依舊湖邊道玉勒錦障泥少年游冶時煙明花似綉且醉旗亭酒斜日照花西㱕鴉花外啼杏花天春愁霽煙消處寒猶嫰乍門巷愔愔晝永池塘夢草䰟初醒秀句吟春未穩仙源阻春風痩損又燕子來無芳信小桃也自知人恨滿面羞紅難問祝英臺近閨思一牎閑孤烬冷獨自箇春睡綉𬒳熏香不似舊風味静聽滴滴簷聲驚愁攪夢更不管庾郎心醉念芳意一併十日春寒梅花㬠憔悴懶做新詞春在可憐裏㡬時挑菜踏青雲沈雨断盡分付楚天之外生查子梅香驚楚驛寒瘦倚湘筠暮一笛巳黄昏片月尤淸楚沉沉氷玉䰟漠漠煙雲浦酸涙不成弹又向春心聚永遇樂次韻吊青楼淺暈脩蛾脆㾗紅粉猶記窺戸香断奩空塵生砌冷誰喚青鵉舞春風花信秋宵月約歴歴此心曾許銜芳恨千年怨結玉骨未應成土木蘭艇子莫愁何在謾繫寒江烟樹事逐雲沈情隨佩冷短夢分今古一杯遥夜孤光難曉多少碎人腸處空凄黯西風細雨盡吹淚去御街行賦轎藤筠巧織花紋細稱穏歩如流水踏青陌上雨初晴嫌怕濕文鴛雙履要人送上逢花湏住才過處香風起裙兒挂在簾兒厎更不把牎兒閉紅紅白白簇花枝恰稱淂㝷春芳意㱕來時晚紗籠引道扶下人微醉霜天曉角春情春雲粉色春水和雲濕試間西湖楊栁東風外㡬絲碧望極連翠陌蘭橈雙槳急欲訪莫愁何處旗亭在画橋側卜算子春晚屈指數春來弹指驚春去簷外蛛絲網落花也要留春住㡬日喜春晴㡬夜愁春雨十二彫牎六曲屏題遍傷春句踏莎行九日西山水减堤㾗秋生屐齒瘦笻喚起登髙意翠㣲烟冷夢凄凉黄花香晚人憔悴懷古風流悲秋情味𬗋茰勸入旗亭醉玉人相見說新愁可憐又濕西風淚風入松春晴捲簾日日恨春隂寒食新晴馬蹄只向南山去長橋愛花栁多情紅外風嬌日暖翠邊水秀山明杜郎歌酒過平生到處蓬瀛醉䰟不入重城晚穠歡寄桃葉桃根綉𬒳嫰寒清曉鶯聲喚醒春醒風入松聞鄰女吹笛粉嬌曾隔翠簾看横玉聲寒夜深不管柔荑冷櫻朱度香噴雲鬟霜月摇摇吹落梅花蔌蔌驚殘蕭郎且放鳯簫閑何處驂鵉静聽三弄霓裳罷䰟飛断愁裏関山三十六宫天近念奴却在人間思佳客秋扇入手西風意已秋不湏玉斧爲重修撲螢凉夜沉沉月障面清歌澹澹秋休弃置且遟留可憐又向篋中収莫敎暗損乘鵉女漢殿凄凉萬古愁聲聲慢元夕壺天不夜宝炬生香光風蕩揺金碧月灔氷㾗花外峭寒無力歌傳翠簾盡捲誤驚囬瑶臺仙跡禁漏促拚千金一刻未酬佳夕捲地香塵不断最淂意輸它王陵狂客楚栁吳梅無限眼邊春色鮫綃暗中寄與待重㝷行雲消息乍醉醒怕南樓吹断曉笛解連環春水浪揺新緑浸芳洲翠渚雨㾗初足蕩霽色流入横塘看風外漪漪皺紋如縠藻荇縈廻似留恋鴛飛鷗浴愛嬌雲蘸色媚日挼藍逺迷心目仙源漾舟岸曲照芳容㡬樹香浮紅玉記那囬西洛橋邊濺裙翠傳情玉纎輕掬三十六陂錦鱗渺芳音難續隔埀楊故人望断浸愁千斛中興以來絶妙詞選卷之六
