front:
  text: 盡日東風吹緑樹向晚輕寒數點催花雨年少凄涼天賦與更堪春思縈離緒臨水高樓携酒處曾倚哀絃歌斷黃金縷樓下水流何處去憑欄目送蒼煙暮
  hash: sha256:1d9ca92f0ace6d72a6bdf36e25358d3d0e2bab975d0ffe797a0823f4a8ae67ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0067_SBCK_002-1a}
body:
  text: 點絳唇春愁香冷金爐夢回鴛帳餘香嫩更無人問一枕江南恨消瘦休文頓覺春衫褪清明近杏花吹盡薄暮東風緊點絳唇惜别惜别傷離此生此念無重數故人何處還送春歸去美酒一杯誰解歌金縷無情緒淡煙踈雨花落空庭暮賀聖朝秋思斷霞收盡黃昏雨滴梧桐踈樹簾櫳不卷夜沈沈鎖一庭風露天涯人逺心期夢悄苦長宵難度知它窗外促織兒有許多言語浣溪沙美人艷艷春嬌入眼波勸人金盞緩聲歌不禁粉淚揾香羅暮雨朝雲相見少落花流水别離多寸腸爭奈此情何畫堂春春日空籠簾影隔垂楊夢回芳草池塘杏花枝上蝶雙雙春晝初長強理雲鬟臨照暗彈粉淚沾裳自憐容艷惜流光無限思量醉桃園春晚青春不與花為主花正開時春暮花下醉眠休訴看取春歸去鶯愁蝶怨春知否欲門春歸何處只有一樽芳醑留得青春住人月圎中秋連環寶瑟深深願結盡一生愁人間天上佳期勝賞今夜中秋雅歌妍態常娥見了應羡風流芳樽美酒年年歲歲月滿高樓怨春風閨怨寶鑑凌花瑩孤鵉慵照影魚書蝶夢兩消沈恨恨恨結盡丁香瘦如楊栁雨踈雲冷宿醉厭厭病羅巾空淚粉欲將遠意託湘絃悶悶悶香絮悠悠畫簾悄悄日長春困滿江紅丁未九月南渡泊舟儀真江口慘結秋隂西風送絲絲雨濕凝望眼征鴻幾字暮投沙磧欲往鄉關何處是水雲浩蕩連南北但修眉一要為天下竒坐是除名編隸辰州感皇恩留别一葉下西風寒生南浦椎鼓鳴鐃送君去長亭把酒却倩阿誰留住樽前人似玉能留否醉中暫聽離歌幾許聽不能終淚如雨無情江水斷送扁舟何處歸時煙浪捲朱簾暮點降唇感舊花外紅樓當時青鬢顔如玉淡煙殘燭醉入花間宿白髮相逢猶唱當時曲當時曲斷絃難續且盡杯中醁鳯棲梧王彥恭生日瓊海無邊銀浪捲畫戟朱樓縹眇雲間見當日使君曾擁傳海霞光裏時開宴翠斚紅鱗吹酒靣莫謂今朝人在天涯逺彩鳯銜書應不晚願公難老身長健滿庭芳戊辰上元黃子餘席上時未有月宿雨初收晚風微度萬家簾捲青煙暗塵隨馬人物似神仙試問天公借月天須放明月教圎應移下廣寒宫殿燈火接星躔盧川元古郡當時太守賔從俱賢到如今萬井歌吹噫闐花下紅粧賣酒時相遇栁色初勻輕寒似水纎雨如塵一陳東風縠紋微皺碧沼鱗鱗仙娥花月精神奏鳯管鵉絲鬪新萬歲聲中九霞杯裏長醉芳春蝶戀花海棠前日海棠猶未破點點胭脂染就真珠顆今日重來花下坐亂鋪宫錦春無那賸摘繁枝簮幾朵痛惜深憐只恐芳菲過醉倒何妨花砥卧不須紅袖來扶我臨江仙禁中丹桂玉宇涼生清禁曉丹葩色照晴空珊瑚𫾣碎小玲瓏人間無此種來自廣寒宫雕玉闌干深院靜嫣然凝笑西風曲屏須占一枝紅且圖欹醉枕香到夢魂中臨江仙車駕朝享景靈宫久雨一夕開霽聞道􅊮庭森寶仗霜風逐雨驅雲六龍扶輦下青冥香隨鵉扇逺日射赭𫀆明簾捲天街人隘路滿城喜望清塵歡聲催起嶺梅春欲知天意好昨夜月華新西江月瑞香剪就碧雲閙葉刻成𬗋玉芳心淺春不怕峭寒侵暖徹薰籠瑞錦花裏清芬獨步樽前勝韻難禁飛香直到玉杯深消得厭厭痛飲朝中措夜景燈花挑盡夜將闌斜掩小屏山一點涼蟾窺幔釧𫾣玉臂生寒起來無緒爐薰燼冷桐葉聲乾都把沈思幽恨明朝分付眉端燭影搖紅上元有懷雙闕中天鳯樓十二春寒淺去年元夜奉宸遊曾侍瑶池宴玉殿珠簾盡捲擁羣仙蓬壷閬苑五雲深處萬燭光中揭天絲管馳隙流年恍如一瞬星霜換今宵誰念泣孤臣回首長安逺可是塵緣未斷謾惆悵華胥夢短滿懷幽恨數點寒燈幾聲歸鴈浣溪沙和曾純甫題謝氏小閣築室峥嶸占寶峯退朝燕坐萬緣空出塵高志抗冥鴻何日嘉招陪一笑看君豪飲釂千鐘試慿鄙句作先容霜天曉角别恨曉風搖幕欹枕聞殘角霜月可窗寒影金猊冷翠衾薄舊恨無處著新愁還又作夜夜單于聲裏燈花共淚珠落火一川明笳鼓悲鳴遣人驚念腰間箭匣中劔空埃蠧竟何成時易失心徒壯歲將零渺神京干羽方懷逺靜烽燧且休兵冠蓋使紛馳騖若為情聞道中原遺老常南望翠葆霓旌使行人到此忠憤氣填膺有淚如傾水調歌頭凱歌寄湖南安撫劉舍人猩鬼嘯篁竹玉帳夜分弓少年荆楚劔客突騎錦襜紅千里風飛雷厲四校星流彗掃蕭斧挫春蔥談笑青油幕日奏捷書同詩書帥黃閣老黑頭公家傳鴻寶祕略小試不言功聞道璽書頻下看即沙堤歸去帷幄且從容君王自神武一舉朔庭空水調歌頭舟過金山寺江山自雄麗風露與高寒寄聲月姊借我玉鑑此中看幽壑魚龍悲嘯倒影星辰搖動海氣夜漫漫擁起白銀闕危駐𬗋金山表獨立飛玉佩整雲冠漱氷濯雪眇視萬里一毫端回首三山何處聞道羣仙笑我要我欲俱還揮手從此去翳鳯更驂鵉水調歌頭隱靜寺觀雨寺有碧霄泉青嶂度雲氣幽壑舞回風江神助我雄觀喚起碧霄龍電掣金蛇千丈雷震靈鼉萬舋洶洶欲崩空盡瀉銀潢水散入寶蓮宫坐中客凌積翠看奔洪人間應大匕箸唯我獨從容淨洗從來塵垢潤及無邊枯稿造物不言功天宇忽開霽日在五雲東滿江紅秋懷秋滿灕源瘴雲淨曉山如簇動逺思空江小艇高丘喬木䇿䇿西風雙鬢砥暉暉斜日朱欄曲試側身回首望京華迷南北思歸夢天邊鵠遊宦事蕉中鹿想一年好處砌紅堆緑羅帕分柑霜落齒冰盤剝芡珠盈掬借春纎縷鱠搗香韲新篘熟念奴嬌𣣔雪呈朱漕朔風吹雨送凄涼天意垂垂欲雪萬里南荒雲霧滿弱水蓬萊相接凍合龍岡寒侵銅柱碧海氷澌結慿高一笑問君何處炎熱家在楚尾吳頭歸期猶未對此驚時節記得年時貂帽暖鐡馬千羣觀獵狐兔成車歌鍾殷地歸踏層城月持杯日醉不須北望凄切念奴嬌洞庭洞庭青草近中秋更無一點風色玉界瓊田三萬頃著我扁舟一葉素月分輝銀河共影表裏俱澄徹怡然心會妙處難與君説應念嶺海經年孤光自照肝肺皆氷雪短髮蕭騷襟袖冷穩泛滄浪空闊盡挹西江細傾北斗萬象為賔客扣舷一笑不知今夕何夕念奴嬌離思星沙初下望重湖逺水長雲漠漠一葉扁舟誰念我今日天涯飄泊平楚南來大江東去處處風波惡吳中何地滿懷俱是離索長記送我行時緑波亭上泣透青羅薄檣燕低飛人去後依舊湘城簾幕不盡山川無窮煙浪辜負秦樓約漁歌聲斷為君雙淚傾落木欄花離思送歸雲去鴈淡寒彩滿溪樓正佩解湘腰叉孤楚鬢鵉鑑分收凝情望行處路但踈煙逺樹織離憂只有樓前溪水伴人清淚長流霜華夜永逼衾禱喚誰護衣篝念粉館重來芳塵未掃爭見嬉遊情知悶來殢酒奈回腸不醉只添愁脈脈無言竟日斷魂雙騖南州木欄花别情𬗋簫吹散後恨燕子只空樓念璧月長虧玉簮中折覆水難收青鵉送碧雲句道霞扄霧鎖不堪憂情與文梭共織怨隨宫葉同流人間天上兩悠悠暗淚灑燈篝記谷口園林當時驛舍夢裏曾遊銀屏低聞笑語但夢時冉冉醒時愁擬把菱花一半試尋高價皇州雨中花長沙一葉凌波十里御風煙鬟雨鬢蕭蕭認得江臯玉珮水館氷綃秋淨明霞乍吐曙涼宿靄初消恨微顰不語欲進還休凝佇超遙神交冉冉愁思盈盈斷魂欲遣誰招還似待青鵉傳信烏鵲成橋悵望胎仙琴疊羞看翡翠蘭苕夢回人逺紅雲一片天際笙簫驀山溪春情雄風豪雨時節清明近簾幕起輕寒暖紅爐笑翻灰燼隂藏遲日欲驗幾多長繡工慵圍棊倦香篆頻銷印茂林芳徑緑變紅添潤桃杏意酣酣占前頭一畨花信華堂尊酒但作艷陽歌禽聲喜流雲盡明日春遊俊鷓鴣天長沙餞劉樞密浴殿西頭白玉堂湘江東畔碧油幢北辰躔次瞻星象南斗山川解印章隨步武借恩光送君先促舍人裝他年真肯傳衣鉢今日先須釂一觴鷓鴣天春情日日青樓醉夢中不知樓外已春濃杏花未遇踈踈雨楊栁初搖短短風扶畫鷁躍花驄湧金門外小橋東行行又入笙歌裏人在珠簾第幾重菩薩蠻舟中十年長作江南客檣竿又挂西風席白鳥去邊明楚山無數青倒冠仍落珮我醉君同醉試問識君不青山與白鷗菩薩蠻杏花東風約略吹羅幕一簷細雨春隂薄試把杏花看濕紅嬌暮寒佳人雙玉枕烘醉鴛鴦錦折得最繁枝暖香生翠幃鵲橋仙橫波滴素遙山蹙翠江北江南腸斷不知何處御風來雲霧裏叉橫鬢亂香羅疊恨蠻箋寫意付與瑶臺女伴醉時言語醒時愁道説與醒時休看鵲橋仙梅吹香成陳飛花如雪不那朝來風雨可憐無處避春寒但玉立仙衣數縷清愁萬斛柔腸千結醉裏一時分付勸君不用嘆飄零待結子成隂歸去西江月黃陵廟滿載一船明月平鋪千里秋江波神留我看斜陽喚起鱗鱗細浪明日風回更好今朝露宿何妨水晶宮裏奏霓裳凖擬嶽陽樓上西江月洞庭問訊湖邊春色重來又是三年東風吹我過湖船楊栁絲絲拂面世路如今已慣此心到處悠然寒光亭下水連天飛起沙鷗一片西江月為劉樞密太夫人壽疇昔通家事契即今兩鎮交承起居樞密太夫人緑髮斑衣相映乞得神仙九醖祝教福祿千春台星直上壽星明長見門闌鼎盛憶秦娥雪雲垂幕隂風慘淡天花落天花落千林瓊玖滿空鵉鶴征車渺渺穿華薄路迷迷路增離索增離索楚溪山水碧湘樓閣憶秦娥梅梅花發寒梢挂著瑶臺月瑶臺月和羮心事履霜時節斷橋流水聲嗚咽行人立馬空愁絶空愁絶為誰凝佇為誰攀折念奴嬌上章乞休置戲作小詞自賀老夫歸去有三徑足可長拖衫袖一道官銜清徹骨别有監臨主守主守清風監臨明月兼管栽花栁登山臨水作詩三首兩首休説白日升天莫誇金印斗大懸雙肘且説廬陵新盛事三箇間人眉壽揀罷軍貟歸農押録致政誠亝叟只愁醉殺螺江門外私酒吉有螺江門憶秦娥初春新春早春前十日春歸了春歸了落梅如雪野桃紅小老夫不管春催老只圖爛醉花前倒花前倒兒曵東風無力欲皺還休一落索南浦舟中與江西帥漕酌别夜後忽大雪畫戟錦車皆雅故簫鼓留連客住南浦春波暮難忘羅襪生塵處明日船旗應不駐且唱斷腸新句捲盡珠簾雨雪花一夜隨人去菩薩蠻元夕立春雪林一夜收寒了東風恰向燈前到今夕是何年新春新月圎綺叢香霧隔猶記醒狂客留取縷金幡夜蛾相並看菩薩蠻湘東驛客行忽到湘東驛明朝真是瀟湘客晴碧萬重雲幾時逢故人江南如塞北别後書難得先自鴈來稀那堪春半時滿江紅清江風帆甚快作此與客劇飲歌之千古東流聲捲地雲濤如屋橫浩渺檣竿十丈不勝帆腹夜雨翻江春浦漲船頭鼓急風初熟似當年呼禹亂黃川飛梭速擊楫誓空警俗休拊髀都生肉任炎天氷海一杯相屬荻笋蔞芽新入饌鵾絃鳯吹能翻曲笑人間何處似尊前添銀燭謁金門宜春道中野塘春水可喜有懷舊隱酬短章大篇人爭傳誦之水龍吟春日遊摩訶池摩訶池上追遊路紅緑參差春晚韶光妍媚海棠如醉桃花欲暖挑菜初間禁煙將近一城絲管看金鞍爭道香車飛蓋爭先占新亭館惆悵年華暗換黯銷魂雨收雲散鏡奩掩月叉梁拆鳯秦筝斜鴈身在天涯亂山孤壘危樓飛觀歎春來只有楊花和恨向東風滿沁園春别恨一别秦樓轉眼新春又近放燈憶盈盈倩笑纎纎柔握雪香花語玉暖酥凝念逺愁腸傷春病思自怪平生殊未曾君知否漸香消蜀錦淚漬吳綾難求繫日長繩况倦客飄零少舊朋但江郊鴈起漁村笛怨寒缸委燼孤硯生氷水繞山圍煙昏雲慘縱有高臺常怯登消魂處是魚箋不到蘭夢無慿月照梨花閨思霽景風軟煙江春漲小閣無人繡簾半上花外姊妹相呼約樗蒲修蛾忘了章臺樣細思一餉感事添惆悵胸酥臂玉消減擬覔雙魚倩傳書月照梨花閨思悶已縈損那堪多病幾曲屏山伴人晝靜梁燕催起猶慵換熏籠新愁舊恨何時盡漸凋緑鬢小雨知花信芳箋寄與何處繡閣珠櫳栁隂中夜遊宫記夢雪曉清笳亂起夢遊處不知何地鐡騎無聲望似水想關河鴈門西青海際睡覺寒燈裏漏聲斷月斜窗𥿄自許封侯在萬里有誰知鬢雖殘心未死夜遊宮宴席宴罷珠簾半捲畫簷外蠟香人散翠霧霏霏漏聲斷倚香肩看中庭花影亂宛是高唐館寶奩炷麝煙初暖璧月何妨夜夜滿擁芳柔恨今年寒尚淺臨江仙晚春鳩雨催成新緑燕泥收盡殘紅春光還與美人同論心空眷眷分𬒮却匆匆只道真情易寫那知怨句難工水流雲散各西東半廊花院月一帽栁橋風叉頭鳯閨詞紅酥手黃縢酒滿城春色宫墻栁東風惡歡情薄一懷愁緒幾年離索錯錯錯春如舊人空瘦淚痕紅浥鮫綃透桃花落間池閣山盟雖在錦書難托莫莫莫浪淘沙别恨緑樹暗長亭幾把離尊陽關常恨不堪聞何况今朝秋色裏身是行人清淚浥羅巾各自消魂一江離恨恰平分安得千尋橫鑖鑖截斷江津南鄉子賦歸歸夢寄吳檣水驛江程去路長想見芳洲初繫纜斜陽煙樹參差認武昌愁鬢點新霜曾是朝衣染御香重到故鄉交舊少凄涼却恐他鄉勝故鄉感皇恩感懷小閣倚秋空下臨江渚漠漠孤雲未成雨數聲新鴈回首杜陵何處壯心空萬里人誰許黃閣𬗋樞築壇開府莫怕功名欠人做如今熟計只有故鄉歸路石帆山腳下菱三畒好事近東歸書事歲晚喜東歸掃盡市朝陳迹揀得亂山環處釣一潭澄碧賣魚沽酒醉還醒心事付橫笛家在萬重雲外有沙鷗相識蝶戀花寒食陌上簫聲寒食近雨過園林花氣浮芳潤千里斜陽鍾欲暝慿高望斷南樓信海角天涯行略盡三十年間無處無遺恨天若有情終欲問忍教霜點相思鬢蝶戀花懷别水漾萍根風卷絮倩笑嬌顰忍記逢迎處只有夢魂能再遇堪嗟夢不由人做夢若由人何處去短帽輕衫夜夜眉州路不怕銀缸深繡户只愁風斷青衣渡朝中措閨情怕歌愁舞懶逢迎粧晚托春酲總是向人深處當時枉道無情關心近日啼紅密訴剪緑深盟杏館花隂恨淺畫堂銀燭嫌明鵲橋仙感舊華燈縱博雕鞍馳射誰記堂年豪舉酒徒一一取封侯獨去作江邊漁父輕舟八尺低篷三扇占斷蘋洲煙雨鏡湖元自屬間人又何必君恩賜與破陳子省乖仕至千鍾良易年過七十常稀眼砥榮華元是夢身後聲名不自知營營端為誰幸有旗亭沽酒何妨繭𥿄題詩幽谷雲蘿朝采藥靜院軒窗夕對棊不歸真箇癡玉胡蝶王忠州家席上倦客平生行處墜鞭京洛解佩瀟湘此夕何年初賦宋玉高唐繡簾開香塵乍起蓮步穩銀燭分行暗端相燕羞鶯妬蝶繞蜂忙難忘芳樽頻勸峭寒新退玉漏猶長幾許幽情只愁歌罷月侵廊欲歸時司空笑問微近處丞相嗔狂斷人腸假饒相送上馬何妨如夢令閨思獨倚博山峯小翠霧滿身飛繞只恐學行雲去作陽臺春曉春曉春曉滿院緑楊芳草真珠簾羇遊有感水村山館參差路感羇遊正似殘春風絮掠地復穿簾必竟歸何處鏡裏新霜空自閔問幾時鵉臺鰲署遲暮謾慿高佇立書空獨語自昔儒冠多誤悔當年早不抽身歸去醉下白蘋洲看夕陽鷗鷺蓴菜鱸魚都棄了只換得青衫塵土休顧早扁舟江上一簔煙雨中興以來絶妙詞選卷之二
