front:
  text: 踏青挑菜
  hash: sha256:4796b544633c888c7c6860a8a39126ace0eb00eaf87d521aa6d59e771273f51b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0067_SBCK_004-1a}
body:
  text: 醜奴兒秋别金風顫葉那更餞别江樓聽凄切陽関聲㫁楚館雲収去也難留萬重煙水一扁舟錦屏羅愰多應換得蓼岸蘋洲凝想恁時􅂬笑傷今萍梗悠悠謾囘首妖饒何處眷恋無由先自悲秋眼前景物只供愁寂寥情緒也恨分淺也悔風流杏花天春思悶來凭得闌干暖自手引朱簾高捲桃花半露胭脂􅆕芳草如茵乍展煙光散湖光㶑灔映緑栁黄鸝巧囀遥山好似宫眉淺人比遥山更遠雨中花眷濃恩重長離永别憑誰為返香䰟憶湘裙霞䄂杏臉櫻唇眉掃春山淡淡眼裁秋水盈盈便如何忘得温柔情態恬静天眞凭闌念及夕陽西下暮煙四起江村漸入夜踈星映栁新月籠雲醖造一生清瘦能消幾箇黄昏㫁腸時候簾垂深院人掩重門瑞鶴仙秋思風傳秋信至顫葉葉庭梧飄零堦砌年華迅流水况榮枯翻手存亡彈指誰編故􅁓論古往英雄闘智在當時喚做功名到此盡成閑氣何謂生為行客死乃婦人世同驛邸十歩九計空撈攘謾兒戯忍都將有限光隂縈絆趂逐無窮天地我直湏跳出樊籠做箇俏底詞鄙意高驀山溪感舊劉郎老矣倦入䌓華地觸目愈傷情念陳迹人非物是共誰携手落日歩江村臨遠水對遥山閑看煙雲起買牛賣劔便作兒孫計朋舊自榮華也怜我無名無利簞瓢鍾鼎等是百年身空妄作枉迂囘貪愛從今止風入松江景蘋汀蓼岸荻花洲占㫁清秋五湖景物供心眼幾曾有一􅀧閑愁夢裏翩翩胡蝶斍來葉葉漁舟謝郎隨分揔優游信任沉浮恬然雲水無貪吝笑腰纒􅀐鶴􅀭州只恐丹青妙筆寫傳難盡風流漁家傲閨思紅日三竿鶯百囀夢囘鴛枕離魂亂料得玉人腸巳㫁眉峯歛曉粧鏡裏春愁滿緑􅃈䆫深難見靣雲牋謾寫教誰傳聞道笙歌㱕小院梁塵顫多因唱我新詞􅂆蝶恋花春思睡思厭厭鶯喚起簾卷東風猶未忺梳洗眼細眉長雲擁髻笑垂羅䄂熏沈水媚態盈盈閑舉止只有江梅清韻能相比詩酒琴棊歌舞地又還同醉春風裏蝶恋花别恨急水浮萍風裏絮恰似人情恩愛無慿據去便不來來便去到頭畢竟成輕􅀒簾卷春山朝又暮鶯燕空忙不念花無主心事萬千誰與訴㫁雲零雨知何處蝶恋花春思滿地落紅初過雨緑樹成隂􅂵燕風前舞烟草低迷縈小路昼長人静扄朱戸沉水香銷新剪苧欹枕朦朧花厎聞鶯語春夢又還隨栁絮等閑飛過東墻去桃源憶故人春暮画橋流水飛花舞樓外斜風細雨紅瘦緑肥春暮腸㫁桃源路􅌚隨仙子乗鵉去鏤月裁雲何處唯有病和愁緒肯伴劉郎住謁金門春晚風乍扇簾外落紅千片飛盡落花春不管闘忙鶯與燕往事上心撩亂睡起日高猶倦料得伊家情眷眷近來長夢見霜天暁角王生陶氏月夜共沈西湖賦此吊之連環易缺難解同心結癡騃佳人才子情縁重怕離别意切人路絶共沈烟水闊蕩􅃞香魂何處長橋月㫁橋月霜天暁角秋景西風又急細雨黄花濕樓枕一篙煙水蘭舟􅃞画橋側念昔空淚滴故人何處覔魂㫁菱歌凄怨踈簾竹淚留殘翠䄂凝斑桃源憶故人春愁東風料峭寒吹􅆕低下綉簾休卷憔悴怕它春見一任鶯花怨新愁不受詩排遣塵滿玉毫金硯若問此愁深淺天闊浮雲遠念奴嬌戊午生日作嗟來咄去􅀍天公把做小兒調戯蹀雪龍庭㱕未乆還促炎州行李不半年間北胡南越一萬三千里征衫着破着衫人可知矣休問海角天涯黄蕉丹荔自足供甘㫖泛緑依紅無箇事時舞斑衣而已救蟻藤橋養魚盆沼是亦經綸耳伊周安在且湏學老萊子昭君怨梅花道是花來春未道是雪來香異水外一枝斜野人家冷淡竹籬茅舍冨貴玉堂瓊榭兩地不同栽一般開浣溪沙别恨酒薄愁濃醉不成夜長欹枕數殘更嫰寒時節過燒灯已自􅀌鵉羞對鏡未能􅀟鳯怕聞笙莫教吹作别離聲杵鞭馬出都門正潮平洲渚無語匆匆短棹滿載離愁片帆高舉京洛紅塵因念幾年羈旅淺顰輕笑風月逢迎别來誰画􅀟眉嫵囘首一銷凝望㱕鴻容與洞仙歌春雨愁邊雨細漠漠天如醉揺颺遊絲晚風外醸輕寒和暝色花栁難勝春自老誰管啼紅歛翠関情潜入夜斜濕簾櫳幾處挑灯耿無寐念陽臺當日事好伴雲來因箇甚不入襄王夢裏便添起寒潮捲長江又恐是離人㫁腸清淚杏花天春思海棠枝上東風軟蕩霽色煙光弄暖􅀟雙燕子㱕來晚零落紅香過半琵琶淚揾青衫淺念事與危腸易㫁餘酲未解扶頭懶屏裏瀟湘夢遠画堂春秋思西風庭院雨垂垂黄花秋閏遲已凉天氣未寒時才褪單衣睡起枕㾗猶在􅁂鬆􅁫壓雲低玉奩重拂淡胭脂情入􅀟眉武陵春惜别門掩東風人去後愁損燕鶯心一朶梅花淡有春粉黛不忺匀我亦青樓成倦客風月強追㝷莫把恩情做弄成容易學行雲霜天曉角桂花緑雲剪葉低護黄金屑占㫁花中聲譽香與韻兩清㓗勝絶君聽說是它來處别試看仙衣猶帶金庭露玉階月風流子行樂少年多行樂方豪健何處不嬉遊記情逐艶波暖香斜徑醉揺鞭影撲絮青樓難忘是笑歌偏婉娩郷號得温柔嬌雨娛雲旋寛衣帶賸風殘月都在眉頭一成憔悴損人驚恠空自引鏡堪羞誰念短封難托征鴈虚浮念夜寒灯火懶㝷前夢滿䆫風雨供㫁閑愁情到不堪言處却悔風流念奴嬌中秋呈徐叔至霽天湛碧正新凉風露氷壷清徹河漢無聲光練練湧出銀蟾􅀌絶岩桂香飄井梧影轉冷浸宫􅂁㓗西廂往事一簾輕夢悽切腸㫁楚峽雲㱕尊前無緒知有愁如髮此夕常娥應也恨冷落瓊樓金闕禁漏迢迢邊鴻杳杳幽意憑誰决闌干星斗落梅三弄初闋鵲橋仙七夕鈎簾借月染雲為幌花􅆕玉枝交映凉生河漢一天秋問此會今宵孰勝銅壺尚滴燭龍巳駕淚浥西風不盡明朝烏鵲到人間試說向青樓薄倖名善扛號解林居士詩詞甚富盖趙徳莊之流也傳言玉女上元璧月珠星輝映小桃穠李化工容易與人間富貴東風巷陌春在暖紅温翠人來人去笑歌聲裏油壁青騘第一番共燕喜舉頭天上有如人意歌傳樂府猶是昇平風味明朝須判醉眠花厎好事近風動一川花摇瀁影迷紅碧人立杏花隂下泛光風襲襲瓊枝璧月互相輝春容泫將夕羅盖暗承花霧漬鮫綃香濕重疊金春遊楚宫楊栁依依碧遥山翠􅀮横波溢絶艶照穠春春光欲醉人纎纎芳草嫰微歩輕羅襯花戴滿頭㱕遊蜂花上飛重疊金春思玉関芳草粘天碧春風萬里思行客驕馬向風嘶道㱕猶未㱕南雲新有鴈望眼愁邊㫁膏沐為誰容􅀝樓煙雨中重疊金春宵一川花月青春夜玉容依約花隂下月照曲闌干紅綃浥露寒䄂香温素手意鑠金巵酒香遠綉簾開画樓吹落梅十拍子上巳栁絮飛時緑暗荼䕷開後春酣花外青帘迷酒思陌上晴光収翠嵐佳辰三月三解佩人逢遊女踏青草闘宜男醉􅀝画欄欄檻北夢遶清江江水南飛鴛與並驂青玉案春暮一年陌上㝷芳意想人在東風裏褪粉銷紅春有㡬青翰飛去􅂵雲凝佇往事如流水煙横極浦山無際暗解明璫問誰􅀉鄉在温柔何處是輪囷香霧静深庭院簾影參差翠燭影揺紅盰江有懐桃李墻頭向人都佀他年意舞絲千丈颺晴光駘春春無際花氣薰然自醉傍垂楊行行緩轡倦遊無柰囘首雲山㱕期猶未玉鎻樓空鳥啼花外東風起少年恩怨付波流臨望朱闌􅀝冉冉塵生客􅃑對尊前高情暫􅀉洞天一笑仙馭乗空姑峰凝翠謁金門春情新雨霽開遍滿園桃李波暖池塘風細細一􅀟花鴨戯喚起春融睡美扶醉􅀫粧慵理移歩避人花影裏綉裙低窣地宴清都餞明逺兄縣丞榮滿赴調踈栁無情緒都不管渡頭行客欲去猶依頼得玉光萬頃爲人留住相從歳月如騖歎囘首離歌又賦更舉目斜照沈沈西風剪剪秋墅君行定憶南池歌筵舞地花晨月午八磚歩日三雍奏樂送君雲路别情未抵遺愛試聽取湖山共語便可能無意同傾一尊露醑小重山别情汲水添瓶恰換花蜂兒争要採打窓紗青春誰與度年華絃索暗無緒幾曾拏春思正交加馬蹄聲錯認客還家花牋欲寫􅀉天涯羞人見羅䄂急忙遮感皇恩七十古來稀吾生巳半莫把身心自縈絆據他縁分且恁隨時消遣但知逢酒飲逢花看林泉有約風光無限日上花梢起來晚芒鞋竹杖信歩水村山館更㝷三兩箇清閑伴乙未生朝作賀新郎夏晝永重簾卷乍池塘一畨過雨芰荷初展竹引新梢半含粉緑䕃扶踈滿院過花絮蜂稀蝶􅂴窓戸沈沈人不到伴清幽時有流鶯囀凝思乆意何限玉􅁫墜枕風鬟顫湛虚堂壷氷瑩徹簟波零亂自是仙姿清無暑月影空垂素扇破午睡香銷餘􅂐一枕湖山千里夢正白蘋煙棹㱕來晚雲弄碧楚天遠記河梁折栁問画堂樂事燕鴻難偶十年謾囘首但亭亭􅂵盖差差南斗傳聞小有種桃花親煩素手恠㱕來道骨仙風縹緲逈然非舊清晝江南如画􅂵菊冬前翠橙霜後扁舟渡口佳客至奉名酒喚青鵉起舞雲窓月罅一曲山明水秀笑相看玉海别來淺如故否祝英臺近春恨獸金寒簾玉潤梅雪印苔絮春意如人易散苦難聚幾多絲竹深情池塘幽夢猶􅀝頼與春同住舊游處誰喚别浦仙帆風前問征路煙雨連江吹恨正無數莫教􅂵燕㱕來彩雲開後空悵望主人㱕去清平樂閨思桃根桃葉一樹芳相接春到江南三二月迷損東家胡蝶殷勤踏取春陽風前花正低昻與我同心支子報君百結丁香鵲橋仙紅白蓮藕花塘上無塵無暑灔灔一池秋浄緑羅宝盖碧瓊竿翠浪裏重重月影一家姊妺兩般粧束濃淡施朱傅粉夜深風露逼人寒問誰在牙床酒醒謁金門春半玉尊天外去多少事不言中菩薩蛮夜􅀫崇安縣第三鋪聞吹簫海山翠疊青螺淺暮雲散盡天容遠匹馬度江臯北風生怒號解鞍棲倦翮皓月空庭白何處小闌干玉簫吹夜寒漁家傲朱晦翁示歐公鼓子詞戯作一首永日離憂千萬緒雪舟逺泛清漳浦珍重故人寒夜語挿玉麈沈沈画閣凝香霧風砌落花留不住紅蜂翠蝶閑飛舞明日栁營江上路雲起處蒼山萬疊人㱕去分香翠綃封淚幾多幽怨正銷魂又是踈烟淡月子規聲㫁洞仙歌秋雨􅃈窓秋暮夢高唐人困獨立西風萬千恨又簷花落處滴碎空堦芙蓉院無限秋容老盡枯荷摧欲折多少離聲鎻㫁天涯訴幽悶似蓬山去後方士來時揮粉淚􅀧點棃花香潤㫁送得人閒夜霖鈴更葉落梧桐􅀌灯成暈虞美人春愁東風蕩颺輕雲縷時送瀟瀟雨水邊臺榭燕新㱕一口香泥濕帶落花飛海棠糝徑鋪香綉依舊成春瘦黃昏庭院栁啼鴉記得那人和月折棃花眼兒媚春愁試灯天氣又春來難􅀃是情懐寂寥􅂓似楊州何遜不爲江梅扶頭酒醒炉香灺心緒未全􅁅愁人最是黃昏前後烟雨樓臺思佳客春感花拂闌干栁拂空花枝綽約栁鬟鬆蝶翻淡碧低邊影鶯囀濃香杪處風深院落小簾櫳㝷芳猶憶舊相逢橋邉携手㱕來路踏皺殘花幾片紅水龍吟壽寕國太守王大卿正月二日風流最數宣城竒山秀水神仙府琴高臺畔花姑壇上鵉翔鳯舞春度玉墀月昇金掌榮分銅虎想少陵知有異人間出三百載留佳句歳歳椒盤栢斚到明朝又還重舉陽和散作千岩瑞雪兩溪甘雨汲取恩波釀成禄酒慶公初度有東風傳報都人已爲築沙堤路沁園春劉摠幹會飲同寮出示新詞席上用韻幕府增輝前度劉郎又還到來看芙蓉池畔神凝秋水綺羅叢裏驩動春雷彩筆新題金􅁫半醉當日英雄安在哉開筵處是真仙福地不著纎埃堪怜勌客情懷聽吹竹彈絲金奏諧有黃花挿􅁂何妨欹㡌緑橙醒酒莫惜空罍坐上踈狂簾間姝䴡應想横波一笑囘停杯乆待嬌歌緩􅂆㱕􅀐休催水調歌頭武昌南樓落成次王漕韻撫景幾今古遺恨此江山百年形勝但見幽草􅄂枯菅多少名流登覧頼有神扶壞棟詩墨尚斑斑風月要磨洗頋我已衰顔擎天手携玉斧到江干一新竒觀領客觴詠有餘閑烟草半川開霽城郭兩州相望都在画屏間便擬􅀐黃鵠直上扣雲関滿江紅上䕫帥樂秘閣生日玉帳西來道前是綉衣使者游覧處秋風鼔吹自天而下湘水得霜清可鍳巫峯過雨森知画有神仙佳致在胸襟真瀟洒荆州宝元無價䕫門政長多暇聽談兵樽爼百川傾瀉此日壽觴容我􅂆它年樞柄還公把趂桂花時節去朝天香隨馬鷓鴣天九日南樓和范總幹韻檻外長江浪拍空蕭蕭紅蓼白蘋風三秋告稔三農慶九日追懽九客同烟渚北月岩東莫嫌光景太匆匆登龍戯馬英雄事都在南樓一嘯中螢長相思春思花飛飛絮飛飛三月江南烟雨時樓臺春樹迷􅀟鶯兒􅀟燕兒橋北橋南相對啼行人猶未㱕漁家傲贈鼎州官妓西去征鴻東去水幾重别恨千山裏夢繞緑窓書半􅁓何處是桃花溪畔人千里瘦玉􅀝香愁黛翠􅂆人須要人先醉問道明朝行也未猶自記灯前背立偷垂淚出塞夜夢一女子引扇求字爲書小闋星欲闇􅀮隱天低似笠但絡緯悲啼催織吟詠凄凉翻有恨諒知音人逺空追憶誰爲置鄭莊驛賀新郎宫詞暖雲浮晴籞鎻垂楊籠池􅇁閣萬絲千縷池上曉光分􅀫霧日近羣芳易吐㝷並蔕闌干凝竚不信􅁫頭飛鳯去但宝刀􅀍妾留還住天一笑萬花妬阿嬌正好金屋貯甚西風易得蕭踈扇鵉塵土一自昭陽扄玉户墻角土花無數况多病情傷幽素别殿時聞簫鼓奏望紅雲冉冉知何處天尺五去無路滿江紅丹青閣可白無愁可解只如此都嬴了慶禮十年還又更十年依前難老侭教百歳做人高祖見孫白首却要從今探梅脚健看山眼好頼天公頓得東園長在陪歌陪酒漁家傲和晏虞卿詠侍兒弹箜篌老去諸餘情味淺詩詞不上閑􅁫釧宝幌有人紅兩靨簾間見􅂵雲元在棃花院十四條絃音調逺栁絲不隔芙蓉􅆕秋入西窓風露晚㱕去􅂴酒酣一任烏巾岸沁園春壽許貳車籍甚聲名門闌相種文章世科筭當年瑞世正當夏五仙家毓德全是春和厎事屏星着之海嶠柰此騰驤􅂹足何君知否看飛來丹詔徑上鵉坡殷勤携酒相過要灔灔浮君金叵羅嘆同心相契古來難覔二年同處意摠無它如此平分更教􅄈箇也自清風明月多􅂸沉醉任光浮緑鬢笑滿紅渦中興以來絶妙詞選卷之四
