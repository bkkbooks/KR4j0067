front:
  text: 絶妙詞􅃟序長短句始于唐盛于宋唐詞具載花间集宋詞多見于曾端伯􅀁編而復雅一集又兼采唐宋迄于宣和之季凡四千三百餘首吁亦備矣况中興以来作者繼出及乎近世人各首詞詞各有體知之而未見見之而未盡者不勝算也暇日裒集得數百家名之曰绝玅詞􅃟佳詞豈􅀎盡録亦嘗鼎一臠而已然其盛麗如㳺金張之堂妖冶如攬嬙施之袪悲壮如三闾豪俊如五陵花前月厎舉杯清唱合以􅂵簫節以紅㸦飄飄然作􅀐􅛃􅀭州之想信可樂也親友劉誠甫謀栞諸梓傳之好事者此意善矣又禄余舊作數十首附扵後不無珠玉在側之愧有愛我者其為刪之淳祐己酉百五玉林中興以來絶妙詞選綱目
  hash: sha256:47991547bef94622ff46ab83cb5369b345697253181317645b098f21b18af0aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0067_SBCK_000-1a}
body:
  text: 花菴詞客編集卷之一康伯可二十三首陳去非七首李漢老五首葉少藴七首曾公衮三首曾純甫十四首曾谹父三首吕居仁十二首朱希眞十首朱雍三首張仲宗十三首卷之二劉彦冲二首趙元鎭十一首王民瞻五首李似之二首張材甫九首張安國二十四首吳彦高二首楊廷秀二首吳大年二首范至䏻七首陸務觀二十首卷之三張功甫十五首胡仲任一首張東父五首韓無咎三首辛㓜安四十二首京仲遠五首姚令威五首卷之四吳子和十六首鄭中卿五首謝勉仲十首趙文鼎十四首趙德莊五首黄子厚三首趙昌甫二首韓仲止一首易彦祥二首蔡行之一首陳同甫七首李居厚六首李知㡬四首㳺子明三首危逢吉三首卷之五劉德脩十首李子大一首李子清二首李子永二首李子召一首李子秀一首劉改之十首劉叔擬十七首嚴次山三十首嚴少魯二首卷之六馬莊父十一首姜堯章三十四首高賔王二十首卷之七史􅀖卿十七首卓稼翁三首崔正子一首魏華父四首劉潜夫四十二首劉伯寵五首卷之八劉叔安二十二首施乘之一首戴式之十首盧申之二十四首李公甫一首卷之九張宗瑞二十一首宋謙父六首王子文一首曹西士一首李俊明一首趙用父一首黄子魯一首潘庭堅一首吳毅甫十三首王實之七首方千里三首劉静甫五首卷之十劉圻父八首吳君特九首陳敬􅅱二首馮熈之五首馮偉壽六首李芸叟一首連可久一首洪叔璵十六首附録黄叔暘三十八首中興以來絶妙詞選綱目
  hash: sha256:ea20bb28e664137cf1d1cf71b28f78bebf24dd731b0ba9cecfebe32d323e59f5
