front:
  text: 盡日東風吹緑樹向晚輕寒數􅀧催花雨年少凄凉天賦與更堪春思縈離緒臨水高樓携酒處曾􅀝哀絃歌㫁黄金縷樓下水流何處去凭欄目送蒼烟暮
  hash: sha256:feb88105adb74738baa18d99ab8bd3a2aafa8acf34df522b5af6b3600b65bb3b
