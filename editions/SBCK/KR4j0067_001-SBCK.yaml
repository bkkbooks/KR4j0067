body:
  text: 有晏叔原亦不得獨擅盖知言云瑞鶴仙上元應制瑞煙浮禁􅁐正絳闕春囘新正方半氷輪桂華滿溢花衢歌市芙蓉開遍龍樓兩觀見銀燭星毬有爛捲珠簾盡日笙歌盛集宝􅁫金釧堪羡綺羅叢裏蘭麝香中正宜遊翫風柔夜暖花影亂笑聲喧閙蛾兒滿路成團打塊簇着冠兒闘轉喜皇都舊日風光太平再見按此詞進入太上皇帝極稱賞風柔夜煖以下至於末章賜金甚厚瑞鶴仙别恨薄寒羅䄂怯教小玉添香􅀍翻宫襭蘭缸半明㓕聽幾聲㱕鴈一簾微月情波恨葉索新詞猶自怨别夢囘時雪暖酥凝掠鬢宝鴛􅁫折凄切紋窓描綉舊譜㝷棊變成虚設同心對結重來是甚時節悵姑蘇臺上征帆何許􅀮􅀮遥山萬疊䄂紅綃獨立無言偷彈淚血漢宫春慈寕殿元夕􅀍㫖作雲海沉沉峭寒収建章雪殘鳷鵲華灯照夜萬井禁城行樂春隨鬢影映參差栁絲梅蕚丹禁杳鰲峰對聳三山上通寥廓春衫綉羅香薄歩金蓮影下三千綽約氷輪桂滿皓色冷浸樓閣霓裳帝樂奏昇平天風吹落留鳯輦通宵宴賞莫放漏聲閑却喜迁鶯丞相生日臘殘春早正簾幕護寒樓臺清曉宝運當千佳辰餘五嵩岳誕生元老帝遣阜安宗社人仰雍容廊廟盡揔道是文章孔孟勲庸周召師表方眷遇魚水君臣須信從來少玉帶金魚朱顔緑􅁂占㫁世間榮耀􅂐刻鼎彛將遍整頓乾坤都了願歳歳見栁梢青淺梅英紅小此詞雖佳惜皆媚竈之語盖爲檜相作耳喜迁鶯秋夜聞鴈秋寒初勁看雲路鴈來碧天如鏡湘浦煙深衡陽沙遠風外幾行斜陣囘首塞門何處故國関河重省漢使老認上林欲下裴囘清影江南煙水暝聲過小樓燭暗金猊冷送目鳴琴裁詩挑錦此恨此情無盡夢想洞庭飛下散入雲濤千頃過盡也柰杜陵人逺玉関無信醜奴兒令促養直赴雪夜溪堂之約馮夷翦碎澄溪練飛下同雲著地無㾗栁絮梅花處處春山隂此夜明如晝月滿前村莫掩溪門恐有扁舟興人醜奴兒令自嶺表還臨安作紅樓􅂵陌青春路栁色皇州月澹煙柔裊裊亭亭不自由舊時扶上彫鞍處此地重遊揔是新愁栁自輕盈水自流訴􅂨情令登欎􅀌臺與施德初同讀坡詩作欝􅀌臺上立多時煙晚暮雲低山川城郭良是囘首昔人非今古事秪堪悲此心知一樽芳酒慷􅁣悲歌月墮人㱕訴􅂨情令長安懐古阿房廢址漢荒坵狐兎又羣遊豪華盡成春夢留下古今愁君莫上古原頭淚難収夕陽西下塞鴈南飛渭水東流菩薩蛮令長安懐古秦時宫殿咸陽裏千門萬戸連雲起􅃨道亘西東不禁三月風漢唐乘王氣萬歳千秋計畢竟是荒丘荆榛滿地愁菩薩蛮令金陵懐古龍蟠虎踞金陵郡古來六代豪華盛縹鳯不來遊臺空江自流下臨全楚地包舉中原勢可惜草連天晴郊狐兎眠感皇恩幽居一雨一畨凉江南秋興門掩蒼苔鏁寒徑紅塵不到盡日鳥啼人静緑荷風已過揺香柄澹隂未解園林清􅃳一片飛花墮紅影殘書讀盡䄂手高吟清詠任從車馬客勞方寸洞仙歌令荷花若耶溪路别岸花無數欲歛嬌紅向人語與緑荷相􅀝恨囘首西風波淼淼三十六陂煙雨新粧明照水汀渚生香不嫁東風􅀍誰誤遣踟蹰騷客意千里緜緜仙浪逺何處凌波微歩想南浦潮生画橈㱕正月暁風清㫁腸凝佇賣花聲閨思蹙損逺山眉幽怨誰知羅衾滴盡淚烟脂夜過春寒愁未起門外鵶啼惆悵阻佳期人在天涯東風頻動小桃枝正是銷魂時候也撩亂花飛賣花聲閨思愁撚㫁􅁫金逺信沉沉秦筝調怨不成音郎馬不知何處也樓外春深好夢已難㝷夜夜餘衾目窮千里正傷心記得當初郎去路緑樹隂隂江城子越臺春遊作南溪二月雨初晴四郊明暖風輕一雨一風鋪地落紅英枝上流鶯啼􅂆我春欲去且留春登臨行樂慰閑情過長亭暮潮平四􅆕青蕪中是越王城信馬行吟㱕路晚山簇簇栁隂隂風入松春晚一宵風雨送春㱕緑暗紅稀画樓整日無人到與誰同撚花枝門外薔薇開也枝頭梅子酸時玉人應是數㱕期翠歛愁眉塞鴻不到􅀟魚逺嘆樓前流水難西新恨欲題紅葉東風滿院花飛風入松閨思碧苔滿地襯殘紅緑樹隂濃曉鶯啼破眉心事舊愁新恨重重翠黛不忺重掃佳時每恨難同花開花謝任東風此恨無窮夢魂擬逐楊花去殢人休下簾櫳要見只慿清夢幾時真箇相逢謁金門暮春春又晚風勁落紅如剪睡起綉床飛絮滿日長門半掩不管離腸欲㫁聽盡梁間􅀟燕試上小樓還不見樓前芳草逺長相思遊西湖南高峯北高峯一片湖光煙靄中春來愁殺儂郎意濃妾意濃油壁車輕郎馬騘相逢九里松應天長閨思管絃綉陌灯火画橋塵香舊時㱕路腸㫁蕭娘舊日風簾映朱戸鶯能舞花解語念後約頓成輕負緩彫轡獨自㱕來凭欄情緒楚岫在何處香夢悠悠花月更誰主惆悵後期空有鱗鴻􅀉紈素枕前淚窓外雨翠幕冷夜凉虚度未應信此度相思寸腸千縷玉樓春令青牋後約無憑據誤我碧桃花下語誰將消息問劉郎悵望玉溪溪上路春來無限傷情緒擬欲題紅憶昔午橋橋上飲坐中多是豪英長溝流月去無聲杏花踈影裏吹笛到天明二十餘年成一夢此身雖在堪驚閑登小閣看新晴古今多少事漁唱起三更臨江仙端午髙詠楚詞酬午日天涯節序匆匆榴花不似舞裙紅無人知此意歌罷滿簾風萬事一身傷老矣戎葵凝笑墻東酒杯深淺去年同試澆橋下水今夕到湘中虞美人邢子友㑹上超然堂上閑賔主不受人間暑氷盤圍坐此間無却有一瓶和露玉芙蕖亭亭風骨凉生牖更盡尊中酒酒闌踏月轉城西照見幅巾蔾杖帶香㱕虞美人祖席酔中張帆欲去仍搔首更醉君家酒吟詩日日待春風及至祧花開後却匆匆歌聲頻爲行人咽記着樽前雪明朝酒醒大江流滿載一船離恨向衡州漁家傲福建道中今日山頭雲欲舉青蛟素鳯移時舞行到石橋聞細雨聽還住風吹却過溪西去我欲㝷詩寛乆旅桃花落盡春無數渺􅄅藍輿穿翠楚悠然處高林忽送黄􅕢語菩薩蛮荷花南軒􅆕對芙蓉浦宜風宜月還宜雨紅少緑多時簾前光景竒繩床烏木几盡日䌓香裏睡起一篇新與花爲主人南歌子塔院僧閣矯矯千年鶴茫茫萬里風欄干三􅆕看秋空背挿浮屠千尺冷煙中林塢村村暗溪流處處通此間何似玉霄峰遥望蓬萊依約晚雲東一團嬌軟是將春揉做撩亂隨風到何處自長亭人去後烟草萋迷㱕來了裝􅀧離愁無數飄􅀭無箇事剛􅀍縈牽長是黄昏怕微雨記那囘深院静簾幕低垂花隂下霎時留住又只恐伊家忒踈狂驀地和春帶將㱕去小冲山立春誰􅂆東風臘裏來不知天待雪惱江梅東郊寒色尚徘徊􅀟綵燕飛傍􅁂雲堆玉冷暁粧臺宜春金縷字拂香腮紅羅先綉踏青鞋春猶淺花信更須催木蘭花美人書字賀新郎春晚睡起流鶯語掩蒼苔房櫳向暁亂紅無數飛盡殘花無人見惟有垂楊自舞漸暖靄初囘輕暑宝扇重㝷明月影暗塵侵尚有乘鵉女驚舊恨鎭如許江南夢㫁蘅臯渚浪黏天蒲萄漲緑半空煙雨無限樓前滄波意誰采蘋花􅀉取但悵望蘭舟容與萬里雲帆何時到送孤鴻目㫁千山阻誰爲我唱金縷江神子湘虚鼓瑟銀濤無際卷蓬瀛落霞明暮雲平遥見青鵉􅂵鳯下層城二十五絃彈不盡空感槩有餘情蒼梧雲水㫁㱕程卷霓旌爲誰迎空有千行流淚􅀉幽貞舞罷魚龍雲海冷千古恨入江聲浣溪沙重陽前一日小雨初囘昨夜凉繞籬新菊巳催黄碧雲無際卷蒼茫千里㫁鴻供逺目十年芳草掛愁腸緩歌􅂓與送清觴念奴嬌中秋燕客洞庭波冷望氷輪初轉滄海沉沉萬頃􅀌光雲陣卷長笛吹破層隂洶湧三江銀濤無際遥帶五湖深酒闌歌罷至今鼉怒龍吟囘首江海平生漂流容易散佳會難㝷縹緲高城風露爽獨􅀝危檻重臨醉倒清樽常娥應笑猶有向來心廣寒宫殿爲余􅂓借瓊林虞美人雨後置酒林檎花下落花巳作風前舞又送黄昏雨暁來庭院半殘紅惟有游絲千丈舞晴空殷勤花下重携手更盡樽中酒美人不用歛歌眉我亦多情無柰酒闌時醉蓬萊上巳日有懷許下西湖問春風何事㫁送䌓紅便􅂸㱕去牢落征途笑行人羈旅一曲陽関㫁雲殘靄做渭城朝雨欲􅀉離愁緑後院短墻臨緑水春風急管䌓絃問誰親按小嬋姢玉堂眞學士琳館地行仙安得此身來此處依俙一夢梨園江南刺史謾垂涎據鞍腸巳㫁何况到尊前洞仙歌感舊相如當日曾奏凌雲賦落筆縱横妙風雨記􅀭鞭輦路同醉金明同勝賞不管重城巳暮舊游如夢斍零落朋儕遺墨淋漓尚如故况神州北望今巳丘虚傷白璧乆埋黄土但一似靈光巋然存悵明月清風更無玄度玉砌空餘三十六離宫塞笳驚起暮天鴈寂寞東風南柯子元夜璧月窺紅粉金蓮映綵山東風絲管滿長安移下十洲三島在人間兩兩人初散厭厭夜向闌倦粧殘醉怯輕寒手撚玉梅無緒􅀝䦨干憶秦娥邯郸道上望叢臺有感風蕭瑟邯鄲古道傷行客傷行客䌓華一瞬不堪思憶叢臺歌舞無消息金尊玉管空陳迹空陳迹連天草樹暮雲凝碧朝中措維楊感懐雕車南陌碾香塵一夢尚如新囘首舊游何在栁煙花霧迷春如今霜􅁂愁停短棹􅂴傍清尊二十四橋風月㝷思只有銷䰟蝶恋花惜春翠箔垂雲香噴霧年少踈狂載酒㝷芳路多少惜花春意緒勸人金盞歌金縷桃杏飄零風景暮只有閑愁不逐流年去舊事而今誰共語画樓空指行雲處訴􅂨情宫怨建章宫殿晚生寒飛雪􅀧朱欄舞腰緩隨檀板輕絮殢春閑愁思亂酒腸慳漏將殘玉人今夜滴粉搓酥應歛眉山感皇恩重到臨安作依舊惜春心花枝常好只恐樽前􅀍花笑少年青􅁂耐得㡬畨重到舊歡慵記省如天杳綺陌青門斜陽芳草今古銷沈送人老帝城春事又是等閑來了亂紅隨過雨鶯聲悄眼兒媚閨思花近清明晚風寒錦幄獸香殘醺醺醉裏匆匆相見重聽哀彈春情入指鶯聲碎危柱不勝絃十分得意一􅂣輕夢淡月闌干南郷子别意霜月晚雲収蕭瑟西風滿院秋雅會難期嗟易散遲留把酒聽歌且勸酬萬事􅂸悠悠只有情親未意休後夜扁舟煙浪裏囘頭葉葉丹楓總是愁阮郎㱕上􅁐初夏侍宴池上双飛新燕掠水而去得㫖賦之栁隂庭館占風光呢喃清晝長碧波新漲小池塘􅀟􅀟蹴水忙萍散漫絮飄􅀭輕盈躰態狂爲憐流去落紅香銜􅀅㱕画梁沁園春初冬夜坐聞淮上捷音次韻更漏迢迢乍寒天氣画燭對床正井梧飄砌邊鴻度月故人何處水逺山長老去功名年來情緒寛盡寒衣銷舊香除非是仗蛮牋象管時伴吟窓詞章莫話行藏且喜見捷書來帝郷看銳師雲合妖氛電掃隋堤官栁依舊成行夢繞它年青門􅂵陌對酒花前歌正書空成恨柰潘郎兩􅁂新􅀧吳霜菩薩蛮次韻龍深甫春日即事杏花寒食佳期近一簾煙雨琴書潤砌下水潺潺玉笙吹暮寒陽臺雲易散往事㝷思􅂴花底醉相扶當時人在無念奴嬌送淮漕錢處和繡衣直指問凌風一笑翩然何許詔出層霄持漢節千里秋風淮浦鑑逺江山竹西歌吹曾􅀍腥膻汚須君椽筆爲渠一洗塵土休厭共倒金荷翠眉重爲唱渭城朝雨看即􅀭鞭㱕􅀐穩還指鬱葱深處宝帶兼金華韀新綉直上雲宵去囘頭莫忘玉霄今夜風露訴􅇆情别意鄞江雲氣近蓬萊花栁滿城隈風流謝守相遇應覆故人杯煙浪暖錦帆囘莫徘徊玉霄亭下芍藥荼昨夜江頭新雨過門前流水清如玉抱小橋囘合栁參天揺新緑踈籬下叢叢菊虚簷外蕭蕭竹歎古今得失是非榮辱須信人生㱕去好世間萬事何時足問此春春釀酒何如今朝熟採桑子别情恨君不似江樓月南北東西南北東西只有相隨無别離恨君却似江樓月暫滿還虧暫滿還虧待得團圎是幾時菩薩蛮夜宴高樓只在斜陽裏春風淡蕩人都喜携客不嫌頻使君如酒醇花光人不會月色須君醉月色與花光共成今夜長南歌子旅思驛路侵斜月溪橋度曉霜短籬殘菊一枝黃正是亂山深處過重陽旅枕元無夢寒更每自長只言江左好風光不道中原㱕思轉淒凉減字木蘭花憶舊去年今夜同醉月明花樹下今夜江邊月暗長堤栁暗船故人何處帶我離愁江外去來歳花前還似今年憶去年長相思閨詞要相忘不相忘玉樹郎君月艶娘幾囘曾㫁腸欲下床却上床上得床來思舊郷北風吹夢長踏莎行梅雪雪似梅花梅花似雪似和不似都竒絶惱人風味阿誰知請君問取南樓月記得去年探梅時節老來舊事無人􅀃爲誰醉倒爲誰醒到今却怕輕離别生查子離思􅀟􅀟小鳯斜淡淡鴉兒穩一曲渭城歌栁色饒春恨離觴洗别愁酒盡愁難盡宝瑟鴈縦横誰􅀉天涯信生查子離思人分南浦春酒把陽関盞衣帶自無情頓爲離人緩愁隨苦海深恨逐前峯逺更聽㫁腸猿一似聞絃鴈蝶恋花春詞巧語嬌鶯春未暮楊栁風流恰過池塘雨芳草滿庭花滿樹無情胡蝶飛來去睡起小奩香一縷玉􅂐囘紋等箇人分付桃葉不言人不語眉尖一􅀧君知否役於非望之福者念奴嬌梅詞見梅驚笑問經年何處収香藏白似語如愁却問我何苦紅塵乆客觀裏栽桃仙家種杏到處成踈隔千林無伴淡然獨傲霜雪且與管領春囘孤標爭肯接雄蜂雌蝶豈是無情知受了多少凄凉風月􅀉驛人遥和羮心在􅃘使芳塵歇東風寂寞可人誰爲攀折水龍吟感事放船千里凌波去略爲吳山留頋雲屯水府濤隨神女九江東注北客翩然壯心偏感年華將暮念伊嵩舊隱巢由故友南柯夢遽如許囘首妖氛未掃問人間英雄何處竒謀報國可憐無用塵昏白羽鐵鎻横江錦帆衝浪孫郎良苦但愁􅃻桂櫂悲吟梁甫淚流如雨採桑子乱後作扁舟去作江南客旅鴈孤雲萬里烟塵囘首中原泪滿巾碧山相映汀洲冷楓葉蘆根日落波平愁損辤郷去國人减字木蘭花懐感古人誤我獨舞西風雙淚墮鶴去無蹤木落西陵返照紅人間難住擲下酒杯何處去樓鎻鍾殘山北山南兩􅀧煙相見懽吳中東風吹盡江梅橘花開舊日吳王宫殿長青苔今古事英雄淚老相催常恨夕陽西去晚潮囘西江月警悟世事短如春夢人情薄似秋雲不須計較苦勞心萬事元來有命幸遇三盃酒美况逢一朶花新片時􅂬笑且相親明日隂晴未定西江月自樂日日深盃酒滿朝朝小圃花開自歌自舞自開懐且喜無拘無礙青史幾畨春夢紅塵多少竒才不須計較與安排領取而今見在卜筭子除夕江上見新年年夜聽春雨有箇人人領略春粉淚紅輕注深􅂆玉西東低唱黄金縷撚厎梅花摠是愁酒盡人㱕去鷓鴣天自述我是清都山水郎天教分付與踈狂曾批給雨支風臯碧雲冉冉横溪橋瓊車未至餘香飄餘香飄一簾踈影月在花梢好事近梅春色爲誰來枝上半留殘雪恰近小園香徑對霜林寒月危欄悽㫁笛聲長吹到偏嗚咽最好短亭㱕路有行人先折謁金門春太早十二玉樓初暁半額試粧深院悄相逢何草草臨水幽香縹緲彷彿淡粧窺照恰值日邊人未到紛紛縈古道賀新郎寄李伯紀丞相曵杖危樓去斗垂天滄波萬頃月流煙渚掃盡浮雲風不定未放扁舟夜渡􅀫鴈落寒蘆深處悵望関河空吊影正人間鼻息鳴鼉鼓誰伴我醉中舞十年一夢楊州路􅀝高寒愁生故國氣吞驕虜要斬樓蘭三尺劔遺恨琵琶舊語謾暗澁銅花塵土喚取謫仙平章看過苕溪尚許垂綸否風浩蕩欲輕舉滿江紅旅思春水連天挑花浪幾畨風惡雲乍起逺山􅃒盡晚風還作緑遍芳洲生杜若楚帆帶雨煙中落認向來沙觜共停橈傷飄泊寒猶在衾偏薄腸欲㫁愁難着􅀝蓬窓無寐引盃孤酌寒食清明都過了可憐孤負年時約想小樓日日望㱕舟人如削蘭陵王春遊卷珠箔朝雨輕隂乍閣闌干外煙栁弄晴芳草侵堦映紅藥東風妬花惡吹落梢頭嫰蕚屏山掩沈水倦熏中酒心情怕杯勺㝷思舊京洛正年少踈狂歌笑迷著障泥油壁催梳掠曾馳道同載上林携手燈夜初過早共約又爭信漂泊寂寞念行樂甚粉淡衣􅁭音㫁絃索瓊枝璧月春如昨悵别後華表那囘雙鶴相思除是向醉裏暫忘却蘭陵王春思綺霞散空碧留晴向晚東風裏天氣困人時節秋千閉深院簾旌翠波颭窓影殘紅一線春光好花臉栁腰勾引芳菲閙鶯燕閑愁費消遣想蛾緑輕顰鵉鑑新怨單衣欲試寒猶淺羞衾鳯空展塞鴻難托誰問潜寛舊帶眼念人似天逺迷恋画堂宴看最樂王孫濃艶争􅂆蘭膏宝􅂐春宵短擁檀板低唱玉杯重暖衆中先醉謾􅀝檻早夢見念奴嬌秋思江天雨霽正露荷擎翠風槐揺緑試問秦樓今夜裏秋到闌干幾曲笑撚黄花重題紅葉無柰㱕期促暮雲千里桂華初綻寒玉有誰伴我凄凉除非分付與杯中醽醁水本無情山又逺囘首煙波雲木夢繞西園魂飛南浦自古情難足舊遊何處落霞空映孤鶩石州慢初春感舊寒水依㾗春意漸囘沙際煙闊溪梅晴照生香冷蕋數枝争􅀤天涯舊恨試看幾許消魂長亭門外山重疊不盡眼中青怕昏黄時節情切画樓深閉想見東風暗消肌雪辜􅀒枕前雲雨樽前花月心期切處更有多少凄凉殷勤留與㱕時􅀃到得再相逢恰經年離别青玉案憶舊華􅅂玉轡青絲鞚記年少金吾從花厎朝囘珠翠擁曉鐘初㫁􅀫酲猶帶緑􅃈窓中夢天涯相遇鞭鵉鳯老去空成更情重月轉簷牙雲遶棟凉吹香霧酒迷歌扇春笋傳杯送臨江仙荼􅐘有感鶯喚屏山驚睡起嬌羞須索郎扶荼䕷斗帳罷熏爐翠穿珠落索香泛玉流酥長記枕痕消醉色日高猶倦粧梳一枝春痩想如初夢迷芳草路望㫁素鱗書浣溪沙别意燕掠風簷欵欵飛艶桃穠李閙長堤􅀐鯨人去暁鶯啼可意湖山留我住㫁腸煙水送君㱕三春不是别離時漁家傲樓外天寒山欲暮溪邊雪後藏雲樹小艇風斜沙觜露流年度春光巳向梅梢住短夢今宵還到否茟村四望知何處客裏從來無意緒催㱕去故園正要鶯花主謁金門道山亭餞張椿老赴行在風露底石上岸巾愁起月到房心天似水亂峯清影裏此去登瀛須記今夕道山同醉春殿明年人共指玉皇香案吏中興以來絶妙詞選卷之一
