front:
  text: 惆悵栁烟何處目送落霞江浦明夜月當樓照人愁
  hash: sha256:97ab88fdc546f1bcd322c2009f99ee4a611725c1c0bc35995ab71edf138e659c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0067_SBCK_005-1a}
body:
  text: 江城子梅花十分雪意却成霜暮雲黄月微茫只有梅花依舊吐幽芳還喜無邊春信漏踈影下覔浮香才清端是􅂵薇郎别鵷行憶宫墻夜半胡爲人與月交相君合召㱕吾老矣月隨去照西廂洞仙歌荷花晚風収暑小池塘荷浄獨􅀝胡床酒初醒起徘􅆦時有香氣吹來雲藻亂葉厎游魚動影空擎承露盖不見氷容惆悵明粧曉鵉鏡後夜月凉時月淡花低幽夢斍欲慿誰省且應記臨流凭闌干便遥想江南紅酣千頃長相思别意玉樽凉玉人凉若聽離歌須断腸休敎成鬢霜画橋西画橋東有淚分明清漲同如何留醉翁水調歌頭旅思客夢一囬醒三度碧梧秋仰看今夕天上河漢又西流早晚凉風過鴈驚落空堦一葉急雨閙清溝㱕計休令暮宵露浥征裘古來今生老病許多愁郍堪更􅀃無限功業鏡中羞只有青山髙致對此還論世事舉白與君浮送我一盃酒誰起舞凉州臨江仙春思小院囬廊春寂寂晚來獨自閑行画簾東畔碧雲生也知無雨空滴枕邊聲一簇小桃開又落低頭拾取紅英東風相送忘相迎棃花寒食到得錦宫城臨江仙自詠我似萬山千里外悠然一片㱕雲宫銜猶自帶云云誰知於進士已是故將軍閑坐閑行閑飲酒閑拈閑字閑文諸公留我笑紛紛一枝簮宝髻六幅舞羅裙須殢酒無柰愁深酒淺但􅀉興焦琴紈扇莫鼓琵琶江上曲怕荻花楓葉俱悽怨雲萬疊寸心逺賀新郎遊西湖睡斍啼鶯曉醉西湖兩峰日日買花簮㡌去盡酒徒無人問惟有玉山自倒任拍手兒童争笑一􅀐乘風翩然去避魚龍不見波聲悄歌韻逺喚蘓小神仙路近蓬萊島􅂵雲深參差禁樹有烟花遶人世紅塵西障日百計不如㱕好付樂事與它年少費盡栁金棃雪句問沉香亭北何時召心未愜鬢先老賀新郎贈張彦功曉印霜花歩夢半醒扶上彫鞍馬嘶人去嵐濕青絲雙轡冷緩鞚野梅江路聽画角吹殘更鼓悲壯寒聲撩客恨甚貂裘重擁愁無數霜月白照離緒青樓囬首家何處早山遥水闊天低断腸烟樹誰念天涯牢落况輕􅀒暖雲濃雨記酒醒香銷時語客裏㱕韀須早􅀤怕天寒風急相思苦應爲我翠眉聚賀新郎多病劉郎瘦最傷心天寒歳晚客它郷乆大舸翩翩何許至元是髙陽舊友便一笑相􅂬携手爲問武昌城下月定何如楊子江頭栁追往事兩眉闘燭花細剪明於晝喚青娥小紅樓上殷勤􅂆酒昵昵琵琶恩怨語春笋輕攏翠䄂看舞徹金􅁫㣲溜若見故郷吾父老道長安市上狂如舊重㑹面㡬時又念奴嬌自述知音者少算乾坤許大着身何處直待功成方肯退何日可㝷㱕路多景樓前埀虹亭下一枕眠秋雨虚名相誤十年枉費辛苦不是奏賦明光獻書北闕無驚人之語我自匆忙天未許嬴淂衣􅅂塵土白璧堆前黄金買笑付與君爲主蓴鱸江上浩然明日㱕去糖多令再過武昌蘆葉滿汀洲寒沙帶淺流二十年重度南樓栁下繫船猶未穩䏻㡬日又中秋黄鶴断磯頭故人曾到不舊江山都是新愁欲買桂花重載酒終不似少年遊水調歌頭春半春事􅀎㡬許密葉着青梅日髙花困海棠風暖想都開不惜春衣典盡只怕春光㱕去片片􅀧蒼苔䏻得㡬時好追賞莫徘􅆦雨飄紅風換翠苦相催人生行樂且須痛飲莫辭杯坐則髙談風月醉則恣眠芳草醒後亦佳㢤湖上新亭好何事不曾來水調歌頭自述弓劔出榆塞鈆槧上蓬山得之渾不費力失亦匹如閑未必古人皆是未必今人俱錯世事沐猴冠老子不分别内外與中間酒湏飲詩可作指休弹人生行樂何自催得鬢毛斑達則牙旗金甲窮則蹇驢破㡌莫作兩般看世事只如此自有識鴞鵉天仙子初赴省别妾别酒醺醺渾易醉囬過頭來三十里馬兒不住去如飛牽一憇坐一憇断送殺人山共水是則青衫終可喜不道恩情􅂸得未雪迷村店酒旗斜去則是住則是煩惱自家煩惱你沁園春風雪中􅁒詣稼軒乆寓湖上未􅀎一往因賦此詞以自解斗酒彘肩風雨渡江豈不快㢤􅀍香山居士與林和靖約坡仙等勒駕予囬坡謂西湖正如西子淡粧濃抹臨照臺二公者皆掉頭不頋只恁傳杯白云天竺去來看金璧崔嵬樓􅀚開况一澗縈迂東西水遶兩山南北髙下雲堆逋曰不然暗香浮動何似孤山先放梅須晴去訪稼軒未晚且此徘􅆦名仙倫廬陵人自號招山有詩集行于丗樂章尤爲人􅀁膾灸吉州刋本多遺落今以家蔵善本􅃟集賀新郎壽王侍郎簡卿小停鉦鼓向沙邊栁下維舟慶公初度平盡羣蛮方易鎮此事多應有數柰自古功成人妬君看樂羊中山役任謗書盈篋終無據千載下竟誰與詩中帶得西山雨指天台鴈蕩㱕欤壽郷深處緩急朝廷須公出更作中流砥柱笑癡騃紛紛兒女多少人間不平事有皇天老眼䏻區處揮玉斚聽金縷賀新郎題吳江重喚松江渡嘆埀虹亭下銷磨㡬畨今古依舊四橋風景在爲問坡仙甚處但遺愛沙邊鷗鷺天水相連蒼茫外更碧雲去盡山無數潮正落日還暮十年到此長凝竚恨無人與共秋風鱠絲蓴縷小轉朱絃弹九奏擬致湘妃伴侣俄皓月飛來烟渚恍若乗槎河漢上怕客星犯斗蛟龍怒歌欵乃過江去賀新郎洪守席上詠牡丹翠盖籠嬌面記當年沈香亭北醉中曾見見了風流傾國艶紅􅂵紛紛過眼算好處何嫌春晚誰把天香和曉露倩東風特地匀芳臉千萬朶一時遍隔花聽取提壺􅂆道此花過了春㱕蝶愁鶯怨挽住東君須醉倒花厎不妨留恋待喚取笙歌一片最愛就中紅一朶似狀元得意春風殿還惹起少年恨賀新郎贈建康鄭玉脫籍鄭玉非娼女嘆塵縁未了飄零􅀍春留住腸断胭脂坡下路成甚心情意緒生怕入棃園歌舞寂寞陽臺雲雨散算人間誰是吹簫侶空買断兩眉聚新來鏡裏驚如許暗傷懐鶯老花殘㡬番春暮事逐孤鴻都已往月落千山杜宇念脩竹天寒何處不念􅃈窓并綉戸妾從前命薄甘荆布誰爲作解絛主念奴嬌送張明之赴京西幕艅艎東下望西江千里蒼茫烟水試問襄州何處是雉堞連雲天際叔子殘碑卧龍陳迹遺恨斜陽裏後來人物如君􅉞偉䏻㡬其肯爲我來耶河陽下士正自強人意勿謂時平無事也便以言兵爲諱眼厎山河樓頭鼓角都是英雄淚功名機會要湏閑暇先備念奴嬌感懐呈洪守吳山青處悵長安路断黄塵如霧荆楚西來行塹遠北過淮堧嚴扈九塞􅆛貅三関虎豹空作陪京固天髙難呌若爲得訢忠語追念江左英雄中興事業枉􅀍姦臣誤不見翠華移蹕處枉􅀒吾皇神武擊楫慿誰問籌無計何日寛憂頋􅀝笻長嘆滿懷清淚如雨念奴嬌長沙趙帥席上作西風何事爲行人掃蕩煩襟如洗埀漲蒸瀾都卷盡一片瀟湘清泚酒病驚秋詩愁入鬢對景人千里楚宫故事一時分付流水江上買取扁舟排雲湧浪直過金沙尾㱕去江南丘壑處不用來㝷月姊風露盃深芙蓉裳冷笑傲烟霞裏草廬如舊卧龍知爲誰起滿江紅題快閣和徐宰韻快閣東西鷗邊問晚晴可喜鷗解語旣盟之後兩翁曾􅀝笛弄慣聽黄魯直履聲深識徐淵子添我來相對兩忘機真相似也不種閑桃李也不翫佳山水有新詩字字愛民而已一片心閑秋月外三年人在春風裏漲一篙江水送㱕鴻明朝是滿江紅春晚着意留春留不住春㱕難恋最苦是梅天煙雨麥秋庭院嫰竹隂濃鶯出谷柔桑采盡蚕成繭柰沈腰寛盡有誰知難消遣幽閣恨雙眉歛香牋􅀉飛鴻逺向風簾羞見一雙㱕燕翠􅀍閑將情做夢青樓賺得恩成怨對尊前莫惜喚瓊􅁎持盃􅂆木蘭花慢秋日海棠漸秋空向晚􅀍風雨䟎重陽正木落踈林海棠枝上忽見紅粧料應妬它蘭菊甚年年獨自占秋光故把春風嬌面向人逞艶呈芳看來畢竟此花強秪是欠些香誚一似當年五陵公子却厭膏粱肯來水邊竹下與幽人相對􅀃凄凉只恐夜深花睡五更㣲有清霜霜天曉角題蛾眉亭􅀝空絶壁直下江千尺天際兩蛾凝黛愁與恨㡬時極暮潮風正急酒醒聞塞笛試問謫仙何處青山外逺烟碧訴􅇆情客中征衣薄薄不禁風長日雨絲中又是一年春事花信到梧桐雲漠漠水溶溶去匆匆客懐今夜家在江西身在江東江神子洪守出歌􅁎就席口占華堂深處出娉婷語聲輕笑聲清燕語鶯啼一一付春情恰似洛陽花正􅀤見花好不知名金甌盛酒玉纎擎滿盈盈􅂆深深不怕主人敎你十分斟只怕酒䦨歌罷後人不見暮山青繫裙腰愁别山兒矗矗水兒清船兒似葉兒輕風兒更没人情月兒明厮合造送行人眼兒蔌蔌淚兒傾灯兒更冷青青遭逢着鴈兒又没前程一聲聲怎生得夢兒成詞獧薄而意優柔永遇樂春莫有懐青幄蔽林白氊鋪徑紅雨迷楚晝閣関愁風簾捲恨盡日縈情緒陽臺雲去文園人病寂寞翠尊彫爼惜韶容匆匆易失芳叢對眼如霧中欹潤裛衣寛凉滲又斍漸囬驕暑解籜吹香遺丸薦脆小芰浮鴛浦画欄如舊依俙猶記佇立一鈎蓮歩黯銷䰟那堪又聽杜䳌更苦菩薩蛮怨别吹簫人去行雲杳杳篝翠􅀍都閑了疊損縷金衣是他渾不知冷烟寒食夜淡月棃花下猶自軟心腸爲他燒夜香無限意那得如椽彩筆但滿眼西風蕭瑟我􅀁思􅀆何處􅀁在鐔津津上滄湾側誰氏子閬風客閬風仙客才無敵賦悲秋抑􅀭頓挫流離沈鬱百賦千詩朝復暮解道波濤春力憶共尔乘槎吹笛八表神遊吾夢見渺洞庭青草烟波隔空悵望楚天碧賀新郎清浪軒送春碧浪揺春渚浸虚簷蒲萄滉􅃞翠綃掀舞委曲經過臺下路載取落花東去問花亦漂流良苦花不䏻言應有恨恨十分都􅀍春風誤同此恨有飛絮人生聚散元無據侭凭欄一尊相對蘋洲春莫嫉色冲冲空悵望淚盡世間兒女君不見千金求賦飛燕婕妤今何在看粘雲江影傷千古流不去断䰟處賀新郎送杜子野赴省􅀃到城南杜侭風流至今人號去天尺五家世聮翩蒼玉佩自有文章機杼看鵉鳯九霄軒翥文陣堂堂新淂雋正少年壯氣虹蜺吐拈彩筆月城去出関相送梅千樹雪連空馬蹄特特曉寒人度帝里春濃花似海催入明光奏賦湏快展亨衢闊歩隨世功名真漫浪要平生􅀁學期無負湏記得别時語㱕朝􅌚南劔双溪樓五月人間揮汗雨離恨一襟何處去雙溪樓下碧千㝷雙溪樓上匏尊舉晚凉生緑樹漁灯㡬􅀧依洲渚莫狂歌潭空月浄慘慘痩蛟舞変化往來無定􅀁求劔刻舟應笑汝只今誰是晉司空斗牛奕奕紅光吐我來空吊古與君同記凭欄語問滄波乘槎此去流到天河否㱕朝􅌚壽蕭禹平知縣雲表金莖珠璀璨當日投懷驚玉燕文章議論壓西廱風流姓字翔東􅀚􅂵皇嗟見晚祥麟五色留金殿大江西銅章墨綬暫尔煩君綰十二金􅁫扶玉盞錦瑟摐摐隨急管獸爐烟動彩雲髙秋聲拍碎紅牙板趣君㱕翰􅁐萊衣煥爛潘輿穩任方瞳從今看到弱水波清淺㱕朝􅌚别意朱戸緑窓深窈窕閃閃華旗紅幹小相逢斜栁絆輕舟渚香不断蘋花老西風吹夢草題詩未了還驚斍獨傷心凄凉故舘月過西樓悄樓外斜河低浸斗夜已如何夜將曉心期欲􅀉赤鱗魚秋雲不動秋江渺相思千里道多情直􅀍無情惱玉臺前請君試看華髮添多少水龍吟題連州翼然亭呈歐守翼然新榜髙亭翰林鐡畫燕公手滁陽盛事何人重継湟川太守太守謂誰文章的􅂀醉翁賢胄對千峯削翠雙溪注玉端不减琅琊秀坐歗清香画㦸聽丁丁滴花晴漏棠隂晝寂細賡賔客竹枝楊栁只恐明朝綈封趣覲未容借宼侭江山識賞塩梅事業煥青氊舊水龍吟題天風海濤呈潘料院颷車飛上蓬萊不湏更跨琴髙鯉剨然長嘯天風􅐓洞雲濤無際我欲乘桴從兹浮海約任公子辦虹竿千丈犗鈎五十親􅀧對連鰲餌誰榜佳名空翠􅂵陽仙去􅀐箕尾銀鈎鐡畫龍拏鳯峙留人間世更憶東山哀筝一曲洒沾􅁭淚到而今幸有髙亭遺愛寓甘棠意水龍吟題盱江偉􅀚城頭傑􅀚峥嶸重欄下瞰蒼龍脊鏤珉盤礎彫檀竦楶玲瓏金碧華子岡頭麻源谷口神仙窟宅道至今清夜月明風冷常隱隱聞笙笛翠壁煙霞縹緲更寒泉飛空千尺數峯江上孤舟天際夕陽紅濕抖擻征塵浩然長歗跨青鵉翼向鳯崗西望遥釃斗酒酹文章伯李㤗伯墓在鳯皇山下水調歌頭上韶州方檢詳時有節制之命慘淡望京闕慷􅁣夢天山引杯中夜看劔壯氣刷幽燕鼉鼓滿天催曙画角連雲歗月吹断戍缾烟犀角赤兎馬虎帳緑熊氈仗漢節伸大義伐可汗青􅁳更下斧􅃏赤子要君安鐡􅀐千羣􅀚獵宫様十眉環座礕礰聽鳴弦莫厭兠鍪冷㱕去已貂蝉木蘭花慢社日有懐東風吹霧雨更吹起裌衣寒正莽莽叢林潭潭伐鼓鬱鬱焚蘭闌干曲多少意看青烟如􅂐遶溪湾桑柘緑隂猶薄杏桃紅雨初翻飛花片片走潺湲問何日西還嘆􅅰擾人生紛紛離合渺渺悲􅂬想雲軿何處也對芳時應只在人間惆悵囬紋錦字断腸斜日雲山蝶恋花快閣傑閣青紅天半􅀝萬里㱕舟更近闌干艤木落山寒鳬鴈起一聲漁笛滄洲尾千古文章黄太史捫蝨髙風長照氷壺裏何以薦君秋菊蘂癯瓢爲酌西江水蝶恋花春情院静日長花氣暖一簇嬌紅淂見春深淺風送生香來近逺笑聲只在秋千畔目力未窮腸已断一寸芳心更逐遊絲亂朱戸對開簾捲半日斜江上春風晚鷓鴣天怨别一徑蕭條落葉深離腸凄断月明砧征鴻送恨連雲起促織驚秋傍砌吟風悄悄夜沈沈鴛機坐冷曉霜侵挑成錦字心相向未必君心似妾心鷓鴣天閨思多病春來事事慵偶因撲蝶到庭中落紅萬疊花經雨斜碧千條栁因風深院宇小簾櫳㡬年離别恰相逢擎觴未飲心先醉爲有春愁似酒濃鷓鴣天别意行盡春山春事空别愁離恨滿江東三更鼓潤官樓雨五夜灯殘客舍風寒淡淡曉朧朧黄雞催断丑時鍾􅂵騮嚼勒金銜響衝破飛花一道紅鷓鴣天惜别一曲危絃断客腸津橋捩柂轉牙檣江心雲帶蒲帆重樓上風吹粉淚香瑶草碧栁芽黄載將離恨過瀟湘請君看取東流水方識人間别意長鷓鴣天春思病去那知春事深流鶯喚起惜春心桐舒碧葉慳三寸栁引金絲可一㝷憐綉閣對雲岑苦無多力􅂴登臨翠羅衫厎寒猶在弱骨離支痩不禁鷓鴣天閨情髙杏酣酣出短墻埀楊裊裊蘸池塘文鴛藉草眠春晝金鯽吹波弄夕陽閑􅀝鏡理明粧自翻銀葉炷衙香鳴鞭已過青樓曲不是劉郎定阮郎鷓鴣天閨情公子詩成着錦􅂁王家桃葉舊妖嬈檀槽摐急斜金鴈綵䄂翩跹嚲翠翹沈水過􅂴重燒十分濃醉十分嬌􅃨羅帳裏春寒少只恐香酥拍漸消玉樓春春思春風只在園西畔薺菜花䌓胡蝶亂氷池晴緑照還空香徑落紅吹已断意長翻恨遊絲短盡日相思羅帶緩宝奩如月不欺人明日㱕來君試看阮郎㱕春思鰓花輕拂􅂵綿香瓊杯初暖粧貪凭彫檻看鴛鴦無心上綉床風絮亂恣輕狂惱人依舊忙夢隨殘雨下髙唐悠悠春夢長婆羅門引春情花明栁暗一天春色繞朱樓断鴻聲喚人愁欲問鴻㱕何處身世自悠悠正東風留滯楚尾吳頭追思舊遊歎雙􅁂颯驚秋可惜等閑孤了酒令花籌断絃難續謾題詩分付水東流流不到蓬島瀛洲醉桃源春景拍堤春水蘸埀楊水流花片香弄花􅏐栁小鴛鴦一雙隨一雙簾半捲露新粧春衫是栁黄􅀝欄看處背斜陽風流暗断腸好事近舟行曉色未分明敲動月邊鼉鼓卯酒一杯徑醉又别君南浦春江如席照晴空大舶夾雙櫓腸断斜陽渡口正落紅如雨訴􅂨情章貢别懐一聲水調解蘭舟人門無此愁無情江水東流去與我淚争流人已逺更囬頭苦凝眸断䰟何處梅花岸曲小小紅樓多麗記恨最無端官樓画角輕吹一聲來深閨深處把人好夢驚囬許多愁侭教奴受些箇事未必君知淚滴蘭衾寒生珠幌翠雲撩亂枕頻欹窓兒上㡬條殘月斜玉界羅帷更堪聽霜摧敗葉静扣朱扉念别離千里萬里問何日是㱕期関情處魚來鴈往断腸是兎走烏飛美景良辰賞心樂事風流孤負縷金衣謾嬴得花顔玉骨瘦損爲相思㱕須早劉郎雙􅁂莫遣成絲一落索春懐清曉鶯啼紅樹又一雙飛去日髙花氣撲人來獨自價傷春無緒别後暗寛金縷倩誰傳語一春不􅃘上髙樓爲怕見分携處南柯子曰㱕去來㱕去來􅀆吾將安㱕但有東籬菊有西園桂有南溪月有北山􅅔蜂則有房魚還有穴蟻有樓臺獸有衣吾應有雲中舊􅀮竹裏柴扉人間征路熹㣲看處處丹楓白露晞况寒原衰草牛羊來下淡煙秋水鱸鱖初肥自笑平生頽然骨相只合持竿坐釣磯都休也對西風無詔落日斜暉沁園春題吳明仲竹坡竹焉美㢤愛竹者誰曰君子欤向佳山水處築宫一畒好風煙裏種玉千餘朝引輕霏夕延凉月此外塵埃一􅀧無湏知道有樂其樂者吾愛吾廬竹之清也何如應料得詩人清矣乎况滿庭秀色對拈彩筆半牎凉影伴讀殘書休􅀃龍吟莫言鳯嘯且道髙標誰勝渠君試看正遶坡雲氣似渭川圖中興以來絶妙詞􅃟卷之五
