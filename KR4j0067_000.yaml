front:
  text: 絶妙詞選序長短句始于唐盛于宋唐詞具載花間集宋詞多見于曾端伯所編而復雅一集又兼采唐宋迄于宣和之季凡四千三百餘首吁亦備矣况中興以來作者繼出及乎近世人各首詞詞各有體知之而未見見之而未盡者不勝算也暇日裒集得數百家名之曰絶妙詞選佳詞豈能盡録亦嘗鼎一臠而已然其盛麗如遊金張之堂妖冶如攬嬙施之袪悲壯如三閭豪俊如五陵花前月砥舉杯清唱合以𬗋簫節以紅㸦飄飄然作騎鶴揚州之想信可樂也親友劉誠甫謀刊諸梓傳之好事者此意善矣又祿余舊作數十首附于後不無珠玉在側之愧有愛我者其為刪之淳祐己酉百五玉林中興以來絶妙詞選綱目
  hash: sha256:c7e783eddf23cec0c60dfcc71d9e76b94c4ccc6f4683108e03c5aa693108c738
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0067_SBCK_000-1a}
body:
  text: 花菴詞客編集卷之一康伯可二十三首陳去非七首李漢老五首葉少藴七首曾公衮三首曾純甫十四首曾谹父三首吕居仁十二首朱希真十首朱雍三首張仲宗十三首卷之二劉彥冲二首趙元鎮十一首王民瞻五首李似之二首張材甫九首張安國二十四首吳彥高二首楊廷秀二首吳大年二首范至䏻七首陸務觀二十首卷之三張功甫十五首胡仲任一首張東父五首韓無咎三首辛幼安四十二首京仲遠五首姚令威五首卷之四吳子和十六首鄭中卿五首謝勉仲十首趙文鼎十四首趙德莊五首黃子厚三首趙昌甫二首韓仲止一首易彥祥二首蔡行之一首陳同甫七首李居厚六首李知幾四首遊子明三首危逢吉三首卷之五劉德修十首李子大一首李子清二首李子永二首李子召一首李子秀一首劉改之十首劉叔擬十七首嚴次山三十首嚴少魯二首卷之六馬莊父十一首姜堯章三十四首高賔王二十首卷之七史邦卿十七首卓稼翁三首崔正子一首魏華父四首劉潜夫四十二首劉伯寵五首卷之八劉叔安二十二首施乘之一首戴式之十首盧申之二十四首李公甫一首卷之九張宗瑞二十一首宋謙父六首王子文一首曹西士一首李俊明一首趙用父一首黃子魯一首潘庭堅一首吳毅甫十三首王實之七首方千里三首劉靜甫五首卷之十劉圻父八首吳君特九首陳敬叟二首馮熙之五首馮偉壽六首李藝叟一首連可久一首洪叔璵十六首附録黃叔暘三十八首中興以來絶妙詞選綱目
  hash: sha256:7bb314bd93e20f5b909ca4395d9abd64c0fcaa4c261cf814f0995935f0b4d5f0
