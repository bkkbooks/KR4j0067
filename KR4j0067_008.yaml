front:
  text: 萬事休無何有問從前那箇騎鶴楊州
  hash: sha256:e8317db34c510d6be46aee14c6b5647af62b9e5d106369fd46a2f6173cc4304c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0067_SBCK_008-1a}
body:
  text: 沁園春題西宗雲山樓爽氣西來玉削羣峰千杉萬松望踈林清曠晴烟𬗋翠雪邊回棹栁外聞鐘夜月瓊田夕陽金界倒影樓臺表裏空橋隂曲是舊來忠定手種芙蓉仙翁心事誰同付魚鳥相忘一笑中向月梅香底招邀和靖雲山髙處問訊梁公物象搜竒風流懷古消淂文章萬丈虹沈吟久想依依春樹人在江東花心動臨安新亭鳩雨催晴遍園林一番緑嬌紅媚栁外金衣花砥香鬚消淂艷陽天氣障泥步錦尋芳路稱來往縱橫珠翠笑携手旗亭問酒更酬春思還記東山樂事向歌雪香中伴春沈醉粉䄂殢人彩筆題詩陶寫老來風味夜深銀燭明如晝待㱕去看承花睡夢雲散屏山半熏沈水漢宫春鄭賀守席上懷舊日軟風柔望暖紅連島晴緑平州尋芳拾蘂勝伴陌上鮮妍玉驄㱕路記青門曾墮吟鞭人去後庭花弄影一簾香月姢姢追念舊遊何在歎佳期虛度錦瑟華年博山夜來燼冷誰換沈烟屏幃半掩奈夢雲不到愁邊春易老相思無據間情分付魚箋水龍吟丙子立春懷內三山臘雪才消夜來誰轉回寅斗試燈簾幕送寒幡勝暗香携手少日歡娛舊遊零落異鄉歌酒到而今生怕春來大早空嬴淂兩眉皺春到蘭湖少住肯殷勤訪梅尋栁相思人逺帶圍寬减粉㾗消瘦雙燕無慿尺書難表甚時回首想畫欄倚遍東風間負却桃花呪水龍吟庚寅寄逺老來慣與春相識長記傷春如故去年今日舊愁新恨送將風絮粉淚羞紅黛眉顰翠推愁不去任瑣窗深閉屏山半掩還别有愁來路回首畫橋烟水念故人匆匆何處客情懷逺雲迷北樹草連南浦離合悲歡去留遲速問春無語笑劉郎不道無桃可種苦留春住水龍吟丙戍清明和章質夫韻弄晴臺館收煙候時有燕泥香墜宿酲未解單衣初試騰騰春思前度桃花去年人面重門深閉記彩鸞别後青驄㱕去長亭路芳塵起十二屏山遍倚任蒼苔點紅如綴黃昏人靜暖香吹月一簾花碎芳意婆娑緑隂風雨畫橋煙水笑多情司馬留春無計濕青衫淚慶春澤丙子元夕燈火烘春樓臺浸月良宵一刻千金錦步承蓮彩雲簇仗難尋蓬壺影動星毬轉映兩行寶珥瑶簮恣嬉遊玉漏聲催未歇芳心笙歌十里誇張地記年時行樂憔悴而今客裏情懷伴人間笑間吟小桃未靜劉郎老把相思細寫瑶琴怕㱕來紅𬗋欺風三徑成隂蝶戀花丁丑七夕誰送凉蟾消夜暑河漢迢迢牛女何曾渡乞淂巧來無用處世間枉費間針縷人在江南煙水路頭白鴛鴦不道分飛苦信逺翻嗔烏鵲誤屏山暗鎖巫陽雨小重山吊方檢詳思君夢裏說邯鄲未成歡已炊殘斷送春㱕風雨霎時閒空有生前醫國手醫不到子孫寒欲登詩境弔方干倩誰看北邙山落落晨星不見暮雲還莫在人間尋食客尋見後匹如間栁梢青七夕乾鵲收聲濕螢度影庭院秋香步月移隂梳雲約翠人在回廊醺醺宿酒殘粧待付與溫柔醉鄉卻扇藏嬌牽衣索笑今夜差凉栁梢青戲簡髙菊澗瞥眼光隂章臺舊路楊栁春深尚憶風流殢人倚玉替客揮金髙陽醉後分襟想妬雨嗔雲到今消息真時笑啼難處方表人心臨江仙代閨怨蕩𬗋飄紅芳信斷都無人問穠纎吟鞭倚醉問凉蟾香消金縷篆塵壓寶粧奩夢峽朝雲飛不到一春離緒厭厭却疑㱕燕礙重簾心期花底誤眉恨栁邊添浣溪沙丁亥餞元宵簾幕收燈斷續紅歌臺人散彩雲空夜寒㱕路噤魚龍宿醉未消花市月芳心已逐栁塘風丁寧鶯燕莫匆匆清平樂趙園避暑栁隂庭院簾約風前燕著雨荷花紅半斂消淂盈盈緑扇竹光野色生寒玉纎雪藕氷盤長記酒醒人靜暗香吹月闌干賀新郎題王守西湖書院雲淡天垂野望晴郊踈煙半捲斷虹低跨老樹連隂藏逺景十里湖光照夜看不盡真山圖畫春滿軒窗無著處更銀蟾冷浸鴛鴦瓦人共境轉幽雅文章太守㱕來也似當年和靖風流小孤山下問訊佩蘭餐菊友曾約梅兄入社待付與竹臞陶寫塵外間尋行樂地任傍人歌舞喧臺榭詩世界有王謝江神子三月晦日西湖餞春送春曾到百花洲夕陽收暮雲留想伴花神騎鶴上楊州回首湖山情味淡重把酒更登樓相思南浦古津頭未拏舟已驚鷗栁外㱕鴉點點是離愁空倚陽關三疊曲歌不盡水東流念奴嬌茉莉調氷弄雪想花神清夢徘徊南土一夏天香收不起付與蘂仙無語秀入精神凉生肌骨銷盡人間暑稼軒愁絶惜花還勝兒女長記歌酒闌珊開時向晚笑浥金莖露月浸闌干天似水誰伴秋娘窗戶困殢雲鬟醉欹風帽總是牽情處返魂何在玉川風味如許阮郎㱕寒隂漠漠夜來霜階庭風葉黃㱕鴉數點帶斜陽誰家砧杵忙燈弄幌月侵廊熏籠添寶香小屏低枕怯更長和雲入醉鄉阮郎㱕丹桂金莖浥露未成霜西風只舊凉蘂仙何事換霞粧惱人秋思長香世界錦文章花神不覆藏小山騷客政清狂同花入醉鄉玉樓春東山探梅泠泠水向橋東去漠漠雲㱕溪上住踈風淡月有來時流水行雲無覔處佳人獨立相思苦薄袖欺寒沁園春自述一曲狂歌有百餘言說盡平生費十年燈火讀書讀史四方奔走求利求名蹭蹬㱕來閉門獨坐嬴淂窮吟詩句清夫詩者皆吾儂平日愁嘆之聲空餘豪氣峥嶸安淂良田二頃耕向臨卭滌器可憐司馬成都賣卜誰識君平分則宜然吾何敢怨螻蟻逍遙戴粒行開懷抱有青梅薦酒緑樹啼鶯賀新郎豐真州建江淮偉觀樓百尺連雲起試登臨江山人物一時俱偉旁挹金陵龍虎勢京峴諸峰對峙隱隱接楊州歌吹雪浪舞從三峽下乍逢迎海若談秋水形勝地有如此使君一世經綸志把風斤月斧來此等間遊戲見說樓成無多日大乎一何容易笑天下紛紛血指醖釀春風與和氣舉長江變作香醪美人共樂醉桃李賀新郎寄豐宅之憶把金罍酒歎别來光隂荏苒江湖宿留世事不堪頻著眼嬴淂兩眉長皺但東望故人翹首木落山空天逺大送飛鴻北去傷懷久天下事公知否錢塘風月西湖栁渡江來百年機會從前未有喚起東山丘壑夢莫惜風霜老手要整頓封疆如舊早晚樞庭開幕府是英雄盡為公奔走看金印大如斗賀新郎兄弟爭塗田而訟歌此詞主和議蝸角爭多少是英雄割據乾坤到頭休了一片泥塗荒草地盡是魚龍故道新堤上風濤難保滄海桑田何時變怕桑田未變人先老休為此生煩惱訟庭不許頻頻到這官坊翻來覆去有何分曉無諍人中為第一長訟元非吉兆但有恨平章不早樽酒喚回和氣在看從來兄弟依然好把前事付一笑木蘭花慢鶯啼啼不盡慿燕語語難通這一點芳心十年不斷惱亂東風重來故人何處但依前流水小橋東記淂同題粉壁而今壁破無蹤蘭臯空漲緑溶溶流恨落花紅念著破春衫當時送别燈下裁縫相思謾令自苦嘆雲煙過眼揔成空落日楚天無際憑欄目送㱕鴻水調歌頭題李季允侍郎鄂州吞雲樓輪奐半天上勝槩壓南樓籌邊獨坐豈𣣔登覽快雙眸浪說胸吞雲夢直把氣吞殘虜西北望神州百載好機會人事恨悠悠騎黃鶴賦鸚鵡謾風流嶽王祠畔楊栁煙鎖古今愁整頓乾坤手段指授英雄方略雅志若為酬杯酒不在手雙鬢恐驚秋滿庭芳楚州上已萬栁池應監丞飲客三月春光羣賢勝踐山隂何似山陽鵝池墨妙曲水記流觴自許風流丘壑何人共擊楫長江新亭上山河有異舉目恨堂堂使君經世志十年邊上兩鬢風霜問池邊楊栁因甚凄凉萬樹重新種了株株在桃李花傍仍須待賸栽蘭芷為國洗河湟滿庭芳元夕上邵武王守子文草木生春樓臺不夜團團月上雲霄太平官府民物共逍遙指點江梅一笑幾番負雨秀風嬌今年好花賀新郎彭傅師於吳江三髙堂之前作釣雪亭蓋擅漁人之窟宅以供詩境也趙子野約余賦之挽住風前栁問鴟夷當日扁舟近曾來否月落潮生無限事零亂茶煙未久謾留淂蓴鱸依舊可是功名從來誤撫荒祠誰繼風流後今古恨一搔首江涵鴈影梅花瘦四無塵雪飛風起夜窗如晝萬里乾坤清絶處付與漁翁釣叟又恰是題詩時候猛拍闌干呼鷗鷺道他年我亦埀綸手飛過我共樽酒賀新郎姑蘇臺觀雪十頃涵空碧畫圖中峥嶸幻玉亂零吹璧倚遍危欄吟不盡把酒風前岸幘記當日西湖為客誰剪吳松江上水笑乾坤竒事成兒劇還照我夜窗白崇臺目斷清無極引枝笻瓊瑶步軟印登臨屐娃館娉婷知何在淚粉愁濃恨積故化作飛花狼籍舊事悠悠渾莫問有玉蟾醉裏曾相識聊伴我夜吹笛宴清都初春春訊飛瓊管風日薄度墻啼鳥聲亂江城次第笙歌翠合綺羅香暖溶溶澗緑氷泮醉夢裏年華暗換料黛眉重鎖隋堤芳心還動梁苑新來鴈闊雲音鵉分鑑影無計重見啼春細雨籠愁淡月恁時庭院離腸未語先斷算猶有憑髙望眼更那堪芳草連天飛梅弄晚魚遊春水離愁離愁禁不去好夢别來無覔處風翻征袂觸目年芳如許軟紅塵裏鳴鞭鐙拾翠叢中勾伴侶都負歲時暗關情緒昨夜山隂杜宇似把㱕期驚倦旅遙知樓倚東風凝顰暗數寶香拂拂遺鴛錦心事悠悠尋燕語芳草暮寒亂花微雨倦尋芳春思香泥壘燕密葉巢鶯春暗寒淺花徑風柔著地舞䄄紅軟鬪草煙欺羅袂薄秋千影落春遊倦醉㱕來記寶帳歌慵錦屏香暖别來悵光隂容易還又荼䕷牡丹開遍妬恨踈狂那更栁花迎面鴻羽難慿芳信短長安猶近㱕期逺倚危樓但鎮日繡簾髙捲西江月中春燕掠晴絲裊裊魚吹水葉𥻘𥻘禁街微雨灑芳塵寒食清明相近謾著宫羅試暖間呼社酒酬春晚風簾幕悄無人二十四番花訊清平樂春恨栁邊深院燕語明如剪消息無憑聽又懶隔斷畫屏雙扇寶杯金縷紅牙醉魂幾度兒家何處一春游蕩夢中猶恨楊花烏夜啼離恨栁色津頭泫緑桃花渡口啼紅一春又負西湖醉離恨雨聲中客袂迢迢西塞餘寒剪剪東風誰家拂水飛來燕惆悵小樓空烏夜啼西湖漾暖紋波颭颭吹晴絲雨𪷟濛輕衫短帽西湖路花氣撲春驄鬪草褰衣濕翠秋千瞥眼飛紅日長不放春醪困立盡海棠風烏夜啼秋别段段寒沙淺水蕭蕭暮雨孤篷香羅不共征衫逺砧杵客愁中别恨慵看楊栁㱕期暗數芙蓉碧梧聲到紗窗曉昨夜幾秋風謁金門惜别蘭棹舉相趂落紅飛去一隙輕簾凝睇處栁絲牽不住昨日翠蛾金縷今夜碧波煙渚好夢無慿窗又雨天涯知幾許謁金門春思間院宇獨自行來行去花片無聲簾外雨峭寒生碧樹做弄清明時序料理春酲情緒憶淂㱕時停棹處畫橋看落絮水龍吟茶䕷蕩紅流水無聲暮煙細草粘天逺低回倦蝶往來忙燕芳期頓懶緑霧迷墻翠虬騰架雪明香暖笑依依𣣔挽春風教住還疑是相逢晚不似梅粧瘦减占人閒丰神蕭散攀條弄蘂天涯猶記曲䦨小院老去情懷酒邊風味有時重見對枕幃空想東窗舊夢帶將離恨水龍吟淮西重午會昌湖上扁舟幾年不醉西山路流光又是宫衣初試安榴半吐千里江山滿川煙草薰風淮楚念離騷恨逺獨醒人去闌干外誰懷古亦有魚龍戲舞豔晴川綺羅歌鼓鄉情節意樽前同是天涯羇旅漲緑池塘翠隂庭院㱕期無據問明年此夜一眉新月照人何處洞仙歌茉莉玉肌翠袖較似酴醾瘦幾度熏醒夜窗酒問炎州何事得許清凉塵不到一段氷壺剪就晚來庭戶悄暗數流光細拾芳英黯回首念日暮江東偏為魂銷人易老幽韻清標似舊政簟紋如水帳如煙更奈向月明露濃時候鷓鴣天春懷纎指輕拈小砑紅自調宫羽按歌童寒餘芍藥欄邊雨香落荼䕷架砥風間意態小房櫳丁寧須滿玉西東一春醉得鶯花老不似年時怨玉容鷓鴣天春暮庭緑初圎結䕃濃香溝收拾樹梢紅池塘少歇鳴蛙雨簾幕輕回舞燕風春又老笑誰同淡烟斜日小樓東相思一曲臨風笛吹過雲山第幾重摸魚兒九日登姑蘇臺怪西風曉來欹帽年華還是重九天機衮衮山新瘦客子情懷誰剖微雨後更鴈帶邊寒裊裊欺羅袖慵荷倦栁誚不似黃花田田照眼風味侭如舊登臨地寂寞崇臺最久闌干幾度搔首翻雲覆雨無窮事流水斜陽知否吟未就但衰草寒煙商略愁時候間愁浪有總輸與淵明東籬醉舞身世付杯酒夜飛鵲慢别意驕嘶破清曉分恨臨期花下恁月明知餘光是處散離思最憐香靄霏霏牽衣揾彈淚問凄風愁露剗地東西留鞭換佩怕匆匆已是遲遲凉怯幾畨羅𬒮還燕别文梁螢點書幃一自秋娘迢遞黃金對酒爭忍輕揮新來院落鴈難尋簾幕長埀怕雕梧𫾣徑驚回奮夢應也顰眉漁家傲壽白石白石山中風景異先生日日懷㱕計何事黃岡飛雪地偏著意畫堂却為東坡起人說前身坡老是文章氣節渾相似只待鼎彛勳業遂梅花外㱕來長向山中醉木蘭花慢别西河兩詩僧嫩寒催客棹載酒去載詩㱕政紅葉漫山清泉漱石多少心期三生溪橋話别悵薜蘿猶惹翠雲衣不似今畨醉夢帝城幾度斜暉鴻飛煙水㳽㳽回首處只君知念吳江鷺憶孤山鶴怨依舊東西髙峰夢醒雲起是瘦吟窗底憶君時何日還尋後約為余先寄梅枝沁園春雙溪狎鷗幾葉凋楓半篙寒日傍橋繫船愛洞門深鎖人間福地雙溪分占天上星躔破帽欹寒短鞭𫾣月此地經行知幾年空嬴淂似沈郎銷瘦還缺詩篇沙鷗伴我愁眠向水驛風亭紅蓼邊有村醪可飲且須同醉溪魚堪鱠切莫論錢笠澤波頭埀虹亭上橙蟹肥時霜滿天相隨否算江南江北惟有君間菩薩蠻春思翠樓十二闌干曲雨㾗新染蒲萄緑時節又黃昏東風深閉門玉簫吹未徹窗影梅花月無語只低眉間拈雙荔枝滿江紅齊雲月酌樓倚晴空炎雲淨晚來風力滄海外等間吹上滿輪寒璧河漢低埀天𣣔近乾坤浩蕩秋無極憑欄干衣諸將捷席捲黃河兩岸問誰在玉皇香案師保萬民功業别向西京原廟行圭瓉定郟鄏卜瀍澗中興以來絶妙詞選卷之八
