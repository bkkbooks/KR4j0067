front:
  text: 居尚逺擁戎軺萬騎鳴笳鼓雲正鎻汴京路
  hash: sha256:fd14ec65bd7fcdacf23e8a501b11f80c4bd6b7c95e220597f49fc2350d67f7bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0067_SBCK_003-1a}
body:
  text: 賀新郎陳退翁分教衡湘将行酒䦨索詞漫成桂隱傳杯處有風流千岩韻勝太丘遺緒玉季金昆霄漢侣平歩鵉坡揮麈莫便駕飛颿烟渚雲動精神衡岳去向君山帝樂鏘韶濩蘭藝畹吊湘楚南湖老矣無襟度但樽前踉蹡醉影㡌花顛仆只恐清時專文教猶貸隂山狂虜卧錦帳貔貅征鼓忠烈前􅈴賫萬恨望神都魏闕奔狐兎呼翠䄂為君舞夢遊仙記夢飛夢去閑到玉京遊塵絶天高那得暑月明雲薄澹扵秋宫殿鎻金虬氷佩冷風颺𬗋綃裘五色光中瞻帝所方知碧落勝炎洲香霧濕簾鈎木蘭花癸丑年生日年年三月二是居士始生朝念緑鬢功名初心已負難報劬勞天留帝城勝處匯平湖逺岫碧岧嶤竹色詩書燕几栁隂桃杏橫橋西隣東舍不難招太半是漁樵任翁媪歡呼兒孫歌笑野具村醪醉來更隨鶴舞看清風送月過松梢百歲因何快樂尽從心地逍遥木蘭花甲寅三月中澣邀樓大防陳君舉中書兩舍人黄文叔待制彭子壽右史黄子由匠監沈應先大著過桂隱即席作清明初過後正空翠靄晴鮮念水際樓臺城隅花栁春意無邉淸時自多暇日看聮鑣飛盖擁羣賢朱邸横經滿座𬗋㣲淵思如泉高情那更属雲天語笑雜歌絃向啼鴂聲中落紅影裏忍負芳年浮生轉頭是夢恐它時髙會却難全快吐淋浪醉墨要令海内喧傳漁家傲漁翁拂拂春風生草際新晴萬景供遊戯鷗鷺飛來斜照裏金和翠分明画出真山水遮箇漁翁無愠喜乾坤頓在孤篷厎一曲高歌千古意閑來睡從教月到花汀外鵲橋仙立秋後一夕暑雲猶在澄空欲变入夜徘徊庭際新秋知是昨宵來愛殘月纎纎西墜芭蕉老大流螢衰健静裏細觀天意輕風未有半分凉柰人道今宵好睡栁梢青舟泊素淮天逺山圍龍蟠淡靄虎踞斜暉幾度功名幾畨成敗渾似鷗飛樓臺一望凄迷筭到底空争是非今夜潮生明朝風順且送船㱕江城子夏夜觀月飛來氷雪冷無聲可中庭骨毛清卧看東南和露雨三星驀地神遊天上去呼彩鳯駕雲軿望舒宫殿玉峥嶸桂千層宝香凝搗藥仙童邀我論長生一笑㱕來人未睡花送影上窓櫺昭君怨月夜賞荷花月在碧虚中住人向乱荷中去花氣雜風凉滿船香雲𬒳歌聲揺動酒𬒳詩情掇送醉裏卧花心擁紅衾八聲甘州中秋夜作歎流光迅景百年間能醉幾中秋正凄蛩鳴砌驚烏翻樹烟淡蘋洲誰喚金輪出海不帶一雲浮纔上青林頂俄轉朱樓人老歡情宜减料素娥信我不為閑愁念幾畨清夢常是故郷留倩風前數聲横管呌玉鵉騎向碧空遊誰能頋黍炊榮利蟻戦怨讐滿江紅小圃玉照堂賞梅呈洪景盧内翰玉照梅開三百樹香雲同色光揺動一川銀浪九霄珂月幸遇勛華時世好歡娛况是張灯夕更不邀名勝賞東風真堪惜盤誥手春秋筆今内相斯文伯肯閑迂軒盖逺過泉石竒事人生能㡬見清樽花畔湏教側到鳯池却欲醉鷗邊應難得念奴嬌登平江齊雲樓夜飲雙瑞堂呈雷吏部東吳名勝有高樓直在浮雲齊處十二闌干邀逺望歴歴斜陽烟樹香徑人稀屧廊山遶往事今何許一天和氣爲誰吹散踈雨知是蘭省星郎朱輪森㦸與風光爲主暇日登携多雅致容我追隨臨賦小宴重開晚寒初勁還下危梯去燭華紅墜瑞堂猶按歌舞燭影揺紅灯夕玉照堂梅花正開宿雨初乾舞梢烟痩金絲裊嫰雲扶日做新晴舊碧㝷芳草幽徑蘭芽尚小恠今年春㱕太早栁塘花院萬朶紅蓮一宵開了梅雪翻空忍教空對東風老粉圍香陣擁詩仙戦退春寒峭現樂歌弹閙暁宴親賔團欒同笑醉㱕時候月過珠樓參横蓬島栁塘花院現樂皆家中堂名也滿庭芳促織兒月洗高梧露漙幽草宝釵樓外秋深土花沿翠螢火墜墻隂静聽寒聲断續㣲韻轉凄噎悲沉争求侣殷勤勸織促破曉機心兒時曾記得呼灯灌穴歛歩隨音任滿身花影猶自追㝷携向華堂戯闘亭臺小蝶恋花惜春梅子初青春已暮芳草連雲緑遍西池路小院綉垂簾半舉銜泥𬗋燕雙飛去人在赤欄橋畔住不解傷春還解相思否清夢欲㝷猶間阻紗窓一夜蕭蕭雨鷓鴣天怨别寛盡香羅金縷衣心情不似舊家時萬絲栁暗才飛絮一點梅酸已着枝金厎背玉東西前歡嬴得兩相思傷心不及風前燕猶解穿簾度幕飛鷓鴣天春暮横素橋邊景最佳緑波清淺見瓊沙銜泥燕子迎風絮得食魚兒趂浪花春已暮日初斜画船簫鼓是誰家蘭橈欲去空留恋醉倚䦨干看晚霞驀山溪春半青梅如豆断送春㱕去小緑間長紅看幾處雲歌栁舞偎花識面對月共論心携素手採香遊踏遍西池路水邊朱戸曾記銷䰟處小立背秋千空悵望娉婷韻度楊花撲面香糝一簾風情脉脉酒厭厭回首斜陽暮驀山溪初春舊事劉郎去後知誰伴風前醉回首暝烟千里但紛紛落紅如泪多情易老青鵉何許詩成誰寄斗轉參横半簾花影一溪寒水悵飛鳬路杳行雲夢断有三峯翠謁金門春雪春尚淺誰把玉英裁剪侭道梅梢開未遍卷簾花滿院樓上酒融歌暖樓下水平烟逺却似湧金門外見絮飛波影乱水調歌頭九日今日我重九莫負菊花開試㝷高處携手躡屐上崔倦情遷本無欣戚轉頭陳迹飛鳥外晚烟碧問誰憐舊日南樓老子最愛月明吹笛到而今撲靣黄塵欲㱕未得瑞鶴仙上洪倅壽黄金堆到斗怎得似長年画堂勸酒蛾眉最明秀向水沈烟裏兩行紅䄂笙歌撋就争說道明年時候𬒳常娥做了殷勤仙桂一枝入手知否風流别駕近日人呼文章太守天長地乆歳歳上乃翁壽記從來人道相門出相金印纍纍侭有但直須周公拜前魯公拜後滿江紅賀王宣子平湖南㓂笳鼓㱕來舉鞭問何如諸葛人道是匆匆五月渡瀘深入白羽風生貔虎嘯青溪路断猩鼯泣早紅塵一騎落平崗捷書急三萬卷龍頭客渾未得文章力把詩書馬上笑驅鋒鏑金印明年如斗大貂蝉却自兠鍪出待刻公勲業等雲霄浯溪石滿江紅感㒷過眼溪山恠都似舊時曾識還記得夢中行遍江南江北佳處徑須携杖去能消幾緉平生屐笑塵勞三十九年非長爲客吳楚地東南拆英雄事曹劉敵𬒳西風吹盡了無陳迹樓觀才成人巳去旌旗未卷頭先白嘆人間哀樂轉相㝷今猶昔滿江紅送鄭舜舉赴召湖海平生筭不負蒼髯如㦸聞道是君王着意太平長䇿此老自當兵十萬長安正在天西北便鳯凰飛詔下天來催㱕急車馬路兒童泣風雨暗旌旗濕看野梅官栁春風消息莫向蔗菴追笑語只今松竹無顔色問人間誰管别離愁杯中物祝英臺近春晚宝釵分桃葉度烟栁暗南浦怕上層樓十日九風雨断腸點點飛紅都無人管倩誰喚流鶯聲住鬢邊覷試把花卜㱕期才簮又重數羅帳灯昏哽咽夢中語是他春帶愁來春㱕何處又不解帶將愁去水調歌頭盟鷗帶湖吾甚愛千丈翠奩開先生無事杖屨一日走千囘凡我同盟鷗鷺今日既盟之後來往莫嫌猜白鶴在何處嘗試與偕來破青萍排翠藻立蒼苔窺魚笑汝癡計不解舉吾杯廢沼荒丘疇昔明月清風此夜人世幾􅌚哀東岸緑隂少楊栁更湏栽水調歌頭折盡武昌栁挂席上瀟湘二年魚鳥江上笑我往來忙富貴何時休問離别中年堪恨憔悴鬢成霜絲竹陶寫耳急羽且飛觴序蘭亭歌赤壁綉衣香使君千騎鼔吹風采漢侯王莫把離歌頻唱可惜南樓佳處風月巳凄凉在家貧亦好此語試平章酹江月登賞心亭我來吊古上危樓嬴得閑愁千斛虎踞龍盤何處是只有興亡滿目栁外斜陽水邊㱕鳥壠上吹喬木片帆西去一聲誰噴霜竹却憶安石風流東山歳晚淚落哀筝曲兒軰功名都付與長日惟消棊局宝鏡難㝷碧雲将暮誰勸盃中緑江頭風怒朝來波浪翻屋酹江月西湖和人韻晚風吹雨戦新荷聲乱明珠蒼璧誰把香奩収宝鏡雲錦周遭紅碧飛鳥翻空㳺魚吹浪慣聽笙歌席坐中豪氣看君一飲千石遥想處士風流鶴隨人去已作飛仙客茅舍竹籬今在否松竹巳非疇昔欲說當年望湖樓下水與雲寛窄醉中休問断腸桃葉消息酹江月春恨野棠花落又匆匆過了清明時節剗地東風欺客夢一枕銀屏寒怯曲岸持觴垂楊立馬此地曾經别樓空人去舊遊飛燕能說聞道綺陌東頭行人曾見簾底纎纎月舊恨春江流不盡新恨雲山千疊料得明朝尊前重見鏡裏花難折也應驚問近來多少華髮水龍吟賞心亭楚天千里清秋水隨天去秋無際遥岑逺目獻愁供恨玉簮螺髻落日樓頭断鴻聲裏江南游子把吳鈎看了欄干拍遍無人會登臨意休說鱸魚堪鱠侭西風季鷹來未求田問舍怕應羞見劉郎才氣可惜流年憂愁風雨樹猶如此倩何人喚取紅巾翠䄂揾英雄淚水龍吟壽韓南澗渡江天馬南來幾人真是經綸手長安父老新亭風景可憐依舊夷甫諸人神州沈陸幾曾囘首筭平戎萬里功名本是真儒事君知否况有文章山斗對桐隂滿庭清晝當年墮地而今試看風雲奔走緑野風烟平泉草木東山歌酒待他年整頓乾坤事了為先生壽水龍吟再壽韓南澗玉皇金殿㣲凉看公一試薰風手高門画㦸桐隂聞道青青如舊蘭佩空芳蛾眉誰妬無言搔首甚年年却有呼韓塞上人争問公安否金印明年如斗向中州錦衣如晝依然盛事貂蟬前後鳯麟飛走富貴浮雲我評軒冕不如杯酒待從今痛飲八千餘歲伴松椿壽水龍吟題南劔双溪樓舉頭西北浮雲倚天萬里湏長劔人言此地夜深長見斗牛光𦦨我斍山高潭空水冷月明星澹待然犀下看慿欄却怕風雷怒魚龍慘峽束滄江對起過危樓欲飛還歛元龍老矣不妨高卧氷壺凉簟千古興亡百年悲笑一時登覽問何人又卸片帆沙際繫斜陽䌫木蘭花慢送張仲固帥㒷元漢中開漢業問此地是耶非想劔指三秦君王得意一戰東㱕追亡事今不見但山川滿目淚沾衣落日胡塵未断西風塞馬空肥一編書是帝王師小試去征西更草草離筵匆匆去路愁滿旌旗君思我回首處正江涵秋影鴈初飛安得車輪四角不堪帶减腰圍木蘭花慢送滁州范倅老來情味减對别酒惜流年更屈指中秋十分好月不照人圎無情水都不管共西風只等送㱕船秋晚蓴鱸江上夜深兒女灯前征衫便好去朝天王殿正思賢想夜半恩綸留教視草却遣籌邊長安故人問我道愁腸殢酒只依然目断秋霄落鴈醉來時響空弦摸魚兒暮春更能消幾畨風雨匆匆春又㱕去惜春長怕花開早何况落紅無數春且住見說道天涯芳草無㱕路怨春不語筭只有殷勤画簷蛛網盡日惹飛絮長門事準擬佳期又誤娥眉曾有人妬千金縱買相如賦脉脉此情誰訴君莫舞君不見玉環飛燕皆塵土閑愁最苦休去倚危欄斜陽正在烟栁断腸處最高樓洪内翰慶七十金閨老眉壽正如川七十且華筵樂天詩句香山裏杜陵酒債曲江邊問何如歌窈窕舞嬋姢更十歳太公方出將又十歳武公才入相留盛事看明年直湏腰下添金印莫教頭上欠貂蟬向人間長富貴地行仙最高樓梅花花知否花一似何郎又似沈東陽痩稜稜地天然白冷清清地許多香笑東君還又趂北枝忙着一陣霎時間底雪着一箇缺些兒厎月山下路水邊墻清香怕有人知處蒼松側畔竹旁相怎禁他桃與李少年場千秋歳建康壽史致道塞垣秋草又報平安好樽爼上英雄表金湯生氣象珠玉霏談笑春近也梅花得似人難老莫惜金樽倒鳯詔看看到留不住江東小從容帷幄裏整頓乾坤了千百歳從今盡是中書考沁園春退閒三逕初成鶴怨猿驚稼軒未來甚雲山自許平生意氣衣冠人笑抵死塵埃意倦須還身閑要早豈為蓴羮鱸鱠哉秋江上看驚弦鴈避駭浪船囘東崗更葺茅齋好都把軒窓臨水開要小舟行釣先應種栁踈籬護竹莫礙觀梅秋菊堪餐春蘭可佩留待先生手自栽沈吟乆怕君恩未許此意徘徊沁園春将止酒戒酒杯杯汝來前老子今朝點檢形骸甚長年抱病咽如焦釡于今喜眩氣似奔雷汝說劉伶古今達者醉後何妨死便埋渾如此歎汝扵知巳真少恩哉更慿歌舞為媒筭合作平居鴆毒猜况愁無小大生扵所愛物無美惡過則為灾與汝成言勿留亟退吾力猶能肆汝杯杯再拜道麾之即去招則須來聲聲慢滁州作奠枕楼征埃成陣行客相逢都道幻出層樓指點簷牙高處浪湧雲浮今年太守萬里罷長淮千騎臨秋凭欄望有東南佳氣西北神州千古懐嵩人去還笑我身在楚尾吳頭見說弓刀陌上車馬如流從今賞心樂事剰安排酒令詩籌華胥夢願年年人似舊遊洞仙歌壽葉丞相江頭父老說新來朝野都道今年太平也見朱顔緑鬢玉帶金魚相公是舊日中朝司馬遥知宣勸後東閣華灯别賜仙韶接元夜問天上㡬多春只似人間但長見精神如画好都取山河獻君王看父子貂蟬玉京迎駕鷓鴣天春日即事春入平原薺菜花新耕雨後落羣鴉多情白髪春無柰晚日青帘酒易賖閑意態細生涯牛欄西畔有桑麻青裙縞𬒮誰家女去趂蚕生看外家鷓鴣天秋意枕簟溪堂冷欲秋断雲依水晚來収紅蓮相倚渾如怨白鳥無言定自愁書咄咄且休休一丘一壑也風流不知筋力衰多少但斍新來懶上樓鷓鴣天春行即事着意㝷春懶便囘何如信步兩三盃山才好處行還倦詩未成時雨早催携竹杖更芒鞋朱朱粉粉野蒿開誰家寒食㱕寕女笑語柔桑陌上來鷓鴣天東陽道中撲面征塵去路遥香篝漸斍水沈消山無重數周遭碧花不知名分外嬌人歷歷馬蕭蕭旌旗又過小紅橋愁邊剰有相思句揺断吟鞭碧玉梢鷓鴣天陌上柔桑初破芽東隣蚕種已生些平崗細草鳴黄犢斜日寒林點暮鴉山逺近路横斜青旗沽酒有人家城中桃李愁風雨春在溪頭薺菜花菩薩蛮書江西造口壁鬱孤臺下清江水中間多少行人淚西北望長安可憐無數山青山遮不住畢竟江流去江晚正愁予山深聞鷓鴣菩薩蛮稼軒日向兒童說帶湖買得閑風月頭白早㱕來種花花巳開功名渾是錯更莫思量着見說小樓東好山千萬重鵲橋仙和廓之弟送祐之㱕浮梁小窓風雨從今便憶中夜笑談清軟啼鴉衰栁自無聊更管得離人腸断詩書事業青氊猶在頭上貂蝉會見莫貪風月卧江湖道日近長安路逺蝶恋花送祐之弟衰草殘陽三萬頃不筭飄零天外孤鴻影幾許悽凉須痛飲行人自向江頭醒會少離多看兩鬢萬縷千絲何况新來病不是離愁難整頓𬒳他引惹其他恨蝶恋花戊申元日立春誰向椒盤簮彩勝整整韶華争上春風鬢往日不堪重記省為花長抱新春恨春未來時先借問晚恨開遲早又飄零近今歳花期消息定只愁風雨無慿準蝶恋花别意莫向城頭聽漏點說與行人黙默情千萬揔是離愁無近逺人間兒女空恩怨錦綉心胸氷雪面舊日詩名曾道空梁燕傾盖未償平日願一盃早唱陽関勸霜天暁角惜别吳頭楚尾一棹人千里休說舊愁新恨長亭樹今如此宦游吾倦矣玉人留我醉明日落花寒食得且住為佳耳清平樂村居茅簷低小溪上青青草醉裏蛮音相媚好白髪誰家翁媪大兒鋤豆溪東中男正織雞籠最喜小兒無頼溪頭卧剥蓮蓬清平樂為児鐵柱作靈皇醮罷福禄都來也試引鵷雛花樹下断了驚驚怕怕從今日日聦明更宜潭妺嵩兄看取辛家鐡柱無灾無難公卿西江月秀骨青松不老新詞玉佩相磨靈槎凖擬泛銀河剰摘天星幾箇奠枕樓東風月駐春亭上笙歌留君一醉意如何金印明年斗大喜迁鶯荷花暑風凉月愛亭亭無數緑衣持節掩冉如羞參差似妬擁出芙蓉花發歩襯潘娘堪恨皃比六郎誰㓗添白鷺晚晴時公子佳人並列休說搴木末當日靈均恨與君王别心阻媒勞交踈怨極恩不甚兮輕絶千古離騷文字芳至今猶未歇都休問但千杯快飲露荷翻葉賀新郎自述甚矣吾衰矣悵平生交游零落只今餘幾白髪空垂軰上層樓横孤笛隂晴事人難必􅌚樂處天常惜幸星稀河淡雲収風息更着兩賢陪勝賞此身如與塵寰隔笑謫仙對影足成三空孤寂漢宫春上元前一日立春暖律初囘又焼灯市井賣酒樓臺誰將星移萬點月滿千街輕車細馬隘通衢蹴起香埃今歳好土牛作伴挽留春色同來不是天公省事要一時壯觀特地安排何妨綵樓鼓吹綺席樽罍良宵勝景語邦人莫惜徘徊休笑我癡頑不去年年爛醉金釵洞仙歌次王漕賞海棠韻東皇着意妙出粧春手點綴名花勝扵綉向魚鳬國裏琴鶴堂前仍共賞蜀錦堆紅炫晝妖饒真艶麗盡是天然莫恨無香欠檀口幸今年風雨不苦摧殘還肯為遊人再三留否筭魏𬗋桃黄號花王若定價収名未應居右賀新郎中秋試與常娥語問因何年年此夜月明如許萬頃鎔成銀世界是處玉壷風露又豈比㝷常三五变化乾坤同一色斍星躔斗柄皆囘互湏要我共分付平生脚踏紅塵處謾紛紛雞蟲厚薄燕鴻來去只有婵姢菩薩蛮春愁斜陽山下明金碧画樓返照融春色睡起掲簾旌玉人蝉鬢輕無言空佇立花落東風急燕子引愁來眉心郍得開菩薩蛮别恨夢中不記江南路玉釵翠鬢驚春去午醉晚來醒暝烟花上輕紅綃空浥淚錦字慿誰寄衫薄暖香銷相思雲水遥怨王孫春情毿毿楊栁緑初低澹澹梨花開未齊樓上情人聽馬嘶憶郎㱕細雨春風濕酒旗生查子情景郎如陌上塵妾似堤邊絮相見兩悠揚蹤跡無㝷處酒靣撲春風淚眼零秋雨過了别離時還解相思否踏莎行秋思蘋葉烟深荷花露濕碧蘆紅蓼秋風急採菱渡口日將沉飛鴻樓上人空立彩鳯難雙紅綃暗泣囘紋未剪吳刀澁夢雲㱕處不留蹤厭厭一夜涼蟾入中興以來絶沙詞選卷之三
