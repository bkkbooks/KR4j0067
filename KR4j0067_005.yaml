front:
  text: 惆悵栁煙何處目送落霞江浦明夜月當樓照人愁
  hash: sha256:2e6a57d193ff894245ade3141d922e2f940a382e26d6346145af3fbfd8fd262b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0067_SBCK_005-1a}
body:
  text: 江城子梅花十分雪意却成霜暮雲黃月微茫只有梅花依舊吐幽芳還喜無邊春信漏踈影下覔浮香才清端是𬗋薇郎别鵷行憶宫墻夜半胡為人與月交相君合召歸吾老矣月隨去照西廂洞仙歌荷花晚風收暑小池塘荷淨獨倚胡床酒初醒起徘徊時有香氣吹來雲藻亂葉砥遊魚動影空擎承露蓋不見氷容惆悵明粧曉鵉鏡後夜月涼時月淡花低幽夢覺欲慿誰省且應記臨流憑闌干便遙想江南紅酣千頃長相思别意玉樽涼玉人涼若聽離歌須斷腸休教成鬢霜畫橋西畫橋東有淚分明清漲同如何留醉翁水調歌頭旅思客夢一回醒三度碧梧秋仰看今夕天上河漢又西流早晚涼風過鴈驚落空階一葉急雨閙清溝歸計休令暮宵露浥征裘古來今生老病許多愁郍堪更説無限功業鏡中羞只有青山髙致對此還論世事舉白與君浮送我一杯酒誰起舞涼州臨江仙春思小院回廊春寂寂晚來獨自間行畫簾東畔碧雲生也知無雨空滴枕邊聲一簇小桃開又落低頭拾取紅英東風相送忘相迎梨花寒食到得錦宫城臨江仙自詠我似萬山千里外悠然一片歸雲宫銜猶自帶云云誰知於進士已是故將軍間坐間行間飲酒間拈間字間文諸公留我笑紛紛一枝簮寶髻六幅舞羅裙須殢酒無奈愁深酒淺但寄興焦琴紈扇莫鼓琵琶江上曲怕荻花楓葉俱悽怨雲萬疊寸心逺賀新郎遊西湖睡覺啼鶯曉醉西湖兩峰日日買花簮帽去盡酒徒無人問惟有玉山自倒任拍手兒童爭笑一騎乘風翩然去避魚龍不見波聲悄歌韻逺喚蘇小神仙路近蓬萊島𬗋雲深參差禁樹有煙花繞人世紅塵西障日百計不如歸好付樂事與它年少費盡栁金梨雪句問沉香亭北何時召心未愜鬢先老賀新郎贈張彥功曉印霜花步夢半醒扶上雕鞍馬嘶人去嵐濕青絲雙轡冷緩鞚野梅江路聽畫角吹殘更鼓悲壯寒聲撩客恨甚貂裘重擁愁無數霜月白照離緒青樓回首家何處早山遙水闊天低斷腸煙樹誰念天涯牢落况輕負暖雲濃雨記酒醒香銷時語客裏歸韀須早發怕天寒風急相思苦應為我翠眉聚賀新郎多病劉郎瘦最傷心天寒歲晚客它鄉久大舸翩翩何許至元是髙陽舊友便一笑相歡携手為問武昌城下月定何如楊子江頭栁追往事兩眉鬪燭花細剪明於晝喚青娥小紅樓上殷勤勸酒昵昵琵琶恩怨語春笋輕攏翠袖看舞徹金叉微溜若見故鄉吾父老道長安市上狂如舊重會面幾時又念奴嬌自述知音者少算乾坤許大著身何處直待功成方肯退何日可尋歸路多景樓前埀虹亭下一枕眠秋雨虛名相誤十年枉費辛苦不是奏賦明光獻書北闕無驚人之語我自匆忙天未許嬴淂衣𥚑塵土白璧堆前黃金買笑付與君為主蓴鱸江上浩然明日歸去糖多令再過武昌蘆葉滿汀洲寒沙帶淺流二十年重度南樓栁下繫船猶未穩能幾日又中秋黃鶴斷磯頭故人曾到不舊江山都是新愁欲買桂花重載酒終不似少年遊水調歌頭春半春事能幾許密葉著青梅日髙花困海棠風暖想都開不惜春衣典盡只怕春光歸去片片點蒼苔能得幾時好追賞莫徘徊雨飄紅風換翠苦相催人生行樂且須痛飲莫辭杯坐則髙談風月醉則恣眠芳草醒後亦佳哉湖上新亭好何事不曾來水調歌頭自述弓劔出榆塞鉛槧上蓬山得之渾不費力失亦匹如間未必古人皆是未必今人俱錯世事沐猴冠老子不分别內外與中間酒須飲詩可作指休彈人生行樂何自催得鬢毛斑達則牙旗金甲窮則蹇驢破帽莫作兩般看世事只如此自有識梟鵉天仙子初赴省别妾别酒醺醺渾易醉回過頭來三十里馬兒不住去如飛牽一憩坐一憩斷送殺人山共水是則青衫終可喜不道恩情拚得未雪迷村店酒旗斜去則是住則是煩惱自家煩惱你沁園春風雪中𣣔詣稼軒久寓湖上未能一往因賦此詞以自解斗酒彘肩風雨渡江豈不快哉𬒳香山居士與林和靖約坡仙等勒駕豫回坡謂西湖正如西子淡粧濃抹臨照臺二公者皆掉頭不顧只恁傳杯白云天竺去來看金璧崔嵬樓觀開况一澗縈迂東西水繞兩山南北髙下雲堆逋曰不然暗香浮動何似孤山先放梅須晴去訪稼軒未晚且此徘徊名仙倫廬陵人自號招山有詩集行于丗樂章尤為人所膾灸吉州刋本多遺落今以家藏善本選集賀新郎壽王侍郎簡卿小停鉦鼓向沙邊栁下維舟慶公初度平盡羣蠻方易鎮此事多應有數奈自古功成人妬君看樂羊中山役任謗書盈篋終無據千載下竟誰與詩中帶得西山雨指天台鴈蕩歸歟壽鄉深處緩急朝廷須公出更作中流砥柱笑癡騃紛紛兒女多少人間不平事有皇天老眼能區處揮玉斚聽金縷賀新郎題吳江重喚松江渡嘆埀虹亭下銷磨幾畨今古依舊四橋風景在為問坡仙甚處但遺愛沙邊鷗鷺天水相連蒼茫外更碧雲去盡山無數潮正落日還暮十年到此長凝佇恨無人與共秋風鱠絲蓴縷小轉朱絃彈九奏擬致湘妃伴侣俄皓月飛來煙渚恍若乘槎河漢上怕客星犯斗蛟龍怒歌欵乃過江去賀新郎洪守席上詠牡丹翠蓋籠嬌面記當年沈香亭北醉中曾見見了風流傾國艷紅𬗋紛紛過眼算好處何嫌春晚誰把天香和曉露倩東風特地勻芳臉千萬朵一時遍隔花聽取提壺勸道此花過了春歸蝶愁鶯怨挽住東君須醉倒花砥不妨留戀待喚取笙歌一片最愛就中紅一朵似狀元得意春風殿還惹起少年恨賀新郎贈建康鄭玉脫籍鄭玉非娼女嘆塵緣未了飄零𬒳春留住腸斷胭脂坡下路成甚心情意緒生怕入梨園歌舞寂寞陽臺雲雨散算人間誰是吹簫侶空買斷兩眉聚新來鏡裏驚如許暗傷懷鶯老花殘幾番春暮事逐孤鴻都已往月落千山杜宇念修竹天寒何處不念瑣窗并繡戶妾從前命薄甘荆布誰為作解絛主念奴嬌送張明之赴京西幕艅艎東下望西江千里蒼茫煙水試問襄州何處是雉堞連雲天際叔子殘碑卧龍陳迹遺恨斜陽裏後來人物如君瓌偉能幾其肯為我來耶河陽下士正自強人意勿謂時平無事也便以言兵為諱眼砥山河樓頭鼓角都是英雄淚功名機會要須間暇先備念奴嬌感懷呈洪守吳山青處悵長安路斷黃塵如霧荆楚西來行塹遠北過淮堧嚴扈九塞貔貅三關虎豹空作陪京固天髙難呌若為得欣忠語追念江左英雄中興事業枉𬒳姦臣誤不見翠華移蹕處枉負吾皇神武擊楫慿誰問籌無計何日寬憂顧倚笻長嘆滿懷清淚如雨念奴嬌長沙趙帥席上作西風何事為行人掃蕩煩襟如洗埀漲蒸瀾都卷盡一片瀟湘清泚酒病驚秋詩愁入鬢對景人千里楚宫故事一時分付流水江上買取扁舟排雲湧浪直過金沙尾歸去江南丘壑處不用來尋月姊風露杯深芙蓉裳冷笑傲煙霞裏草廬如舊卧龍知為誰起滿江紅題快閣和徐宰韻快閣東西鷗邊問晚晴可喜鷗解語既盟之後兩翁曾倚笛弄慣聽黃魯直履聲深識徐淵子添我來相對兩忘機真相似也不種間桃李也不玩佳山水有新詩字字愛民而已一片心間秋月外三年人在春風裏漲一篙江水送歸鴻明朝是滿江紅春晚著意留春留不住春歸難戀最苦是梅天煙雨麥秋庭院嫩竹隂濃鶯出谷柔桑采盡蠶成繭奈沈腰寬盡有誰知難消遣幽閣恨雙眉斂香箋寄飛鴻逺向風簾羞見一雙歸燕翠𬒳間將情做夢青樓賺得恩成怨對尊前莫惜喚瓊姬持杯勸木蘭花慢秋日海棠漸秋空向晚𬒳風雨趲重陽正木落踈林海棠枝上忽見紅粧料應妬它蘭菊甚年年獨自占秋光故把春風嬌面向人逞艷呈芳看來畢竟此花強秪是欠些香誚一似當年五陵公子却厭膏粱肯來水邊竹下與幽人相對説凄涼只恐夜深花睡五更微有清霜霜天曉角題蛾眉亭倚空絶壁直下江千尺天際兩蛾凝黛愁與恨幾時極暮潮風正急酒醒聞塞笛試問謫仙何處青山外逺煙碧訴衷情客中征衣薄薄不禁風長日雨絲中又是一年春事花信到梧桐雲漠漠水溶溶去匆匆客懷今夜家在江西身在江東江神子洪守出歌姬就席口占華堂深處出娉婷語聲輕笑聲清燕語鶯啼一一付春情恰似洛陽花正發見花好不知名金甌盛酒玉纎擎滿盈盈勸深深不怕主人教你十分斟只怕酒闌歌罷後人不見暮山青繫裙腰愁别山兒矗矗水兒清船兒似葉兒輕風兒更沒人情月兒明厮合造送行人眼兒蔌蔌淚兒傾燈兒更冷青青遭逢著鴈兒又沒前程一聲聲怎生得夢兒成詞狷薄而意優柔永遇樂春莫有懷青幄蔽林白氊鋪徑紅雨迷楚晝閣關愁風簾捲恨盡日縈情緒陽臺雲去文園人病寂寞翠尊雕爼惜韶容匆匆易失芳叢對眼如霧中欹潤裛衣寬涼滲又覺漸回驕暑解籜吹香遺丸薦脆小芰浮鴛浦畫欄如舊依俙猶記佇立一鈎蓮步黯銷魂那堪又聽杜鵑更苦菩薩蠻怨别吹簫人去行雲杳杳篝翠𬒳都間了疊損縷金衣是他渾不知冷煙寒食夜淡月梨花下猶自軟心腸為他燒夜香無限意那得如椽彩筆但滿眼西風蕭瑟我所思兮何處所在鐔津津上滄灣側誰氏子閬風客閬風仙客才無敵賦悲秋抑揚頓挫流離沈鬱百賦千詩朝復暮解道波濤春力憶共爾乘槎吹笛八表神遊吾夢見渺洞庭青草煙波隔空悵望楚天碧賀新郎清浪軒送春碧浪搖春渚浸虛簷蒲萄滉漾翠綃掀舞委曲經過臺下路載取落花東去問花亦漂流良苦花不能言應有恨恨十分都𬒳春風誤同此恨有飛絮人生聚散元無據侭憑欄一尊相對蘋洲春莫嫉色沖沖空悵望淚盡世間兒女君不見千金求賦飛燕婕妤今何在看粘雲江影傷千古流不去斷魂處賀新郎送杜子野赴省説到城南杜侭風流至今人號去天尺五家世聮翩蒼玉佩自有文章機杼看鵉鳯九霄軒翥文陳堂堂新淂雋正少年壯氣虹霓吐拈彩筆月城去出關相送梅千樹雪連空馬蹄特特曉寒人度帝里春濃花似海催入明光奏賦須快展亨衢闊步隨世功名真漫浪要平生所學期無負須記得别時語歸朝􅌚南劔雙溪樓五月人間揮汗雨離恨一襟何處去雙溪樓下碧千尋雙溪樓上匏尊舉晚涼生緑樹漁燈幾點依洲渚莫狂歌潭空月淨慘慘瘦蛟舞變化往來無定所求劔刻舟應笑汝只今誰是晉司空斗牛奕奕紅光吐我來空吊古與君同記憑欄語問滄波乘槎此去流到天河否歸朝􅌚壽蕭禹平知縣雲表金莖珠璀璨當日投懷驚玉燕文章議論壓西雍風流姓字翔東觀𬗋皇嗟見晚祥麟五色留金殿大江西銅章墨綬暫爾煩君綰十二金叉扶玉盞錦瑟摐摐隨急管獸爐煙動彩雲髙秋聲拍碎紅牙板趣君歸翰苑萊衣煥爛潘輿穩任方瞳從今看到弱水波清淺歸朝􅌚别意朱戶緑窗深窈窕閃閃華旗紅幹小相逢斜栁絆輕舟渚香不斷蘋花老西風吹夢草題詩未了還驚覺獨傷心凄涼故館月過西樓悄樓外斜河低浸斗夜已如何夜將曉心期欲寄赤鱗魚秋雲不動秋江渺相思千里道多情直𬒳無情惱玉臺前請君試看華髮添多少水龍吟題連州翼然亭呈歐守翼然新榜髙亭翰林鐡畫燕公手滁陽盛事何人重繼湟川太守太守謂誰文章的派醉翁賢胄對千峯削翠雙溪注玉端不減琅琊秀坐嘯清香畫戟聽丁丁滴花晴漏棠隂晝寂細賡賔客竹枝楊栁只恐明朝綈封趣覲未容借寇侭江山識賞鹽梅事業煥青氊舊水龍吟題天風海濤呈潘料院颷車飛上蓬萊不須更跨琴髙鯉剨然長嘯天風􅐓洞雲濤無際我欲乘桴從兹浮海約任公子辦虹竿千丈犗鈎五十親點對連鰲餌誰榜佳名空翠𬗋陽仙去騎箕尾銀鈎鐡畫龍拏鳯峙留人間世更憶東山哀筝一曲灑沾襟淚到而今幸有髙亭遺愛寓甘棠意水龍吟題盱江偉觀城頭傑觀峥嶸重欄下瞰蒼龍脊鏤珉盤礎雕檀竦楶玲瓏金碧華子岡頭麻源谷口神仙窟宅道至今清夜月明風冷常隱隱聞笙笛翠壁煙霞縹眇更寒泉飛空千尺數峯江上孤舟天際夕陽紅濕抖擻征塵浩然長嘯跨青鵉翼向鳯岡西望遙釃斗酒酹文章伯李泰伯墓在鳯皇山下水調歌頭上韶州方檢詳時有節制之命慘淡望京闕慷慨夢天山引杯中夜看劔壯氣刷幽燕鼉鼓滿天催曙畫角連雲嘯月吹斷戍瓶煙犀角赤兔馬虎帳緑熊氈仗漢節伸大義伐可汗青冥更下斧鉞赤子要君安鐡騎千羣觀獵宫樣十眉環座礕礰聽鳴弦莫厭兜鍪冷歸去已貂蟬木蘭花慢社日有懷東風吹霧雨更吹起夾衣寒正莽莽叢林潭潭伐鼓鬱鬱焚蘭闌干曲多少意看青煙如篆繞溪灣桑柘緑隂猶薄杏桃紅雨初翻飛花片片走潺湲問何日西還嘆優擾人生紛紛離合渺渺悲歡想雲軿何處也對芳時應只在人間惆悵回紋錦字斷腸斜日雲山蝶戀花快閣傑閣青紅天半倚萬里歸舟更近闌干艤木落山寒鳬鴈起一聲漁笛滄洲尾千古文章黃太史捫蝨髙風長照氷壺裏何以薦君秋菊蘂癯瓢為酌西江水蝶戀花春情院靜日長花氣暖一簇嬌紅淂見春深淺風送生香來近逺笑聲只在秋千畔目力未窮腸已斷一寸芳心更逐遊絲亂朱戶對開簾捲半日斜江上春風晚鷓鴣天怨别一徑蕭條落葉深離腸凄斷月明砧征鴻送恨連雲起促織驚秋傍砌吟風悄悄夜沈沈鴛機坐冷曉霜侵挑成錦字心相向未必君心似妾心鷓鴣天閨思多病春來事事慵偶因撲蝶到庭中落紅萬疊花經雨斜碧千條栁因風深院宇小簾櫳幾年離别恰相逢擎觴未飲心先醉為有春愁似酒濃鷓鴣天别意行盡春山春事空别愁離恨滿江東三更鼓潤官樓雨五夜燈殘客舍風寒淡淡曉朧朧黃雞催斷丑時鍾𬗋騮嚼勒金銜響衝破飛花一道紅鷓鴣天惜别一曲危絃斷客腸津橋捩柂轉牙檣江心雲帶蒲帆重樓上風吹粉淚香瑶草碧栁芽黃載將離恨過瀟湘請君看取東流水方識人間别意長鷓鴣天春思病去那知春事深流鶯喚起惜春心桐舒碧葉慳三寸栁引金絲可一尋憐繡閣對雲岑苦無多力懶登臨翠羅衫砥寒猶在弱骨離支瘦不禁鷓鴣天閨情髙杏酣酣出短墻埀楊裊裊蘸池塘文鴛藉草眠春晝金鯽吹波弄夕陽間倚鏡理明粧自翻銀葉炷衙香鳴鞭已過青樓曲不是劉郎定阮郎鷓鴣天閨情公子詩成著錦𫀆王家桃葉舊妖嬈檀槽摐急斜金鴈綵袖翩躚嚲翠翹沈水過懶重燒十分濃醉十分嬌復羅帳裏春寒少只恐香酥拍漸消玉樓春春思春風只在園西畔薺菜花繁胡蝶亂氷池晴緑照還空香徑落紅吹已斷意長翻恨遊絲短盡日相思羅帶緩寶奩如月不欺人明日歸來君試看阮郎歸春思鰓花輕拂𬗋綿香瓊杯初暖粧貪憑雕檻看鴛鴦無心上繡床風絮亂恣輕狂惱人依舊忙夢隨殘雨下髙唐悠悠春夢長婆羅門引春情花明栁暗一天春色繞朱樓斷鴻聲喚人愁欲問鴻歸何處身世自悠悠正東風留滯楚尾吳頭追思舊遊歎雙鬢颯驚秋可惜等間孤了酒令花籌斷絃難續謾題詩分付水東流流不到蓬島瀛洲醉桃源春景拍堤春水蘸埀楊水流花片香弄花噆栁小鴛鴦一雙隨一雙簾半捲露新粧春衫是栁黃倚欄看處背斜陽風流暗斷腸好事近舟行曉色未分明敲動月邊鼉鼓卯酒一杯徑醉又别君南浦春江如席照晴空大舶夾雙櫓腸斷斜陽渡口正落紅如雨訴衷情章貢别懷一聲水調解蘭舟人門無此愁無情江水東流去與我淚爭流人已逺更回頭苦凝眸斷魂何處梅花岸曲小小紅樓多麗記恨最無端官樓畫角輕吹一聲來深閨深處把人好夢驚回許多愁侭教奴受些箇事未必君知淚滴蘭衾寒生珠幌翠雲撩亂枕頻欹窗兒上幾條殘月斜玉界羅帷更堪聽霜摧敗葉靜扣朱扉念别離千里萬里問何日是歸期關情處魚來鴈往斷腸是兔走烏飛美景良辰賞心樂事風流孤負縷金衣謾嬴得花顔玉骨瘦損為相思歸須早劉郎雙鬢莫遣成絲一落索春懷清曉鶯啼紅樹又一雙飛去日髙花氣撲人來獨自價傷春無緒别後暗寬金縷倩誰傳語一春不忍上髙樓為怕見分携處南柯子曰歸去來歸去來兮吾將安歸但有東籬菊有西園桂有南溪月有北山薇蜂則有房魚還有穴蟻有樓臺獸有衣吾應有雲中舊隱竹裏柴扉人間征路熹微看處處丹楓白露晞况寒原衰草牛羊來下淡煙秋水鱸鱖初肥自笑平生頽然骨相只合持竿坐釣磯都休也對西風無詔落日斜暉沁園春題吳明仲竹坡竹焉美哉愛竹者誰曰君子歟向佳山水處築宫一畒好風煙裏種玉千餘朝引輕霏夕延涼月此外塵埃一點無須知道有樂其樂者吾愛吾廬竹之清也何如應料得詩人清矣乎况滿庭秀色對拈彩筆半窗涼影伴讀殘書休説龍吟莫言鳯嘯且道髙標誰勝渠君試看正繞坡雲氣似渭川圖中興以來絶妙詞選卷之五
